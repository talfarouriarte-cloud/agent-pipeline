# STUB (agent-pipeline).
name: Process Reviewer
on:
  issues:
    types: [labeled]
permissions:
  contents: read
  issues: write
concurrency:
  group: process-reviewer
  cancel-in-progress: false
jobs:
  call:
    uses: talfarouriarte-cloud/agent-pipeline/.github/workflows/process-review.yml@main
    with:
      runner: ubuntu-latest
      default_branch: main
      process_model: claude-fable-5
      process_fallback_model: claude-opus-4-8
      process_max_turns: 60
      timeout_minutes: 20
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      REVIEWER_GITHUB_TOKEN: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
