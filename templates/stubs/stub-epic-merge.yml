# STUB (agent-pipeline). workflow_run debe listar los name: EXACTOS de los
# stubs de CI y Reviewer de ESTE repo; ci_workflow_name debe coincidir.
name: Epic Merge
on:
  workflow_run:
    workflows: ["CI", "Opus Reviewer"]
    types: [completed]
  pull_request:
    types: [closed, labeled]
  # issues:[closed] es OBLIGATORIO: sin él, el handler de cierre-por-estado
  # (AP-031, postStateClose) es código muerto en el consumidor y los sentinels
  # de un issue cerrado sin merge quedan huérfanos (parada de cadena — medido
  # en finplan#1547, 2026-07-20; el agujero estaba en LOS DOS stubs).
  issues:
    types: [closed]
permissions:
  contents: write
  pull-requests: write
  issues: write
  statuses: write
  actions: read
concurrency:
  # Tercer fallback issue.number: sin él, todo evento `issues` colapsa en el
  # grupo constante `epic-merge-` y se encola entre sí y con cualquier evento
  # de sufijo vacío.
  group: epic-merge-${{ github.event.workflow_run.head_branch || github.event.pull_request.head.ref || github.event.issue.number }}
  cancel-in-progress: false
jobs:
  call:
    uses: talfarouriarte-cloud/agent-pipeline/.github/workflows/epic-merge.yml@main
    with:
      runner: ubuntu-latest
      default_branch: main
      ci_workflow_name: CI
      epic_label: epica
      partial_round_cap: 3
      partial_lifetime_cap: 6
    secrets:
      REVIEWER_GITHUB_TOKEN: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
