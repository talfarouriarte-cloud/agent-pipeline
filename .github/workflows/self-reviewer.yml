# STUB del CENTRAL (2026-07-14, AP-012). cancel-in-progress: false (PR #1109).
name: Opus Reviewer
on:
  pull_request:
    types: [opened, labeled]
permissions:
  contents: read
  pull-requests: write
  issues: write
concurrency:
  group: reviewer-${{ github.event.pull_request.number }}
  cancel-in-progress: false
jobs:
  call:
    uses: talfarouriarte-cloud/agent-pipeline/.github/workflows/reviewer.yml@main
    with:
      # ubuntu-latest y no ubicloud (2026-07-15): la integración Ubicloud no
      # cubre este repo — los jobs quedaban `queued` sin runner para siempre
      # (Reviewer >1h). El repo es público: GitHub-hosted es gratis.
      runner: ubuntu-latest
      reviewer_model: claude-opus-4-8
      reviewer_max_turns: 80   # AP-025: bump de presupuesto (50→80) — ataca la frecuencia de muerte sin veredicto; la red por-estado del post-step cubre cualquier muerte
      timeout_minutes: 22      # AP-025: el wall-clock escala con los turns o el bump es inerte
      agent_branch_prefix: claude/
      review_context: |
        - `templates/workflow-contracts.json` si el PR toca la superficie `workflow_call` de un reusable (manifiesto en el MISMO PR, AP-003).
        - `docs/decisions.md` si el PR toca doctrina — coherencia con los AP vigentes.
        - Mandato completo del rol en este repo: `docs/agents/reviewer-annex.md` (blast radius, coherencia normativa, prosa-vs-mecanismo).
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      REVIEWER_GITHUB_TOKEN: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
