# STUB del CENTRAL (2026-07-14, AP-012): agent-pipeline es consumidor de sí
# mismo. El Creator del central procesa las process-proposal enrutadas por
# eje (Fase 1). Los PRs que TOCAN .github/workflows/** SÍ están admitidos a
# RAMA desde la enmienda AP-012 (2026-07-15/16): el push EN sesión con el
# token de la App se rechaza (sin scope `workflows`) pero es letra muerta —
# el camino canónico es el post-step `always()` «Push residual con token de
# workflows» de claude-code.yml, que empuja los commits residuales con el
# secret WORKFLOWS_PUSH_TOKEN cableado más abajo (`:35`). El merge es HUMANO
# SIEMPRE (rama base `main` protegida). No emitas `[NEEDS-HUMAN]` ni pidas
# parche manual por un fallo de push en sesión: es esperado y el post-step lo
# rescata (incidente que motivó la enmienda; repetido en PR #139).
name: Claude Code
on:
  issues:
    types: [opened, edited, assigned]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
jobs:
  call:
    uses: talfarouriarte-cloud/agent-pipeline/.github/workflows/claude-code.yml@main
    with:
      # ubuntu-latest y no ubicloud (2026-07-15): la integración Ubicloud no
      # cubre este repo — los jobs quedaban `queued` sin runner para siempre
      # (Reviewer >1h). El repo es público: GitHub-hosted es gratis.
      runner: ubuntu-latest
      default_branch: main
      creator_model: claude-opus-4-8
      creator_max_turns: 120
      bot_comment_cap: 8
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      REVIEWER_GITHUB_TOKEN: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
      WORKFLOWS_PUSH_TOKEN: ${{ secrets.WORKFLOWS_PUSH_TOKEN }}
