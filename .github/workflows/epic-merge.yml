# =============================================================================
# Epic Merge — auto-merge + auto-encadenado para épicas (ADR-193)
# =============================================================================
# Dispara cuando CI o el Reviewer terminan. Re-evalúa AMBOS gates; el que cierre
# la pareja (el que acabe más tarde) mergea. Gate = CI verde AND Reviewer LGTM
# AND label `epica` en el issue. Tras mergear, lee `<!-- launch-next: #N -->`
# del cuerpo del issue y lanza el siguiente con @claude.
#
# Robustez: corre con el PAT (REVIEWER_GITHUB_TOKEN). TODO el cuerpo va envuelto
# en try/catch → el run NUNCA falla; o mergea, o deja un comentario diagnóstico
# en el PR explicando por qué no. Ese comentario (marcador <!-- epic-merge-diag -->)
# es legible por API para depurar sin logs.
#
# human-execute (ADR-020): lo commitea el humano.
# =============================================================================
name: Epic Merge

# CALLABLE (agent-pipeline): triggers (workflow_run de CI+Reviewer,
# pull_request closed+labeled, issues closed) y concurrency viven en el stub.
# El grupo de concurrency del stub DEBE serializar por rama y llevar
# cancel-in-progress: false. El nombre del workflow de CI del consumidor se
# pasa como input `ci_workflow_name` (el gate lo compara contra run.name).
#
# Cierre POR ESTADO (AP-031, repesca finplan#1478): trigger `issues: [closed]`
# — un issue `epica` que termina por estado (creator-alcance-completo ⇒
# `estado:cierre-pendiente-humano`, AP-020) y lo cierra un humano NO es un
# evento de merge: sus sentinels de cadena (`launch-next`/`epic-audit`)
# quedan sin consumidor. `postStateClose` los consume con la misma lógica del
# camino de merge, idempotente. Consumidores que no declaren el trigger en su
# stub no reciben el evento (no-op); ninguna regresión.
#
# Serialización de refuerzo (AP-015, issue #46): además de la del stub, el
# JOB de este reusable declara su propia concurrency por rama con
# cancel-in-progress:false. Viaja por graft (AP-009) sin tocar los stubs de
# los consumidores y garantiza que dos evaluaciones del MISMO merge se
# ordenen — de modo que el 2º run vea el claim de auditoría que dejó el 1º.
# No es el fix por sí sola (con cancel:false ambos runs ejecutan): la pieza
# portante es la creación idempotente de auditoría (ver createAuditIdempotent).
on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: ubuntu-latest
      default_branch:
        type: string
        default: main
      ci_workflow_name:
        description: Nombre EXACTO del workflow de CI del consumidor (name:)
        type: string
        default: CI
      epic_label:
        description: Label que marca issues de épica
        type: string
        default: epica
      partial_round_cap:
        description: Relanzamientos parciales por ronda antes de stalled
        type: number
        default: 3
      partial_lifetime_cap:
        description: Parciales acumulados de por vida antes de rounds-cap-reached
        type: number
        default: 6
      automerge:
        # AP-012 (2026-07-14): el CENTRAL usa este reusable con automerge=false
        # — allí el merge es SIEMPRE humano; este workflow solo procesa el
        # post-merge (cierre y cola). Consumidores: default true (sin cambios).
        type: boolean
        default: true
      loose_audit:
        # Auditoría automática al cerrar un issue suelto. El central la
        # desactiva (volumen bajo, humano en el loop de cada merge).
        type: boolean
        default: true
    secrets:
      REVIEWER_GITHUB_TOKEN:
        required: true

jobs:
  epic-merge:
    runs-on: ${{ inputs.runner }}
    # Serialización por rama a nivel de job (AP-015, issue #46): ordena las
    # evaluaciones concurrentes del MISMO merge (varios eventos
    # workflow_run/pull_request) para que el 2º run observe el claim de
    # auditoría del 1º. Clave por rama ⇒ merges de PRs DISTINTOS no se
    # serializan entre sí. cancel-in-progress:false ⇒ ningún run se pierde.
    concurrency:
      group: epic-merge-${{ github.repository }}-${{ github.event.workflow_run.head_branch || github.event.pull_request.head.ref || github.ref }}
      cancel-in-progress: false
    permissions:
      statuses: write     # espejo del gate en la caja de checks del PR (2026-07-10)
      contents: read
    steps:
      - name: Evaluar y mergear
        uses: actions/github-script@v7
        env:
          # El PAT del script NO tiene permiso de statuses; el espejo del
          # gate en checks sale con el GITHUB_TOKEN (statuses no disparan
          # workflows: sin riesgo de loop).
          STATUS_TOKEN: ${{ github.token }}
          # Inputs al script vía env (2026-07-11, Fase C): con ${{ }} dentro
          # del script, el bloque entero se evalúa como plantilla y revienta
          # el límite de 21000 chars por expresión de Actions.
          IN_PARTIAL_LIFETIME_CAP: ${{ inputs.partial_lifetime_cap }}
          IN_PARTIAL_ROUND_CAP: ${{ inputs.partial_round_cap }}
          IN_AUTOMERGE: ${{ inputs.automerge }}
          IN_LOOSE_AUDIT: ${{ inputs.loose_audit }}
          IN_DEFAULT_BRANCH: ${{ inputs.default_branch }}
          IN_EPIC_LABEL: ${{ inputs.epic_label }}
          IN_CI_WORKFLOW_NAME: ${{ inputs.ci_workflow_name }}
        with:
          github-token: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
          script: |
            const REVIEWER_LOGIN = 'talfarouriarte-cloud';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const run = context.payload.workflow_run || null;

            // Helper: deja/actualiza un comentario diagnóstico legible por API.
            async function diag(prNumber, msg) {
              try {
                core.info('[epic-merge] ' + msg);
                if (!prNumber) return;
                const marker = '<!-- epic-merge-diag -->';
                const { data: cs } = await github.rest.issues.listComments({
                  owner, repo, issue_number: prNumber, per_page: 100 });
                const mine = cs.filter(c => (c.body || '').includes(marker));
                const body = `${marker}\n**epic-merge** (${new Date().toISOString()}): ${msg}`;
                if (mine.length) {
                  await github.rest.issues.updateComment({ owner, repo, comment_id: mine[mine.length-1].id, body });
                } else {
                  await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
                }
              } catch (e) { core.warning('diag falló: ' + e.message); }
            }

            // Cola serial (2026-07-14, decisión del propietario): cuando un
            // merge deja la serie LIBRE (sin sucesor de cadena ni re-arm
            // parcial), se arma el issue EN COLA más antiguo — el que el
            // guard serial bloqueó y etiquetó `en-cola`. FIFO por created_at.
            async function armQueue(prNumber, why) {
              try {
                const { data: queued } = await github.rest.issues.listForRepo({
                  owner, repo, state: 'open', labels: 'en-cola', sort: 'created', direction: 'asc', per_page: 5 });
                const next = queued.filter(i => !i.pull_request)[0];
                if (!next) return;
                await github.rest.issues.removeLabel({ owner, repo, issue_number: next.number, name: 'en-cola' }).catch(() => {});
                await github.rest.issues.removeLabel({ owner, repo, issue_number: next.number, name: 'stalled' }).catch(() => {});
                await github.rest.issues.createComment({ owner, repo, issue_number: next.number,
                  body: `@claude arranca — turno de cola: la serie quedó libre (${why}). Eras el más antiguo en \`en-cola\`.\n\n<!-- arm-de-cola -->` });
                await diag(prNumber, `serie libre (${why}): armado el siguiente de la cola, #${next.number}.`);
              } catch (e) { await diag(prNumber, `arm de cola falló: ${e.message}`); }
            }

            // Helper: label de estado única en el PR (estado:*) — legible de
            // un vistazo en la lista de PRs (2026-07-05: merge manual sobre
            // REVIEW pendiente porque el estado solo vivía en comentarios).
            const ESTADOS = ['estado:esperando-ci', 'estado:esperando-reviewer', 'estado:esperando-creator'];
            // Espejo del gate en la caja de checks del PR (2026-07-10): el
            // mismo estado que la label, como commit status sobre el head
            // SHA — contexto `epic-merge / gate`. Amarillo mientras espera,
            // verde al satisfacerse/mergear. Sale con GITHUB_TOKEN (el PAT
            // no tiene scope de statuses; los statuses no disparan nada).
            const STATUS_DESC = {
              'estado:esperando-ci': ['pending', 'Esperando CI verde'],
              'estado:esperando-reviewer': ['pending', 'Esperando veredicto del Reviewer'],
              'estado:esperando-creator': ['pending', 'Veredicto REVIEW/NITS abierto: turno del Creator'],
              'merged': ['success', 'Gate satisfecho: mergeado por epic-merge'],
              'manual': ['success', 'Mergeado manualmente; sentinels procesados'],
            };
            async function mirrorStatus(prNum, key) {
              try {
                const { data: p } = await github.rest.pulls.get({ owner, repo, pull_number: prNum });
                const [state, description] = STATUS_DESC[key] || ['pending', key];
                const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/statuses/${p.head.sha}`, {
                  method: 'POST',
                  headers: { Authorization: `Bearer ${process.env.STATUS_TOKEN}`, Accept: 'application/vnd.github+json' },
                  body: JSON.stringify({ state, description: description.slice(0, 140), context: 'epic-merge / gate' }) });
                if (!res.ok) core.info(`mirrorStatus HTTP ${res.status}`);
              } catch (e) { core.info('mirrorStatus: ' + e.message); }
            }
            async function setStatus(prNum, label, statusKey) {
              try {
                const { data: cur } = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number: prNum });
                for (const l of cur) if (ESTADOS.includes(l.name) && l.name !== label)
                  await github.rest.issues.removeLabel({ owner, repo, issue_number: prNum, name: l.name }).catch(() => {});
                if (label && !cur.some(l => l.name === label))
                  await github.rest.issues.addLabels({ owner, repo, issue_number: prNum, labels: [label] });
              } catch (e) { core.info('setStatus: ' + e.message); }
              await mirrorStatus(prNum, statusKey || label);
            }

            // ── Creación IDEMPOTENTE de auditoría (AP-015, issue #46). Los dos
            // `create` de auditoría de postMerge eran incondicionales y sufrían
            // carreras: dos runs de Epic Merge del MISMO merge → dos auditorías
            // byte-idénticas (wmcb#65/#66). El dedupe previo (camino manual) se
            // apoyaba en el search index de GitHub (eventualmente consistente),
            // así que dejaba pasar duplicados en ventanas de lag del índice.
            // Aquí el guard es FUERTEMENTE consistente y determinista:
            //  1) Claim materializado en el PR mergeado (listComments = lectura
            //     por-issue, NO search index) con marcador por alcance exacto.
            //  2) Cinturón por label vía REST Issues API (listForRepo, NO search)
            //     filtrando por TÍTULO exacto = scopeKey (frontera de ciclo, no
            //     solo label ⇒ no suprime un panel nuevo legítimo).
            //  3) Cinturón post-create: si la carrera coló ≥2, sobrevive la de
            //     número MENOR (resolución idéntica en todo run, sin humano).
            const AUDIT_CLAIM = t => `<!-- audit-claim: ${t} -->`;
            async function openAuditsByTitle(title) {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner, repo, state: 'open', labels: 'auditoria', per_page: 100 });
              return issues.filter(i => !i.pull_request && i.title === title)
                .sort((a, b) => a.number - b.number);
            }
            async function writeAuditClaim(prNumber, title, auditNumber) {
              try {
                const marker = AUDIT_CLAIM(title);
                const body = `${marker}\n**epic-merge**: auditoría «${title}» reclamada → #${auditNumber}.`;
                const { data: cs } = await github.rest.issues.listComments({
                  owner, repo, issue_number: prNumber, per_page: 100 });
                const mine = cs.find(c => (c.body || '').includes(marker));
                if (mine) await github.rest.issues.updateComment({ owner, repo, comment_id: mine.id, body });
                else await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
              } catch (e) { core.warning('writeAuditClaim: ' + e.message); }
            }
            // Devuelve el nº de la auditoría vigente para este alcance (creada,
            // adoptada o superviviente) o null si la creación falló.
            async function createAuditIdempotent(prNumber, { title, labels, body }) {
              const marker = AUDIT_CLAIM(title);
              // 1) Claim materializado en el PR (fuertemente consistente).
              try {
                const { data: cs } = await github.rest.issues.listComments({
                  owner, repo, issue_number: prNumber, per_page: 100 });
                const claimed = cs.find(c => (c.body || '').includes(marker));
                if (claimed) {
                  const m = (claimed.body || '').match(/→\s*#(\d+)/);
                  await diag(prNumber, `auditoría «${title}» ya reclamada${m ? ' (#' + m[1] + ')' : ''}; no creo duplicado.`);
                  return m ? Number(m[1]) : null;
                }
              } catch (e) { core.warning('claim read: ' + e.message); }
              // 2) Cinturón por label (REST Issues API, no search index): título exacto abierto.
              try {
                const existing = (await openAuditsByTitle(title))[0];
                if (existing) {
                  await writeAuditClaim(prNumber, title, existing.number);
                  await diag(prNumber, `auditoría abierta existente #${existing.number} para «${title}»; la adopto, no creo duplicado.`);
                  return existing.number;
                }
              } catch (e) { core.warning('belt list: ' + e.message); }
              // 3) Crear + reclamar de inmediato (claim antes de ceder el turno).
              let created = null;
              try {
                created = (await github.rest.issues.create({ owner, repo, title, labels, body })).data;
                await writeAuditClaim(prNumber, title, created.number);
              } catch (e) {
                await diag(prNumber, `crear auditoría «${title}» falló: ${e.message}`);
                return null;
              }
              // 4) Cinturón post-create determinista: min-número sobrevive.
              try {
                const dups = await openAuditsByTitle(title);
                if (dups.length >= 2) {
                  const survivor = dups[0];
                  for (const loser of dups.slice(1)) {
                    await github.rest.issues.update({ owner, repo, issue_number: loser.number,
                      state: 'closed', state_reason: 'not_planned' }).catch(() => {});
                    await github.rest.issues.createComment({ owner, repo, issue_number: loser.number,
                      body: `Auditoría duplicada por creación concurrente en epic-merge (issue #46). Superviviente determinista: #${survivor.number} (menor número). Cerrada automáticamente.\n\n<!-- audit-dup-closed -->` }).catch(() => {});
                  }
                  await writeAuditClaim(prNumber, title, survivor.number);
                  await diag(prNumber, `carrera de auditoría resuelta: sobrevive #${survivor.number}; cerradas ${dups.slice(1).map(x => '#' + x.number).join(', ')}.`);
                  return survivor.number;
                }
              } catch (e) { core.warning('post-create belt: ' + e.message); }
              return created ? created.number : null;
            }

            // ── Post-merge: parcial / cierre de issue / sentinels. Camino único
            // para merge automático y manual (movimiento verbatim 2026-07-05).
            async function postMerge(pr, issueNumber, issue) {
              const prNumber = pr.number;
              // PR PARCIAL (marcador `<!-- partial-pr -->` o "cierra parcialmente" en el
              // body del PR): mergea, pero NO cierra el issue ni sigue el sentinel —
              // re-arma el MISMO issue para el alcance restante. Cap de 3 relanzamientos
              // (marcador <!-- epic-partial-relaunch -->) → label `stalled` y escala a
              // humano, para que un Creator que trocea sin fin no cicle. Motivado por
              // #954/#957: la Slice 2 murió en silencio al cerrarse el issue con el
              // merge de la Slice 1.
              const prBody = pr.body || '';
              // Polaridad declarada (2026-07-07, #1113): el Creator DEBE marcar
              // full-pr o partial-pr (hook pr-polarity lo fuerza en gh pr create).
              // Sin declaración ⇒ PARCIAL: fallo seguro y ruidoso (re-arm espurio
              // visible / stall) en vez de salto silencioso de alcance. El texto
              // libre no decide (el cinturón /alcance restante/i causó el deadlock
              // de #1112 por ceguera de polaridad).
              const isFull = /<!--\s*full-pr\s*-->/.test(prBody);
              const isPartial = !isFull && (/<!--\s*partial-pr\s*-->/.test(prBody) || /cierra\s+parcialmente/i.test(prBody) || true);
              if (!isFull && !/<!--\s*partial-pr\s*-->/.test(prBody))
                await diag(prNumber, 'PR sin declaración de polaridad (ni full-pr ni partial-pr): lo trato como PARCIAL por seguridad.');
              if (isPartial) {
                // Inmunidad a un `Closes #N` extraviado en el PR híbrido (2026-07-06,
                // #1097): el autoclose nativo de GitHub cierra el issue al mergear
                // ANTES de que este camino corra. Reabrir explícito e idempotente:
                // un issue parcial SIEMPRE queda abierto.
                try { await github.rest.issues.update({ owner, repo, issue_number: issueNumber, state: 'open' }); }
                catch (e) { core.info('reabrir parcial falló: ' + e.message); }
                // Contador POR RONDA (2026-07-07, #1100 stall-thrash): contar solo
                // los relanzamientos posteriores al último tope. Antes contaba toda
                // la vida del issue, así que tras un des-stall humano el primer
                // parcial re-disparaba el cap al instante (stalled a las 01:13,
                // des-stall 08:01, re-stalled 10:19). Cada des-stall abre una ronda
                // fresca de 3, con el humano acotando entre rondas.
                // Contador ACUMULADO de vida del issue (2026-07-07, régimen
                // autónomo): a diferencia del de ronda, NUNCA se resetea. Al
                // 6º parcial total el issue no se re-arma más: `stalled` +
                // <!-- rounds-cap-reached -->, que ordena a architect-resolve
                // RE-DIMENSIONAR (partición de architect.md) en vez de abrir
                // otra ronda sobre el mismo issue. Es señal de fallo de
                // dimensionamiento (failure class #2), no de parada: el
                // trabajo continúa en los issues hijos, sin humano.
                let relaunches = 0, totalRounds = 0;
                try {
                  const { data: ics } = await github.rest.issues.listComments({
                    owner, repo, issue_number: issueNumber, per_page: 100 });
                  let lastCap = -1;
                  ics.forEach((c, idx) => { if ((c.body || '').includes('<!-- relaunch-cap-reached -->')) lastCap = idx; });
                  relaunches = ics.filter((c, idx) => idx > lastCap && (c.body || '').includes('<!-- epic-partial-relaunch -->')).length;
                  totalRounds = ics.filter(c => (c.body || '').includes('<!-- epic-partial-relaunch -->')).length;
                } catch (e) { core.info('contar relanzamientos falló: ' + e.message); }
                // Label de visibilidad `rondas:N` (parciales mergeados en la
                // vida del issue, incluido este) — patrón estado:* pero en el issue.
                try {
                  const { data: curL } = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number: issueNumber });
                  for (const l of curL) if (/^rondas:\d+$/.test(l.name) && l.name !== `rondas:${totalRounds + 1}`)
                    await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name: l.name }).catch(() => {});
                  await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: [`rondas:${totalRounds + 1}`] });
                } catch (e) { core.info('label rondas falló: ' + e.message); }
                const CAP_TOTAL = Number(process.env.IN_PARTIAL_LIFETIME_CAP);
                if (totalRounds >= CAP_TOTAL) {
                  try { await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: ['stalled'] }); } catch (e) {}
                  try { await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber,
                    body: `Cap ACUMULADO de relanzamientos parciales alcanzado (${totalRounds} en la vida del issue; cap ${CAP_TOTAL}). Este issue NO se re-arma más: su tamaño ha demostrado no caber en el presupuesto del Creator. architect-resolve: RE-DIMENSIONA el alcance restante (heurística de partición de docs/agents/architect.md — hijos con label de épica, encadenados, heredando el sentinel; cierra este issue con trazabilidad). NO abras otra ronda sobre este issue.\n\n<!-- rounds-cap-reached -->` }); } catch (e) {}
                  await diag(prNumber, `MERGEADO parcial, pero el issue #${issueNumber} acumula ${totalRounds} relanzamientos totales (cap ${CAP_TOTAL}): stalled + rounds-cap-reached. architect-resolve debe PARTIRLO, no re-armarlo.`);
                  return;
                }
                if (relaunches >= Number(process.env.IN_PARTIAL_ROUND_CAP)) {
                  try { await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: ['stalled'] }); } catch (e) {}
                  try { await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber,
                    body: `Cap de relanzamientos parciales alcanzado (ronda de ${process.env.IN_PARTIAL_ROUND_CAP}). architect-resolve (por evento \`stalled\`, o re-derivado del estado por el scan — AP-038): diagnostica por qué esta ronda no converge y decide — re-dimensionar el restante (partición) o abrir ronda nueva con des-stall + re-arm. El contador se resetea desde aquí; humano solo por doble rebote.\n\n<!-- relaunch-cap-reached -->` }); } catch (e) {}
                  await diag(prNumber, `MERGEADO parcial, pero ya hubo ${relaunches} relanzamientos en esta ronda (cap ${process.env.IN_PARTIAL_ROUND_CAP}): issue #${issueNumber} marcado stalled, NO re-armo. architect-resolve rula (régimen autónomo; humano solo por doble rebote).`);
                  return;
                }
                // Parcial FORZADO por estado (AP-023): el PR lo abrió el post-step
                // desde la rama viva con polaridad parcial forzada y «Alcance
                // restante: desconocido» (el post-step no juzga full/partial). Su
                // "resto" NO es contenido real pendiente: es un placeholder. El
                // re-arm de un parcial así DEBE tener un desenlace DETERMINISTA
                // «resto vacío ⇒ alcance completo» — el comentario lo instruye
                // explícito y estampa el marcador belt `epic-partial-relaunch-por-
                // estado` que el post-step de claude-code consume para materializar
                // el terminal por estado si la sesión no emite el marcador
                // (repesca finplan#1466, AP-026 — cola fantasma sin terminal
                // mecánico ⇒ `human-needed` + cirugía humana).
                const porEstado = /<!--\s*pr-abierto-por-estado\s*-->/.test(prBody);
                const relaunchBody = porEstado
                  ? `@claude\n\nPR parcial #${prNumber} mergeado. Este parcial fue **abierto por estado** (\`pr-abierto-por-estado\`): su «Alcance restante» era \`desconocido\` — un placeholder, NO contenido real pendiente.\n\n**Desenlace determinista obligatorio:** re-verifica contra el HEAD actual qué criterios de aceptación del issue siguen SIN cubrir.\n- Si **NO queda alcance** sin cubrir ⇒ cierra tu turno con el terminal **\`<!-- creator-alcance-completo -->\`** (HTML anclado, en su propia línea, en el ISSUE). NO recomiendes cierre manual en prosa: el post-step no lee prosa y sin el marcador tu turno degradaría a \`human-needed\` (cola fantasma, AP-026).\n- Si **queda alcance real** ⇒ cúbrelo y abre un PR; si lo completa, márcalo \`full-pr\`.\n\n<!-- epic-partial-relaunch -->\n<!-- epic-partial-relaunch-por-estado -->`
                  : `@claude\n\nPR parcial #${prNumber} mergeado. Continúa con el ALCANCE RESTANTE de este issue: re-verifica contra el HEAD actual qué criterios de aceptación siguen sin cubrir y cúbrelos. Si tu próximo PR completa el issue, NO lo marques parcial.\n\n<!-- epic-partial-relaunch -->`;
                try {
                  await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber, body: relaunchBody });
                  await diag(prNumber, `MERGEADO parcial${porEstado ? ' (abierto-por-estado)' : ''}: issue #${issueNumber} SIGUE ABIERTO, re-armado para el alcance restante (${relaunches + 1}/${process.env.IN_PARTIAL_ROUND_CAP}).`);
                } catch (e) { await diag(prNumber, `mergeado parcial pero re-armar #${issueNumber} falló: ${e.message}`); }
                return;
              }

              await diag(prNumber, `MERGEADO (issue #${issueNumber}). Lanzando siguiente…`);

              // Cerrar el issue completado. NO se delega al `Closes #N` del cuerpo del PR:
              // el Creator lo emite de forma inconsistente (#858/#859 quedaron abiertos pese
              // a su PR mergeado). Cierre explícito e idempotente.
              try {
                await github.rest.issues.update({ owner, repo, issue_number: issueNumber, state: 'closed', state_reason: 'completed' });
              } catch (e) { core.info('cerrar issue falló: ' + e.message); }

              // ENCADENAR
              const body = issue.body || '';

              // FINAL DE ISSUE SUELTO (2026-07-13, decisión del propietario):
              // un issue sin label de épica no tiene sentinel horneado — su fin
              // legítimo es la AUDITORÍA AUTOMÁTICA, igual que una épica. Va
              // ANTES de sentinels y del guard cola-huérfana (que son de cadena).
              const looseFinal = !(issue.labels || []).map(l => l.name).includes(process.env.IN_EPIC_LABEL);
              if (looseFinal) {
                if (process.env.IN_LOOSE_AUDIT !== 'true') {
                  await diag(prNumber, `MERGEADO (suelto #${issueNumber}); auditoría automática desactivada en este repo (loose_audit=false).`);
                  await armQueue(prNumber, `merge del suelto #${issueNumber}`);
                  return;
                }
                try {
                  const auditNumber = await createAuditIdempotent(prNumber, {
                    title: `Auditoría de issue suelto · #${issueNumber}`,
                    labels: ['auditoria'],
                    body: [
                      `Auditoría post-merge de issue SUELTO (run único). Alcance: **issue #${issueNumber}** (título: ${issue.title}).`,
                      ``,
                      `Rol y protocolo: \`docs/agents/epic-auditor.md\` (vinculante; ver «Modo issue suelto»).`,
                      `La checklist de alcance es la DoD del issue #${issueNumber} y los ADR que cite; el árbol de \`${process.env.IN_DEFAULT_BRANCH}\` es la única verdad sobre lo entregado. Los «Invariantes funcionales» — si el issue los declara — se EJECUTAN; su ausencia se visibiliza pero no bloquea (issues doc-only legítimos).`,
                      ``,
                      `@claude arranca la auditoría siguiendo docs/agents/epic-auditor.md.`,
                    ].join('\n'),
                  });
                  if (auditNumber) await diag(prNumber, `MERGEADO (suelto) + auditoría en #${auditNumber}.`);
                } catch (e) {
                  await diag(prNumber, `mergeado (suelto) pero crear/armar auditoría falló: ${e.message}`);
                }
                await armQueue(prNumber, `merge del suelto #${issueNumber}`);
                return;
              }

              // AUDITORÍA DE ÉPICA (run único post-épica). El ÚLTIMO issue de la
              // cadena lleva `<!-- epic-audit: ADR-NNN, #first-#last -->` (lo hornea
              // el Architect al diseñar la épica). Al mergear ese issue: se crea el
              // issue de auditoría, armado en el propio body. Guards anti-recursión:
              //  - de los correctivos, SOLO el último de la cadena correctiva
              //    lleva el sentinel (re-auditoría automática, UNA ronda; si la
              //    re-auditoría encuentra huecos, escala a humano — ver
              //    docs/agents/epic-auditor.md);
              //  - el issue de auditoría se crea aquí (no por merge) → no re-dispara.
              const am = body.match(/<!--\s*epic-audit:\s*([^>]+?)\s*-->/);
              if (am) {
                const scope = am[1].trim();
                try {
                  const auditNumber = await createAuditIdempotent(prNumber, {
                    title: `Auditoría de épica · ${scope}`,
                    labels: ['auditoria'],
                    body: [
                      `Auditoría post-épica (run único). Alcance: **${scope}**.`,
                      ``,
                      `Rol y protocolo: \`docs/agents/epic-auditor.md\` (vinculante).`,
                      `Los «Invariantes funcionales de la épica» viven en el ISSUE DE ÉPICA del rango (casa canónica, junto al sentinel): léelos allí y EJECÚTALOS. Su ausencia ALLÍ es la omisión a visibilizar.`,
                      `Compara el árbol mergeado de \`${process.env.IN_DEFAULT_BRANCH}\` contra el alcance TOTAL`,
                      `de la épica (ADR + unión de issues del rango), no PR-a-PR.`,
                      ``,
                      `@claude arranca la auditoría siguiendo docs/agents/epic-auditor.md.`,
                    ].join('\n'),
                  });
                  if (auditNumber) await diag(prNumber, `MERGEADO + epic-audit: auditoría en #${auditNumber}. Épica terminada.`);
                  await armQueue(prNumber, 'épica terminada (epic-audit)');
                } catch (e) {
                  await diag(prNumber, `mergeado pero crear/armar auditoría falló: ${e.message}`);
                }
                return; // epic-audit implica fin de cadena (no coexiste con launch-next)
              }

              if (/<!--\s*epic-done\s*-->/.test(body)) { await diag(prNumber, 'MERGEADO + epic-done. Épica terminada.'); await armQueue(prNumber, 'épica terminada (epic-done)'); return; }
              const lm = body.match(/<!--\s*launch-next:\s*#?(\d+)\s*-->/);
              if (!lm) {
                // GUARD cola huérfana (v1.2): un issue `epica` mergeado sin
                // NINGÚN sentinel nunca es fin normal — el fin legítimo de
                // toda cadena es epic-audit. Antes: diag silencioso (incidente
                // wmcb #6, 2026-07-11: épica cerrada sin auditoría ni proceso).
                // `stalled` lo recoge architect-resolve por el trigger labeled.
                await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: ['stalled'] });
                await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber,
                  body: '**epic-merge · cola huérfana**: issue de épica mergeado y cerrado SIN sentinel (ni launch-next ni epic-audit). El fin legítimo de una cadena es siempre epic-audit; esto es un defecto de horneado, no un fin. Escalado a architect-resolve vía `stalled`.\n\n<!-- cola-huerfana -->' });
                await diag(prNumber, `MERGEADO pero sin sentinel: cola huérfana — issue #${issueNumber} marcado stalled y escalado.`);
                return;
              }
              const next = Number(lm[1]);
              // Des-bloqueo mecánico del destino (2026-07-08, #1120): un
              // eslabón re-armado por su cadena está por definición
              // desbloqueado — si llevaba `stalled`/`human-needed` era por
              // el prerrequisito que ESTE merge acaba de cerrar (patrón
              // re-dimensionado: hijos insertados delante de un issue
              // parado). Sin esta limpieza el arm dispara al Creator con
              // el kill-switch aún puesto y el humano tiene que acordarse
              // de retirarlo a mano — mecanismo, no memoria.
              for (const stale of ['stalled', 'human-needed']) {
                try { await github.rest.issues.removeLabel({ owner, repo, issue_number: next, name: stale }); }
                catch (e) { /* 404 = no la tenía; ok */ }
              }
              try {
                await github.rest.issues.createComment({ owner, repo, issue_number: next,
                  body: `@claude\n\nArranque automático de épica tras merge de #${prNumber}.\n\n<!-- epic-auto-launch -->` });
                await diag(prNumber, `MERGEADO + lanzado #${next} (labels de bloqueo limpiadas si las había).`);
              } catch (e) { await diag(prNumber, `mergeado pero lanzar #${next} falló: ${e.message}`); }
            }

            // ── Cierre POR ESTADO (AP-031, repesca finplan#1478). Un issue
            // `epica` que termina por ESTADO — el Creator concluye con
            // `creator-alcance-completo` (alcance ya en base, sin PR que abrir)
            // ⇒ el post-step de claude-code aplica `estado:cierre-pendiente-
            // humano` (AP-020) y un humano lo cierra — NO genera evento de
            // merge, así que `postMerge` NUNCA corre y sus sentinels de cadena
            // (`launch-next`/`epic-audit`) quedan SIN consumidor mecánico
            // (hoy los arma la memoria humana: patrón #14→#21, «visibilizar
            // sin prevenir»). Este handler los consume con la MISMA lógica del
            // camino de merge, idempotente y sin tocar el cierre (que sigue
            // siendo humano por diseño, AP-019).
            //
            // Rastro/dedupe global del handler: comentario con marcador
            // `<!-- epic-state-close-processed -->` en el issue ⇒ procesado
            // una sola vez por issue (superviviente a reopen/reclose).
            async function stateCloseMark(issueNumber, msg) {
              try {
                await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber,
                  body: `<!-- epic-state-close-processed -->\n**epic-merge · cierre por estado** (${new Date().toISOString()}): ${msg}` });
              } catch (e) { core.warning('stateCloseMark: ' + e.message); }
            }
            // Dedupe de arm (Riesgo 1 — doble-arm humano+handler): devuelve un
            // motivo si el destino de `launch-next` ya está armado/en vuelo/
            // encolado/cerrado (⇒ no re-armar), o null si está fresco. Cubre
            // «el humano ya armó a mano» (caso finplan#1478: el Architect armó
            // el eslabón 2/2 ANTES de cerrar el 1/2).
            async function targetAlreadyArmed(n) {
              try {
                const t = (await github.rest.issues.get({ owner, repo, issue_number: n })).data;
                if (t.state !== 'open') return 'destino no abierto';
                const tl = (t.labels || []).map(l => l.name);
                if (tl.includes('serial-activo')) return 'serial-activo (Creator en vuelo)';
                if (tl.includes('en-cola')) return 'en-cola (encolado)';
              } catch (e) { /* si issues.get falla (p.ej. no existe) lo tratamos como no armado */ }
              try {
                const { data: prs } = await github.rest.pulls.list({ owner, repo, state: 'open', per_page: 100 });
                if (prs.some(p => (p.head.ref || '').startsWith(`claude/issue-${n}-`))) return 'PR claude/* abierto';
              } catch (e) { core.info('targetAlreadyArmed pulls.list: ' + e.message); }
              try {
                const { data: cs } = await github.rest.issues.listComments({ owner, repo, issue_number: n, per_page: 100 });
                if (cs.some(c => /<!--\s*epic-auto-launch\s*-->/.test(c.body || ''))) return 'epic-auto-launch (ya armado)';
              } catch (e) { core.info('targetAlreadyArmed listComments: ' + e.message); }
              return null;
            }
            async function postStateClose(issue) {
              const issueNumber = issue.number;
              const labels = (issue.labels || []).map(l => l.name);
              // Guard 1: SOLO cadenas de épica. Sueltos (auditoría al cierre por
              // otra vía) y issues sin label de épica quedan fuera.
              if (!labels.includes(process.env.IN_EPIC_LABEL)) return;
              // Guard 2: kill-switches (respetados igual que el camino de merge).
              if (labels.includes('pause-agents') || labels.includes('human-needed')) {
                core.info(`[epic-merge] cierre-por-estado #${issueNumber}: kill-switch activo; no-op.`); return;
              }
              // Guard 3 (Riesgo 2): actuar SOLO sobre la clase evidenciada
              // «terminal por estado» — `estado:cierre-pendiente-humano` (AP-020)
              // o el rastro `creator-alcance-completo-materializado*` del
              // post-step. Los cierres de REESTRUCTURACIÓN del Architect (alcance
              // migrado a hijos) NO llevan ese estado ⇒ quedan fuera y siguen
              // siendo del Architect.
              let allComments = [];
              try {
                allComments = (await github.rest.issues.listComments({ owner, repo, issue_number: issueNumber, per_page: 100 })).data;
              } catch (e) { core.warning(`cierre-por-estado listComments #${issueNumber}: ${e.message}`); }
              const evidenced = labels.includes('estado:cierre-pendiente-humano')
                || allComments.some(c => /<!--\s*creator-alcance-completo-materializado(-por-estado)?\s*-->/.test(c.body || ''));
              if (!evidenced) {
                core.info(`[epic-merge] cierre #${issueNumber}: sin estado terminal-por-estado (¿reestructuración?); no-op.`); return;
              }
              // Dedupe global del handler (reopen/reclose): procesado una vez.
              if (allComments.some(c => /<!--\s*epic-state-close-processed\s*-->/.test(c.body || ''))) {
                core.info(`[epic-merge] cierre-por-estado #${issueNumber}: ya procesado; no-op.`); return;
              }

              const body = issue.body || '';
              // NOTA sobre la cola serial: el turno pasado a la cola (`en-cola`
              // ⇒ `popQueue`) YA lo ejecutó el post-step de `claude-code.yml` al
              // materializar el terminal por estado (libera `serial-activo` +
              // `popQueue` en el MISMO instante, `:1076`). Este handler NO
              // re-pop-ea la cola general (sería doble-pop: armaría un segundo
              // `en-cola` que el guard serial re-encola — ruido). Su ÚNICA tarea
              // es consumir el SENTINEL DE CADENA (arm del successor o creación
              // de la auditoría), que el post-step no toca.

              // AUDITORÍA DE ÉPICA (peor caso latente: la épica cerraría SIN
              // auditoría, en silencio, si el último eslabón termina por estado).
              // createAuditIdempotent es idempotente por título/claim ⇒ si el
              // humano ya creó la auditoría, la adopta sin duplicar. El claim se
              // ancla en el propio issue cerrado (no hay PR aquí).
              const am = body.match(/<!--\s*epic-audit:\s*([^>]+?)\s*-->/);
              if (am) {
                const scope = am[1].trim();
                try {
                  const auditNumber = await createAuditIdempotent(issueNumber, {
                    title: `Auditoría de épica · ${scope}`,
                    labels: ['auditoria'],
                    body: [
                      `Auditoría post-épica (run único). Alcance: **${scope}**.`,
                      ``,
                      `Rol y protocolo: \`docs/agents/epic-auditor.md\` (vinculante).`,
                      `Los «Invariantes funcionales de la épica» viven en el ISSUE DE ÉPICA del rango (casa canónica, junto al sentinel): léelos allí y EJECÚTALOS. Su ausencia ALLÍ es la omisión a visibilizar.`,
                      `Compara el árbol mergeado de \`${process.env.IN_DEFAULT_BRANCH}\` contra el alcance TOTAL`,
                      `de la épica (ADR + unión de issues del rango), no PR-a-PR.`,
                      ``,
                      `@claude arranca la auditoría siguiendo docs/agents/epic-auditor.md.`,
                    ].join('\n'),
                  });
                  await stateCloseMark(issueNumber, `\`epic-audit\` consumido tras cierre por estado: auditoría ${auditNumber ? '#' + auditNumber : '(creación falló)'} para «${scope}».`);
                } catch (e) {
                  await stateCloseMark(issueNumber, `cierre por estado: crear/armar auditoría «${scope}» falló: ${e.message}`);
                }
                return; // epic-audit implica fin de cadena (no coexiste con launch-next)
              }

              if (/<!--\s*epic-done\s*-->/.test(body)) {
                // Fin de cadena sin auditoría: no hay successor ni auditoría que
                // armar; la cola ya la popeó el post-step. Solo dejamos rastro.
                await stateCloseMark(issueNumber, '`epic-done`: fin de cadena sin auditoría (nada que encadenar tras cierre por estado; la cola serial ya la gestionó el post-step).');
                return;
              }

              const lm = body.match(/<!--\s*launch-next:\s*#?(\d+)\s*-->/);
              if (!lm) {
                // `epica` cerrada por estado SIN sentinel: posible defecto de
                // horneado. A diferencia del camino de merge (que aplica
                // `stalled`), NO re-etiquetamos un issue ya cerrado por el
                // humano — solo dejamos rastro para el Auditor.
                await stateCloseMark(issueNumber, 'sin sentinel de cadena (ni `launch-next` ni `epic-audit`): nada que encadenar. Posible defecto de horneado — issue ya cerrado por el humano; no se re-etiqueta.');
                return;
              }
              const next = Number(lm[1]);
              const already = await targetAlreadyArmed(next);
              if (already) {
                await stateCloseMark(issueNumber, `\`launch-next: #${next}\` ya consumido (${already}); no re-armo (dedupe doble-arm humano+handler).`);
                return;
              }
              // Des-bloqueo mecánico del destino (idéntico al camino de merge,
              // 2026-07-08/#1120) + arm con rastro `epic-auto-launch`.
              for (const stale of ['stalled', 'human-needed']) {
                try { await github.rest.issues.removeLabel({ owner, repo, issue_number: next, name: stale }); }
                catch (e) { /* 404 = no la tenía; ok */ }
              }
              try {
                await github.rest.issues.createComment({ owner, repo, issue_number: next,
                  body: `@claude\n\nArranque automático de épica tras cierre POR ESTADO de #${issueNumber} (terminal alcance-completo, sin merge — AP-031). El sentinel \`launch-next\` de una cadena que termina por estado lo consume epic-merge, no la memoria humana.\n\n<!-- epic-auto-launch -->` });
                await stateCloseMark(issueNumber, `\`launch-next\` consumido tras cierre por estado: #${next} armado (des-bloqueo aplicado si tenía \`stalled\`/\`human-needed\`).`);
              } catch (e) {
                await stateCloseMark(issueNumber, `cierre por estado: arm de #${next} falló: ${e.message}`);
              }
            }

            let prNumber = null;
            try {
              // ── Evento issues closed (AP-031): cierre POR ESTADO de una
              // épica. Camino disjunto del de merge (no hay PR); consume los
              // sentinels de cadena que un cierre manual (no-merge) huérfana.
              if (context.eventName === 'issues') {
                if (context.payload.action !== 'closed') return;
                await postStateClose(context.payload.issue);
                return;
              }
              // ── Evento labeled (ADR-218): solo `lgtm` evalúa; el resto de
              // labels se ignoran aquí (concurrency ya serializa).
              let labeledPr = null;
              if (context.eventName === 'pull_request' && context.payload.action === 'labeled') {
                if (context.payload.label?.name !== 'lgtm') return;
                labeledPr = context.payload.pull_request;
                if (labeledPr.state !== 'open' || labeledPr.merged) return;
                core.info(`[epic-merge] trigger: labeled lgtm / rama ${labeledPr.head.ref}`);
              }
              // ── Camino MANUAL: pull_request closed(merged) por humano.
              if (context.eventName === 'pull_request' && context.payload.action === 'closed') {
                const p = context.payload.pull_request;
                if (!p.merged) return; // cerrado sin merge: nada que procesar
                prNumber = p.number;
                await setStatus(prNumber, null, 'manual'); // limpiar estado:* + espejo verde
                const mb = (p.head.ref || '').match(/issue-(\d+)/);
                if (!mb) { core.info('manual: rama sin issue; no-op.'); return; }
                const mIssueNumber = Number(mb[1]);
                // Dedupe con el camino automático: si epic-merge ya mergeó él
                // mismo, su diag contiene «MERGEADO» — no reprocesar sentinels.
                try {
                  const { data: cs } = await github.rest.issues.listComments({ owner, repo, issue_number: prNumber, per_page: 100 });
                  if (cs.some(c => (c.body || '').includes('<!-- epic-merge-diag -->') && /MERGEADO/.test(c.body || ''))) {
                    core.info('manual: epic-merge ya procesó este merge; no-op.'); return;
                  }
                } catch (e) { core.warning('manual dedupe: ' + e.message); }
                let mIssue = null;
                try { mIssue = (await github.rest.issues.get({ owner, repo, issue_number: mIssueNumber })).data; }
                catch (e) { await diag(prNumber, `manual: issues.get #${mIssueNumber} falló: ${e.message}`); return; }
                // 2026-07-13: los sueltos también se procesan en el camino manual (auditoría al cierre).
                await diag(prNumber, `merge MANUAL detectado: proceso sentinels de #${mIssueNumber}.`);
                await postMerge(p, mIssueNumber, mIssue);
                return;
              }

              const headBranch = labeledPr ? labeledPr.head.ref : run.head_branch;
              const headSha = labeledPr ? labeledPr.head.sha : run.head_sha;
              if (!labeledPr) core.info(`[epic-merge] trigger: ${run.name} / ${run.conclusion} / rama ${headBranch} / sha ${headSha}`);

              // PR abierto de esta rama
              let pr = labeledPr;
              if (!pr) try {
                const { data: prs } = await github.rest.pulls.list({
                  owner, repo, state: 'open', head: `${owner}:${headBranch}` });
                pr = prs.find(p => p.head.sha === headSha) || prs[0] || null;
              } catch (e) { core.warning('pulls.list: ' + e.message); }
              if (!pr) { core.info(`[epic-merge] sin PR abierto para ${headBranch}; no-op.`); return; }
              prNumber = pr.number;

              // kill-switches
              const prLabels = (pr.labels || []).map(l => l.name);
              if (prLabels.includes('pause-agents') || prLabels.includes('human-needed')) {
                await diag(prNumber, 'pausado (pause-agents/human-needed); no mergeo.'); return;
              }

              // issue desde la rama claude/issue-NNN
              const bm = (headBranch || '').match(/issue-(\d+)/);
              if (!bm) { await diag(prNumber, `rama sin issue (${headBranch}); no-op.`); return; }
              const issueNumber = Number(bm[1]);

              let issue = null;
              try { issue = (await github.rest.issues.get({ owner, repo, issue_number: issueNumber })).data; }
              catch (e) { await diag(prNumber, `issues.get #${issueNumber} falló: ${e.message}`); return; }
              const issueLabels = (issue.labels || []).map(l => l.name);
              // 2026-07-13 (decisión del propietario, caso PR #1319 de finplan):
              // los issues SUELTOS (sin label de épica) ya NO son no-op — se
              // mergean con los mismos gates (CI verde + LGTM) y terminan con
              // auditoría automática (ver postMerge). Antes: merge manual
              // humano + auditoría olvidada.
              const isLooseIssue = !issueLabels.includes(process.env.IN_EPIC_LABEL);
              if (isLooseIssue) await diag(prNumber, `issue #${issueNumber} sin label de épica: régimen de SUELTO (merge automático + auditoría al cierre).`);

              // GATE 1: CI verde. PRIMARIO = la `conclusion` del propio evento
              // workflow_run. RESPALDO (reescrito 2026-07-10, incidente PR #1205):
              // consulta DIRECTA de los runs de CI para el head SHA (el PAT tiene
              // Actions:read — el comentario histórico que decía lo contrario era
              // falso). El respaldo anterior usaba `mergeable_state === 'clean'`
              // como proxy de CI, y el status espejo `epic-merge / gate` en
              // `pending` lo envenenaba: el gate observaba un estado que él mismo
              // perturbaba, y todo PR cuyo LGTM llegara después del CI quedaba en
              // `esperando-ci` para siempre. Nunca inferir CI de mergeable_state.
              let pf = null;
              try { pf = (await github.rest.pulls.get({ owner, repo, pull_number: prNumber })).data; }
              catch (e) { core.info('pulls.get: ' + e.message); }
              if (pf && (pf.state !== 'open' || pf.merged)) { await diag(prNumber, 'PR ya cerrado/mergeado; no-op.'); return; }
              // Hecho materializado (ADR-218): CI escribe `ci-verde` al acabar
              // y lo invalida en el attempt 1 de código nuevo. Primario; el
              // payload del evento y la consulta directa quedan de respaldo.
              let ciOk = prLabels.includes('ci-verde')
                || (run && run.name === process.env.IN_CI_WORKFLOW_NAME && run.conclusion === 'success');
              if (!ciOk && pf) {
                try {
                  const { data: ciRuns } = await github.rest.actions.listWorkflowRunsForRepo({
                    owner, repo, head_sha: pf.head.sha, per_page: 30 });
                  const cis = ciRuns.workflow_runs
                    .filter(r => r.name === process.env.IN_CI_WORKFLOW_NAME)
                    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                  ciOk = cis.length > 0 && cis[0].status === 'completed' && cis[0].conclusion === 'success';
                } catch (e) { core.info('consulta directa de CI falló: ' + e.message); }
              }
              if (!ciOk) { await setStatus(prNumber, 'estado:esperando-ci'); await diag(prNumber, `CI no confirmado verde (trigger=${run ? run.name + '/' + run.conclusion : 'labeled:lgtm'}); espero al otro evento.`); return; }

              // GATE 2: Reviewer LGTM. Hecho materializado primario (ADR-218):
              // label `lgtm` (post-step determinista de reviewer.yml; CI la
              // invalida en código nuevo). El escaneo de comentarios queda de
              // RESPALDO TRANSITORIO (PRs pre-cambio); retirar en fase 2.
              let lgtm = prLabels.includes('lgtm');
              if (!lgtm) try {
                const { data: comments } = await github.rest.issues.listComments({
                  owner, repo, issue_number: prNumber, per_page: 100 });
                const verdicts = comments.filter(c =>
                  c.user.login === REVIEWER_LOGIN && /^\s*(LGTM|REVIEW|NITS)\b/.test(c.body || ''));
                const last = verdicts[verdicts.length - 1];
                lgtm = !!(last && /^\s*LGTM\b/.test(last.body));
              } catch (e) { await diag(prNumber, `chequeo Reviewer falló: ${e.message}`); return; }
              if (!lgtm) {
                // ¿Espera al Reviewer (sin veredicto aún) o al Creator (REVIEW/NITS abiertos)?
                let waitingOn = 'estado:esperando-reviewer';
                try {
                  const { data: cs2 } = await github.rest.issues.listComments({ owner, repo, issue_number: prNumber, per_page: 100 });
                  const vs = cs2.filter(c => c.user.login === REVIEWER_LOGIN && /^\s*(LGTM|REVIEW|NITS)\b/.test(c.body || ''));
                  if (vs.length && /^\s*(REVIEW|NITS)\b/.test(vs[vs.length - 1].body || '')) waitingOn = 'estado:esperando-creator';
                } catch (e) { core.info('estado lgtm: ' + e.message); }
                await setStatus(prNumber, waitingOn);
                await diag(prNumber, `Reviewer aún no LGTM (${waitingOn.replace('estado:', '')}); espero.`);
                return;
              }

              // MERGE (directo; si ya estuviera cerrado/mergeado, el propio merge lo reporta).
              try {
                if (process.env.IN_AUTOMERGE !== 'true') { await diag(prNumber, 'gates verdes, pero automerge=false en este repo: el merge es humano (AP-012). Esperando.'); return; }
                await github.rest.pulls.merge({ owner, repo, pull_number: prNumber, merge_method: 'squash' });
              } catch (e) { await diag(prNumber, `MERGE FALLÓ: ${e.message} (¿ya mergeado / protección de rama / token sin contents:write?)`); return; }
              try { await github.rest.git.deleteRef({ owner, repo, ref: `heads/${headBranch}` }); } catch (e) {}

              await setStatus(prNumber, null, 'merged'); // limpiar estado:* + espejo verde
              await postMerge(pr, issueNumber, issue);
              return;
            } catch (e) {
              core.warning('[epic-merge] excepción no esperada: ' + (e && e.message));
              await diag(prNumber, 'excepción no esperada: ' + (e && e.message));
            }
