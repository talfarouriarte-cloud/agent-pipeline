name: Opus Reviewer

# CALLABLE (agent-pipeline): triggers y concurrency viven en el stub
# (concurrency del stub DEBE llevar cancel-in-progress: false — un evento
# labeled espurio no puede matar una review en vuelo; incidente PR #1109).
on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: ubuntu-latest
      reviewer_model:
        type: string
        default: claude-opus-4-8
      reviewer_max_turns:
        # 80 y no 50 (AP-025, repesca finplan#1450): el mandato universal-strict
        # (2026-07-12, fidelidad ADR cláusula-a-cláusula en TODO PR) expandió el
        # trabajo por sesión y provocó la 1ª muerte por presupuesto observada del
        # Reviewer (ronda 1 de un PR de motor, sin veredicto posteado). Sólo se
        # paga si se usa. La red por-estado (post-step rama sin-veredicto) cubre
        # CUALQUIER muerte; este bump ataca la FRECUENCIA.
        type: number
        default: 80
      timeout_minutes:
        # 22 y no 15 (AP-025): el timeout de wall-clock debe escalar con el bump
        # de turns o el bump es inerte — a 50 turns la muerte por presupuesto de
        # finplan#1450 llegó a los ~9 min; 80 turns rozarían los 15 min y el
        # timeout se volvería el nuevo modo de muerte, dejando el bump sin efecto.
        type: number
        default: 22
      agent_branch_prefix:
        description: Prefijo de ramas del agente que auto-disparan review
        type: string
        default: claude/
      review_context:
        description: Líneas extra de contexto de dominio para el paso 2 del prompt (anexo por repo)
        type: string
        default: ""
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      REVIEWER_GITHUB_TOKEN:
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    name: Reviewer
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    # v1.4: el gate SEMÁNTICO vive como PRIMER STEP github-script; el job-if
    # queda reducido a un prefiltro de coste (sin él, cada evento `labeled`
    # del pipeline — ci-verde, lgtm, estado:* — levantaría un runner solo
    # para que el gate diga no). El prefiltro NO referencia inputs, user.login
    # ni labels del PR: solo campos probados en producción en régimen
    # workflow_call (la cláusula labeled acumula successes desde el día uno).
    if: |
      github.event.action == 'opened'
      || (github.event.action == 'labeled' && github.event.label.name == 'needs-review')

    # v1.4: el gate vive como PRIMER STEP github-script, no como job-if.
    # Motivo: el job-if saltaba sistemáticamente en `opened` en régimen
    # workflow_call (ambas cláusulas; 10 skips vs 5 success en el primer
    # consumidor desde el día uno) — la maquinaria se auto-curaba vía
    # needs-review (coste: un tick de latencia por review, clase REDUNDANT
    # del ledger). El step tiene contexto completo y es depurable: loguea
    # cada campo y la razón de la decisión. Los steps restantes se
    # condicionan a su output.
    steps:
      - name: Gate (sustituye al job-if — v1.4)
        id: gate
        uses: actions/github-script@v7
        env:
          AGENT_BRANCH_PREFIX: ${{ inputs.agent_branch_prefix }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const action = context.payload.action;
            const prefix = process.env.AGENT_BRANCH_PREFIX || 'claude/';
            const author = pr.user?.login || '';
            const authorType = pr.user?.type || '';
            const headRef = pr.head?.ref || '';
            const headRepo = pr.head?.repo?.full_name || '';
            const labels = (pr.labels || []).map(l => l.name);
            const eventLabel = context.payload.label?.name || '';
            const sender = context.payload.sender?.login || '';

            core.notice(`gate ctx: action=${action} author=${author}(${authorType}) headRef=${headRef} headRepo=${headRepo} label=${eventLabel} sender=${sender} labels=[${labels}] prefix=${prefix}`);

            let run = false, reason = '';
            if (headRepo !== `${context.repo.owner}/${context.repo.repo}`) {
              reason = 'PR de fork (sin acceso a secrets)';
            } else if (labels.includes('pause-agents')) {
              reason = 'kill-switch pause-agents (ADR-063)';
            } else if (action === 'opened') {
              const isBot = author === 'claude[bot]' || (authorType === 'Bot' && author.startsWith('claude'));
              const isAgentBranch = headRef.startsWith(prefix);
              run = isBot || isAgentBranch;
              reason = run ? (isBot ? 'opened por claude[bot]' : `opened con rama de agente (${prefix}*)`)
                           : 'opened humano en rama no-agente';
            } else if (action === 'labeled') {
              run = eventLabel === 'needs-review' && sender !== 'claude[bot]';
              reason = run ? 'label needs-review de actor no-bot'
                           : `labeled irrelevante (label=${eventLabel}, sender=${sender})`;
            } else {
              reason = `action no cubierta: ${action}`;
            }
            core.notice(`gate: run=${run} — ${reason}`);
            core.setOutput('run', run ? 'true' : 'false');

      # Patrón ADR-063: el agente disparado por una label la quita como
      # primer paso. Así el próximo add (del Creator tras responder a
      # los comentarios) vuelve a disparar el evento `labeled`. Sin
      # esto, re-aplicar la misma label es no-op silencioso.
      #
      # Solo aplica cuando el trigger fue label (no en `opened`).
      - name: Remove needs-review trigger label
        if: |
          steps.gate.outputs.run == 'true'
          && github.event.action == 'labeled'
          && github.event.label.name == 'needs-review'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: 'needs-review',
              });
              core.notice('Label `needs-review` removed (trigger consumed).');
            } catch (e) {
              // 404 si la label ya no está (race condition o removida
              // manualmente). No es error en operativa normal.
              core.notice(`Could not remove needs-review: ${e.message}`);
            }

      - name: Checkout
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Migración 2026-05-19: el Reviewer estaba en `scripts/reviewer.mjs`
      # llamando Messages API directamente con CLAUDE_CODE_OAUTH_TOKEN. Eso
      # NO funciona — OAuth tokens no son válidos contra Messages API (ver
      # GitHub issue anthropics/claude-code#37205) — y el script tenía
      # fallback silencioso a ANTHROPIC_API_KEY → facturación pay-per-token
      # ~20€/día sin detectar.
      #
      # Ahora se usa claude-code-action@v1 igual que el Creator
      # (claude-code.yml). El action invoca el binario `claude` CLI, no
      # Messages API directa, así que SÍ funciona con OAuth Max ($0 real).
      #
      # `prompt:` activa automation mode del action — corre directo sin
      # esperar `@claude` mention. El system prompt del Reviewer vive en
      # docs/agents/reviewer.md y se carga via el propio prompt aquí.
      - name: Graft vendored (capa común servida desde el central — AP-009)
        if: steps.gate.outputs.run == 'true'
        uses: talfarouriarte-cloud/agent-pipeline/.github/actions/graft-vendored@main

      - name: Run Reviewer
        id: reviewer
        if: steps.gate.outputs.run == 'true'
        uses: anthropics/claude-code-action@v1
        env:
          # Blindaje OAuth-only: bloquea cualquier fallback silencioso a API
          # key dentro de la SDK interna del action. Si OAuth Max falla, el
          # job da rojo en lugar de facturar.
          ANTHROPIC_API_KEY: ""
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # El PR del Creator viene de claude[bot]. El action tiene un guard
          # anti-bot que rechaza disparos de actores no-humanos a menos que
          # estén en allowed_bots. Sin esto, el Reviewer falla en PRs del
          # Creator con: "Workflow initiated by non-human actor: claude
          # (type: Bot). Add bot to allowed_bots list ...".
          allowed_bots: "claude"

          # GITHUB_TOKEN default NO dispara otros workflows (anti-loop GitHub).
          # Para que el comentario del Reviewer con `@claude` dispare el
          # Creator (claude-code.yml), usar PAT (REVIEWER_GITHUB_TOKEN).
          github_token: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
          # track_progress NO se activa: solo es compatible con acciones
          # 'opened/synchronize/ready_for_review/reopened' del evento
          # pull_request. Como el Reviewer también se dispara via label
          # 'needs-review' (action: labeled), activarlo rompería el flujo
          # manual. Trade-off aceptable: pierdes comment de progreso
          # visible, pero ganas robustez de invocación.
          claude_args: |
            --model ${{ inputs.reviewer_model }}
            --max-turns ${{ inputs.reviewer_max_turns }}
            --allowedTools "Read,Glob,Grep,Write,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*)"

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            PR HEAD SHA: ${{ github.event.pull_request.head.sha }}
            PR BASE SHA: ${{ github.event.pull_request.base.sha }}

            Eres el Reviewer del repo. Tu rol completo, criterios de
            severidad, formato del comment de output (cabecera de control
            de loop con veredicto + @claude en línea 1-2, TOC al principio,
            severidad por issue 🔴/🟡/🟢/🔵, verificaciones, criterio de
            convergencia, criterios LGTM/REVIEW/NITS) están documentados
            en `docs/agents/reviewer.md`.

            Acciones requeridas (en este orden):

            1. **Lee `docs/agents/reviewer.md` COMPLETO** antes de hacer
               nada más. Es tu system prompt — internalízalo. Si algo en
               las instrucciones siguientes contradice ese doc, gana el
               doc.

            2. **Lee el contexto relevante** del repo según el área que
               toca el PR:
               - `decisions.md` (ADRs vigentes) — siempre relevante.
               - `spec.md` (contrato del producto).
               - `CLAUDE.md` para convenciones operativas.
               - `docs/agents/reviewer-annex.md` si existe (mandato
                 específico del repo).
               ${{ inputs.review_context }}

            3. **Obtén el diff del PR**:
               ```
               gh pr diff ${{ github.event.pull_request.number }} > /tmp/diff.patch
               ```
               Excluir `pnpm-lock.yaml` del análisis (ruido de
               dependencias auto-gestionado).

            4. **Obtén el thread de comentarios del PR** (incluye reviews
               previas tuyas si las hay):
               ```
               gh pr view ${{ github.event.pull_request.number }} --json comments,reviews > /tmp/thread.json
               ```

            5. **Audita el PR** según los criterios de
               `docs/agents/reviewer.md`. Si NO es la primera review de
               este PR (ya hay comments tuyos previos en `thread.json`),
               aplica los criterios de convergencia: NO repitas issues
               ya planteadas, verifica si las del Creator fueron
               resueltas, decide LGTM/NITS/REVIEW.

            6. **Postea tu review como comentario en el PR**:
               ```
               gh pr comment ${{ github.event.pull_request.number }} --body-file <archivo>
               ```
               Formato exacto del doc: veredicto + `@claude` (si REVIEW)
               en cabecera al principio del comment para sobrevivir
               truncamiento, TOC al principio, severidad por issue,
               verificaciones.

            Reglas absolutas:

            - NO modifiques código del PR. Tu único output es el
              comentario de review.
            - NO mergees el PR.
            - NO añadas/quites labels (excepto consumir `needs-review`
              que ya gestiona el pre-step).
            - Respeta el formato y los criterios de severidad definidos
              en `docs/agents/reviewer.md` exactamente.

      # ── Estado materializado (ADR-218 + AP-025): un paso DETERMINISTA (cero
      # LLM) cierra la costura «sesión del Reviewer → estado» (la disciplina de
      # un LLM es olvidable; el mecanismo no). DOS ramas DISJUNTAS por «¿existe
      # veredicto VIGENTE para el head SHA actual?»:
      #   · CON veredicto (ADR-218) ⇒ materializa la label `lgtm` (escribe si el
      #     último es LGTM; retira si REVIEW/NITS). `lgtm` sale con el PAT: su
      #     `labeled` es el edge que le faltaba a epic-merge cuando el LGTM llega
      #     después del CI (incidente PR #1205).
      #   · SIN veredicto (AP-025, repesca finplan#1450) ⇒ la sesión concluyó
      #     (cualquier outcome — este step corre `if: always()`) sin postear un
      #     veredicto anclado para el head: muerte por presupuesto (max-turns/
      #     timeout) o crash antes de postear. El terminal «Reviewer muerto sin
      #     veredicto» NO tenía materialización — la transición quedaba colgada
      #     hasta el paso del Watchdog (~9-18 min + un slot de su cap). Aquí se
      #     re-aplica `needs-review` con el PAT ⇒ sesión FRESCA por evento,
      #     latencia cero. Cap 1 por head SHA vía marcador; reincidencia sobre el
      #     mismo head ⇒ NO re-etiquetar (una 2ª muerte por presupuesto = la
      #     review no cabe en el presupuesto, no un flake — evita el loop de
      #     sesiones Opus muertas) ⇒ `stalled` para architect-resolve.
      # Disjunción con central#76: aquella rama materializa la label cuando SÍ
      # hay veredicto en prosa; ésta relanza cuando NO lo hay. Se separan por la
      # misma pregunta (¿veredicto vigente para el head?), sin carrera.
      - name: Materializar estado del Reviewer (label lgtm / rama sin-veredicto AP-025)
        if: always() && steps.gate.outputs.run == 'true'
        uses: actions/github-script@v7
        env:
          ARM_PAT: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
          # Diagnóstico terminal de la sesión muerta (AP-040): salida ESTRUCTURADA
          # de la action (execution file JSON + outcome del step), jamás substring
          # de log (clase regex-polarity). `execution_file` puede venir vacío si el
          # step murió antes de setear el output ⇒ fallback al path canónico del
          # base-action (`${RUNNER_TEMP}/claude-execution-output.json`).
          EXEC_FILE: ${{ steps.reviewer.outputs.execution_file }}
          STEP_OUTCOME: ${{ steps.reviewer.outcome }}
          STEP_CONCLUSION: ${{ steps.reviewer.conclusion }}
          TIMEOUT_MIN: ${{ inputs.timeout_minutes }}
        with:
          script: |
            const O = { owner: context.repo.owner, repo: context.repo.repo };
            const n = context.payload.pull_request.number;
            const headSha = context.payload.pull_request.head.sha;
            // Paginación COMPLETA (no `per_page: 100` a secas): la API de
            // issue-comments devuelve orden ASCENDENTE (los 100 más ANTIGUOS en la
            // página 1). En un PR de épica multironda (>100 comentarios — la clase
            // exacta que motiva AP-025) el marcador que ESTE step acaba de postear
            // y los veredictos recientes viven en páginas 2+; sin paginar, el cap 1
            // por head SHA contaría 0 (loop de relanzamientos) y `vs` saldría vacío
            // en PRs ya revisados (relanzamiento espurio). Con el `return` previo
            // esta limitación era benigna; la rama sin-veredicto la vuelve dañina.
            const cs = await github.paginate(github.rest.issues.listComments, { ...O, issue_number: n, per_page: 100 });
            // Veredicto anclado a la PRIMERA palabra del comentario (cabecera
            // ADR-063), jamás substring (clase regex-polarity, PR #1133).
            const vs = cs.filter(c => /^\s*(LGTM|REVIEW|NITS)\b/.test((c.body || '').trim()));
            const lastVc = vs[vs.length - 1] || null;
            // ¿El último veredicto es VIGENTE para el head actual? Vigente si se
            // posteó DESPUÉS del commit del head (committer.date vs created_at —
            // misma comprobación que el lgtm-remat del watchdog y el
            // turn-close-failsafe). Cubre el caso multironda: un REVIEW de una
            // ronda previa NO cuenta como veredicto del head nuevo. Fail-closed a
            // «hay veredicto» si getCommit falla: no relanzar sobre incertidumbre.
            // Sin veredicto alguno (lastVc null) ⇒ directamente rama sin-veredicto.
            let verdictForHead = !!lastVc;
            if (lastVc) {
              try {
                const { data: hc } = await github.rest.repos.getCommit({ ...O, ref: headSha });
                verdictForHead = new Date(lastVc.created_at) > new Date(hc.commit.committer.date);
              } catch (e) { core.info(`AP-025 head-check: ${e.message} (fail-closed a veredicto presente)`); verdictForHead = true; }
            }
            const patCall = async (method, path, body) => {
              const res = await fetch(`https://api.github.com/repos/${O.owner}/${O.repo}${path}`, {
                method, headers: { Authorization: `Bearer ${process.env.ARM_PAT}`, Accept: 'application/vnd.github+json' },
                body: body ? JSON.stringify(body) : undefined });
              if (!res.ok && res.status !== 404) core.warning(`AP-025 ${method} ${path}: HTTP ${res.status}`);
              return res;
            };
            // Diagnóstico terminal de la sesión muerta (AP-040): lee la salida
            // ESTRUCTURADA de la action (el último mensaje `result` del execution
            // file: `subtype` ∈ {success, error_max_turns, error_during_execution},
            // `is_error`, `duration_ms`), jamás substring de log (clase regex-
            // polarity). Cuatro buckets: `max-turns` (identificación POSITIVA de
            // presupuesto — único que activa el fast-path), `timeout` (job cancelado
            // o wall rozando `timeout_minutes`), `crash` (cualquier otra conclusión
            // con execution file legible — error_during_execution, is_error, o
            // success-sin-veredicto), `ilegible` (sin execution file parseable). Todo
            // lo que NO es `max-turns` ⇒ fail-open al relanzamiento de hoy.
            const diagnoseTerminal = () => {
              const fs = require('fs');
              const fmtWall = (ms) => Number.isFinite(ms)
                ? `${Math.floor(Math.round(ms / 1000) / 60)}m ${Math.round(ms / 1000) % 60}s`
                : 'wall ilegible';
              const execPath = process.env.EXEC_FILE
                || `${process.env.RUNNER_TEMP || '/tmp'}/claude-execution-output.json`;
              const timeoutMin = Number(process.env.TIMEOUT_MIN) || 0;
              const outcome = process.env.STEP_OUTCOME || '';
              let last = null;
              try {
                const arr = JSON.parse(fs.readFileSync(execPath, 'utf8'));
                const list = Array.isArray(arr) ? arr : [arr];
                for (let i = list.length - 1; i >= 0; i--) {
                  if (list[i] && list[i].type === 'result') { last = list[i]; break; }
                }
                if (!last) last = list[list.length - 1] || null;
              } catch (e) { core.info(`AP-040 diag: execution file ilegible (${e.message})`); }
              const wallMs = last && Number.isFinite(last.duration_ms) ? last.duration_ms : NaN;
              const wall = fmtWall(wallMs);
              if (last && last.subtype === 'error_max_turns') return { causa: 'max-turns', wall };
              // Timeout de job: el step se cancela (result no llega) o el wall roza el
              // techo (margen 30s). Positivo, pero NO presupuesto-de-turnos ⇒ relanzar.
              if (outcome === 'cancelled' ||
                  (timeoutMin && Number.isFinite(wallMs) && wallMs >= timeoutMin * 60 * 1000 - 30000)) {
                return { causa: 'timeout', wall };
              }
              if (!last) return { causa: 'ilegible', wall };
              return { causa: 'crash', wall };
            };

            // ── Rama SIN-VEREDICTO (AP-025 + AP-040): cap 1 por head SHA; reincidencia
            // O muerte-por-presupuesto POSITIVA ⇒ escalada directa (sin relanzar).
            if (!verdictForHead) {
              const MARK = `<!-- reviewer-no-verdict-relaunch: ${headSha} -->`;
              const prior = cs.filter(c => (c.body || '').includes(MARK)).length;
              const diag = diagnoseTerminal();
              const causaLine = `causa: ${diag.causa} · ${diag.wall}`;
              // Fast-path muerte-por-presupuesto (AP-040): `max-turns` es identificación
              // POSITIVA de que la review no cabe en el presupuesto. Relanzar una sesión
              // idéntica la condena a morir igual (mismo racional que la 2ª muerte de
              // AP-025): NO quemar el cap-1 ⇒ directo a persistent + `stalled`
              // (architect-resolve re-dimensiona). Cualquier otra causa ⇒ relanzar.
              const budgetDeath = diag.causa === 'max-turns';
              if (prior >= 1 || budgetDeath) {
                await patCall('POST', `/issues/${n}/labels`, { labels: ['stalled'] });
                const motivo = budgetDeath && prior < 1
                  ? `muerte-por-presupuesto POSITIVA (\`error_max_turns\`) en la 1ª conclusión — fast-path AP-040: relanzar una sesión idéntica moriría igual, no se quema el cap-1`
                  : `2ª conclusión del Reviewer SIN veredicto para el mismo head — una 2ª muerte indica que la review no cabe en el presupuesto (no un flake)`;
                await github.rest.issues.createComment({ ...O, issue_number: n,
                  body: `**reviewer · rama sin-veredicto (AP-025/AP-040)**: ${motivo}. Anomalía para architect-resolve (\`stalled\`). \`${causaLine}\`\n\n<!-- reviewer-no-verdict-persistent -->` });
                core.warning(`AP-040: escalada a architect-resolve para ${headSha.slice(0,7)} — ${causaLine}${budgetDeath ? ' (fast-path presupuesto)' : ''}.`);
                return;
              }
              // remove+add fuerza el evento `labeled` aunque hubiera un resto; con
              // el PAT porque un `labeled` del GITHUB_TOKEN no dispara reviewer.yml.
              await patCall('DELETE', `/issues/${n}/labels/needs-review`);
              await patCall('POST', `/issues/${n}/labels`, { labels: ['needs-review'] });
              await github.rest.issues.createComment({ ...O, issue_number: n,
                body: `**reviewer · rama sin-veredicto (AP-025)**: la sesión del Reviewer concluyó sin veredicto anclado (LGTM/REVIEW/NITS, cabecera ADR-063) para el head \`${headSha.slice(0,7)}\` — muerte por crash/infra antes de postear (no presupuesto: si lo fuera, iría directo a \`stalled\`). Transición materializada por ESTADO: \`needs-review\` re-aplicada con el PAT (sesión fresca por evento, latencia cero). Cap 1 por head SHA. \`${causaLine}\`\n\n${MARK}` });
              core.notice(`AP-040: needs-review re-aplicada para ${headSha.slice(0,7)} (relanzamiento por evento) — ${causaLine}.`);
              return;
            }
            // ── Rama CON veredicto (ADR-218): materializa la label lgtm.
            const lastV = (lastVc.body || '').trim().split(/\s/)[0].replace(':','');
            if (lastV === 'LGTM') {
              const res = await fetch(`https://api.github.com/repos/${O.owner}/${O.repo}/issues/${n}/labels`, {
                method: 'POST',
                headers: { Authorization: `Bearer ${process.env.ARM_PAT}`, Accept: 'application/vnd.github+json' },
                body: JSON.stringify({ labels: ['lgtm'] }) });
              if (!res.ok) core.warning(`label lgtm: HTTP ${res.status}`);
            } else {
              await github.rest.issues.removeLabel({ ...O, issue_number: n, name: 'lgtm' }).catch(() => {});
            }
