name: Claude Code

# Dispara cuando aparece @claude en:
#  - el cuerpo o título de un issue (al abrirlo o editarlo)
#  - un comentario de issue
#  - un comentario de revisión sobre un PR
#  - el cuerpo de una review de PR
#
# El workflow del Reviewer (reviewer.yml) sigue separado.
# Loop Creator ↔ Reviewer post ADR-063: el Creator cierra con tag
# ([READY-TO-MERGE], [NEEDS-HUMAN], o @reviewer) y este workflow
# aplica las labels correspondientes. Cap de 3 comentarios de
# claude[bot] en el PR para evitar espirales. Kill-switch vía label
# `pause-agents`.

# CALLABLE (agent-pipeline): los triggers de evento viven en el stub del
# repo consumidor; este workflow hereda el contexto github.event del caller.
on:
  workflow_call:
    inputs:
      runner:
        description: Runner label (ej. ubuntu-latest, ubicloud-standard-2)
        type: string
        default: ubuntu-latest
      default_branch:
        description: Rama por defecto del repo consumidor
        type: string
        default: main
      creator_model:
        description: Modelo del Creator
        type: string
        default: claude-opus-4-8
      creator_max_turns:
        description: max-turns del Creator
        type: number
        default: 200
      bot_comment_cap:
        description: Cap de comentarios de claude[bot] por PR antes de human-needed
        type: number
        default: 8
      epic_label:
        # Label que marca los issues de cadena (2026-07-13, wmcb#20): los guards
        # check_chain y check_panel la referenciaban SIN declararla — GitHub la
        # resolvía a "" en silencio y ambos guards nacieron inertes. Mismo
        # default que epic-merge y watchdog.
        type: string
        default: epica
      reviewer_workflow_name:
        # Valor de `name:` del stub del Reviewer en el consumidor. Lo usa el
        # dedupe del open-review-failsafe (AP-016) para identificar los runs del
        # Reviewer por su `name` (el run pertenece al stub caller). Mismo default
        # e idéntico contrato que watchdog.yml (reviewer_workflow_name).
        type: string
        default: Opus Reviewer
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      REVIEWER_GITHUB_TOKEN:
        required: true
      WORKFLOWS_PUSH_TOKEN:
        # Opcional (2026-07-15, decisión del propietario, enmienda AP-012):
        # PAT mínimo Contents+Workflows SIN Pull requests. Entra SOLO en el
        # checkout del job creator: los `git push` de la sesión pueden incluir
        # `.github/workflows/**` EN RAMA. Mergear le es imposible por
        # construcción (el PAT no tiene PRs; la App no mergea; main protegida
        # con enforce_admins). Sin el secret: comportamiento previo intacto
        # (consumidores sin cambios).
        required: false

jobs:
  claude:
    # Solo arranca si el evento contiene @claude. Esto reduce ruido y coste.
    #
    # FIX zero-width joiner (PR #205, 2026-05-23):
    # El action emite ocasionalmente un U+200D (zero-width joiner)
    # entre '@' y 'claude' al renderizar mentions del Reviewer. El
    # substring literal '@claude' deja de aparecer en el body y
    # contains() devuelve false. El Creator nunca arranca pese a que
    # el Reviewer cree haberlo invocado. El sentinel HTML comment
    # '<!-- ping-creator -->' es marca explícita de máquina, invisible
    # en el render del comment, emitida por el Reviewer junto al
    # '@claude' literal (que sigue visible para humanos). Convive con
    # '@claude' literal: humanos pingean a mano con '@claude' simple
    # y siguen disparando. Ver ADR-086.
    # GATE author_association (agent-pipeline, repos públicos): solo OWNER/
    # MEMBER/COLLABORATOR arman al Creator. Los pings de máquina (Reviewer,
    # epic-merge, watchdog) salen con el PAT del propietario ⇒ OWNER.
    if: |
      (contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) || contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association) || contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)) &&
      ((github.event_name == 'issue_comment' && (contains(github.event.comment.body, '@claude') || contains(github.event.comment.body, '<!-- ping-creator -->'))) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))))

    runs-on: ${{ inputs.runner }}

    # Permisos mínimos para que Claude pueda escribir archivos, abrir PRs
    # y comentar issues. id-token sirve para OIDC si añadimos providers
    # alternativos (Bedrock, Vertex) en el futuro; no estorba dejarlo.
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      # Kill-switch: si el issue/PR tiene la label `pause-agents`,
      # aborta sin correr el agente. ADR-063.
      - name: Check pause-agents kill-switch
        id: check_pause
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.issue?.labels
              || context.payload.pull_request?.labels
              || [];
            const paused = labels.some(l => l.name === 'pause-agents');
            if (paused) {
              core.notice('Label `pause-agents` presente. Abortando Creator.');
            }
            core.setOutput('paused', paused);

      # Cap de iteraciones: si en este PR ya hay 3+ comentarios de
      # claude[bot] y el disparo viene de un bot (Reviewer), asume
      # loop runaway, añade label `human-needed` y para. Si el
      # disparo viene de un humano, el cap NO aplica (override).
      # ADR-063.
      #
      # Ajustar CAP empíricamente si tu agente añade un comentario
      # de resumen al abrir el PR (en cuyo caso CAP-1 = iteraciones
      # efectivas Reviewer↔Creator).
      - name: Check iteration cap (PR contexts only)
        id: check_iterations
        if: steps.check_pause.outputs.paused != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // CAP cuenta TODOS los comentarios de claude[bot] (Creator + Reviewer
            // combinados). Una ronda completa Reviewer→Creator añade ~2 comentarios.
            // CAP=8 permite ~3-4 rondas antes de escalar a humano. Si emergen loops
            // bot↔bot patológicos, bajar; si el flow se atasca legítimamente, subir.
            const CAP = ${{ inputs.bot_comment_cap }};

            // Skip si sender es humano; cap solo aplica a loops bot↔bot.
            if (context.payload.sender?.type === 'User') {
              core.setOutput('cap_reached', false);
              return;
            }

            // Resolver número del PR si el contexto es un PR.
            const isPRComment =
              context.eventName === 'issue_comment'
              && !!context.payload.issue?.pull_request;
            const isPRReviewEvent =
              context.eventName === 'pull_request_review'
              || context.eventName === 'pull_request_review_comment';
            if (!isPRComment && !isPRReviewEvent) {
              core.setOutput('cap_reached', false);
              return;
            }

            const prNumber = context.payload.issue?.number
              || context.payload.pull_request?.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const botComments = comments.filter(
              c => c.user.login === 'claude[bot]'
            );

            if (botComments.length >= CAP) {
              core.notice(
                `Cap de ${CAP} comentarios de claude[bot] alcanzado `
                + `(actual: ${botComments.length}). Añadiendo label `
                + `\`human-needed\` y parando.`
              );
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: ['human-needed'],
              });
              core.setOutput('cap_reached', true);
            } else {
              core.setOutput('cap_reached', false);
            }

      # GUARD de integridad de cadena (v1.2, incidente wmcb 2026-07-11):
      # antes de disparar al Creator sobre un issue `epica`, verificar que la
      # cadena alcanzable via launch-next termina en epic-audit. Una cadena
      # sin auditoría al final es defecto de horneado: se marca stalled y NO
      # se quema una sesión de agente. Solo aplica al arm de issues (no PRs).
      - name: Check epic chain integrity (issues only)
        id: check_chain
        if: |
          steps.check_pause.outputs.paused != 'true'
          && steps.check_iterations.outputs.cap_reached != 'true'
        uses: actions/github-script@v7
        env:
          IN_EPIC_LABEL: ${{ inputs.epic_label }}
        with:
          github-token: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const isIssueCtx = !!context.payload.issue && !context.payload.issue.pull_request;
            if (!isIssueCtx) { core.setOutput('broken', 'false'); return; }
            const issue = context.payload.issue;
            if (!process.env.IN_EPIC_LABEL) { core.setFailed('guard de cadena: epic_label vacío — el guard no puede operar (wmcb#20: nunca bypass silencioso)'); return; }
            const labels = (issue.labels || []).map(l => l.name);
            if (!labels.includes(process.env.IN_EPIC_LABEL)) { core.setOutput('broken', 'false'); return; }
            // Traversal launch-next con cap 20. De paso (wmcb#21): ¿algún body
            // de la cadena declara «Invariantes funcionales»? La casa canónica
            // es el issue de épica (#14 fijó el lado lector; esto cubre el
            // horneado: la omisión se ve AL ARMAR, cuando aún es editable).
            let body = issue.body || '';
            let hops = 0;
            let hasInvariants = false;
            while (hops++ < 20) {
              if (/invariantes funcionales/i.test(body)) hasInvariants = true;
              if (/<!--\s*epic-audit:/.test(body)) {
                if (!hasInvariants) {
                  // AVISO no bloqueante (wmcb#21): NO stalled, NO abortar — hay
                  // épicas legítimas sin superficie funcional (doc-only). El
                  // Auditor ya degrada a la DoD como sustituto (post-#14); esto
                  // lo hace visible cuando el Architect aún puede editar.
                  // AP-018 §1+§2 (central#55): estado materializado, no inferido.
                  // El aviso es informativo (el arm CONTINÚA) pero se reposteaba
                  // ÍNTEGRO en cada re-arm y por partida DOBLE cuando el mismo arm
                  // dispara `issues`+`issue_comment` (8 comentarios en ~1h15,
                  // finplan#1394). El hecho «ya avisé» no vivía en ningún sitio:
                  // se LEE el marcador en los comentarios del issue (listComments
                  // = lectura por-issue fuertemente consistente, NO el search
                  // index) y si ya existe se salta. Cubre re-arm (§2) y el doble
                  // disparo del mismo arm cuando el gap supera la propagación (§1).
                  const { data: existing } = await github.rest.issues.listComments({ owner, repo, issue_number: issue.number, per_page: 100 });
                  const alreadyWarned = existing.some(c => /<!--\s*sin-invariantes\s*-->/.test(c.body || ''));
                  if (!alreadyWarned) {
                    await github.rest.issues.createComment({ owner, repo, issue_number: issue.number,
                      body: '**claude-code · aviso de horneado**: ningún issue de la cadena declara el bloque `## Invariantes funcionales de la épica` (casa canónica: el issue de épica). Sin él, la verificación funcional de la auditoría degrada a la DoD del Creator como sustituto. El arm CONTINÚA (épicas doc-only son legítimas); si esta épica tiene superficie funcional, edita el issue y añade el bloque ahora.\n\n<!-- sin-invariantes -->' });
                  }
                }
                core.setOutput('broken', 'false'); return;
              }
              const m = body.match(/<!--\s*launch-next:\s*#?(\d+)\s*-->/);
              if (!m) break; // sin sentinel y sin epic-audit: cadena rota aquí
              const next = await github.rest.issues.get({ owner, repo, issue_number: Number(m[1]) });
              body = next.data.body || '';
            }
            // Caso DEGENERADO vs multi-eslabón roto (2026-07-15, central#36 —
            // 5-whys de wmcb#61: la «épica 1/1» sin sentinels ES un suelto
            // disfrazado; la única salida era la escalada aunque la remediación
            // es derivable — 1h21m de intervención humana que esto mecaniza).
            // Degenerado = el PROPIO issue no tiene launch-next (hops==1 y sin
            // sentinel alguno): degradar a régimen suelto y CONTINUAR el arm.
            // Multi-eslabón roto = la cadena se rompe aguas abajo: re-hornear
            // es decisión del Architect, NO derivable — escalada como hoy.
            if (hops === 1) {
              await github.rest.issues.removeLabel({ owner, repo, issue_number: issue.number, name: process.env.IN_EPIC_LABEL }).catch(() => {});
              await github.rest.issues.createComment({ owner, repo, issue_number: issue.number,
                body: `**claude-code · guard de cadena**: este issue lleva la label \`${process.env.IN_EPIC_LABEL}\` pero no forma cadena (sin \`launch-next\` ni \`epic-audit\`): «épica de un eslabón» = issue SUELTO. Degradado al régimen de sueltos (label retirada) — el arm CONTINÚA; el pipeline hará PR → review → merge → auditoría automática al cierre.\n\n<!-- cadena-degradada-a-suelto -->` });
              core.setOutput('broken', 'false');
              return;
            }
            await github.rest.issues.addLabels({ owner, repo, issue_number: issue.number, labels: ['stalled'] });
            await github.rest.issues.createComment({ owner, repo, issue_number: issue.number,
              body: '**claude-code · guard de cadena**: la cadena alcanzable desde este issue via launch-next NO termina en un sentinel epic-audit (defecto de horneado multi-eslabón: re-hornear es decisión del Architect). No se arma al Creator; escalado via `stalled`.\n\n<!-- cadena-sin-auditoria -->' });
            core.setOutput('broken', 'true');

      # GUARD de panel consumido (2026-07-12, 3ª recurrencia de la clase
      # «limpieza de cola saltada en el lanzamiento»: R·5+R·6, proof-fase-b,
      # G1/G2 — la limpieza dependía de que la sesión del Architect que lanza
      # RECORDARA el protocolo, y las sesiones no comparten contexto). Antes
      # de armar manualmente un issue `epica`, el panel de la épica anterior
      # (auditorías y process-proposals abiertas) debe estar consumido: cada
      # cierre con su línea de resolución. Exenciones mecánicas: arms de
      # epic-merge (epic-auto-launch), correctivos de una auditoría viva (el
      # body cita el nº de una auditoría abierta) y override explícito
      # `<!-- panel-ok -->` en el comentario de arm. Solo issues, no PRs.
      - name: Check panel consumed (issues only)
        id: check_panel
        if: |
          steps.check_pause.outputs.paused != 'true'
          && steps.check_iterations.outputs.cap_reached != 'true'
          && steps.check_chain.outputs.broken != 'true'
        uses: actions/github-script@v7
        env:
          IN_EPIC_LABEL: ${{ inputs.epic_label }}
        with:
          github-token: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const isIssueCtx = !!context.payload.issue && !context.payload.issue.pull_request;
            if (!isIssueCtx) { core.setOutput('blocked', 'false'); return; }
            const issue = context.payload.issue;
            if (!process.env.IN_EPIC_LABEL) { core.setFailed('guard de panel: epic_label vacío — el guard no puede operar (wmcb#20: nunca bypass silencioso)'); return; }
            const labels = (issue.labels || []).map(l => l.name);
            if (!labels.includes(process.env.IN_EPIC_LABEL)) { core.setOutput('blocked', 'false'); return; }
            const armBody = context.payload.comment?.body || '';
            // Exención 1: arm mecánico de epic-merge (encadenado mid-épica)
            if (armBody.includes('epic-auto-launch')) { core.setOutput('blocked', 'false'); return; }
            // Comentarios del issue: base del force PEGAJOSO (§3) y del dedup del
            // bloqueo (§1). listComments = lectura por-issue fuertemente
            // consistente (NO el search index). Una sola lectura, reusada.
            const { data: issueComments } = await github.rest.issues.listComments({ owner, repo, issue_number: issue.number, per_page: 100 });
            // Exención 2: override explícito `panel-ok`. AP-018 §3 (central#55): el
            // force es PEGAJOSO. El hecho que certifica («el panel está
            // consumido») es por-ISSUE, no por-comentario; exigirlo en CADA arm
            // hacía que un re-arm posterior sin repetir el marcador reabriera el
            // bloqueo (finplan run 29453493296, arm de 21:53Z abortado por el
            // mismo guard tras el force de 21:09Z). Se lee de CUALQUIER comentario
            // de confianza del issue (OWNER/MEMBER/COLLABORATOR — mismo gate de
            // actor que el arm; en repo público un comentario ajeno no debe
            // forzar) o del comentario de arm actual.
            const TRUSTED = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
            const panelOk = /<!--\s*panel-ok\s*-->/.test(armBody)
              || issueComments.some(c => /<!--\s*panel-ok\s*-->/.test(c.body || '') && TRUSTED.has(c.author_association));
            if (panelOk) { core.setOutput('blocked', 'false'); return; }
            // Panel: auditorías y propuestas abiertas (dedup por nº — un issue con
            // ambas labels aparecería dos veces).
            const openByNum = new Map();
            for (const lbl of ['auditoria', 'process-proposal']) {
              const res = await github.rest.issues.listForRepo({ owner, repo, state: 'open', labels: lbl, per_page: 50 });
              for (const i of res.data) if (!i.pull_request) openByNum.set(i.number, i);
            }
            // AP-019 (central#55, agravante ESTRUCTURAL): estado DECLARADO de
            // consumo. La clase raíz era que «panel consumido» solo se podía
            // materializar CERRANDO el panel, y `close` está fuera del allowlist de
            // TODOS los agentes ⇒ un guard que solo un humano podía apagar
            // (finplan#1381: consumo declarado 3× e ignorado por el guard porque el
            // issue seguía `open`). Doctrina estado-materializado (AP-008/AP-018):
            // el guard acepta el estado DECLARADO `<!-- panel-consumido: #N -->` de
            // CUALQUIER comentario de confianza del issue (mismo gate de actor que
            // `panel-ok`; reusa la lectura `issueComments`, sin API extra) —
            // declarar es un comentario, DENTRO del allowlist de todo agente. NO se
            // expande el allowlist destructivo del watchdog con `close` (opción A
            // del fork: más blast radius sobre el ciclo de vida del issue,
            // reestructura del Architect). El cierre real del panel puede seguir
            // ocurriendo después (signal-closer, epic-merge, humano); el guard ya
            // no depende HARD de él.
            const consumed = new Set();
            for (const c of issueComments) {
              if (!TRUSTED.has(c.author_association)) continue;
              for (const m of (c.body || '').matchAll(/<!--\s*panel-consumido:\s*#?(\d+)\s*-->/g)) consumed.add(Number(m[1]));
            }
            const open = [...openByNum.values()].filter(i => !consumed.has(i.number));
            if (!open.length) { core.setOutput('blocked', 'false'); return; }
            // Exención 3: correctivo de una auditoría viva — su body cita el nº
            const body = issue.body || '';
            const cited = new Set([...body.matchAll(/#(\d+)/g)].map(m => Number(m[1])));
            const audits = open.filter(i => (i.labels || []).map(l => l.name).includes('auditoria'));
            if (audits.some(a => cited.has(a.number))) { core.setOutput('blocked', 'false'); return; }
            // BLOQUEO: panel sin consumir. AP-018 §1 (central#55): dedup por
            // marcador. El bloqueo se materializa UNA vez; el doble disparo
            // (issues+issue_comment del mismo arm) y los re-arms con el panel aún
            // sin consumir NO reposteaban el bloqueo (`panel-sin-consumir` ×3 en
            // finplan#1394). El `stalled` se re-asegura (idempotente) pero el
            // comentario solo se emite si el marcador no está ya presente.
            const list = open.map(i => `- #${i.number} (${(i.labels||[]).map(l=>l.name).join(', ')}): ${i.title}`).join('\n');
            await github.rest.issues.addLabels({ owner, repo, issue_number: issue.number, labels: ['stalled'] });
            const alreadyBlocked = issueComments.some(c => /<!--\s*panel-sin-consumir\s*-->/.test(c.body || ''));
            if (!alreadyBlocked) {
              await github.rest.issues.createComment({ owner, repo, issue_number: issue.number,
                body: `**claude-code · guard de panel**: hay panel de la épica anterior SIN consumir — el protocolo exige cerrarlo con línea de resolución al lanzar (3 omisiones históricas motivaron este guard):\n\n${list}\n\nNo se arma al Creator. Opciones: (a) consumir el panel (cerrar con línea de resolución) y re-armar; (b) declarar consumido un panel concreto con \`<!-- panel-consumido: #N -->\` en CUALQUIER comentario de confianza del issue (estado materializado, AP-019) — no requiere \`close\` (fuera del allowlist de los agentes); (c) forzar el arm completo con \`<!-- panel-ok -->\` (force pegajoso, AP-018 §3) si el lanzamiento debe preceder al cierre.\n\n<!-- panel-sin-consumir -->` });
            }
            core.setOutput('blocked', 'true');

      - name: Checkout repository
        if: |
          steps.check_pause.outputs.paused != 'true'
          && steps.check_iterations.outputs.cap_reached != 'true'
          && steps.check_chain.outputs.broken != 'true'
          && steps.check_panel.outputs.blocked != 'true'
          && steps.check_serial.outputs.blocked != 'true'
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 trae todo el historial. Necesario para que Claude
          # pueda razonar sobre commits previos cuando aplique.
          fetch-depth: 0
          # Si el repo provee WORKFLOWS_PUSH_TOKEN (central, AP-012 enmienda
          # 2026-07-15), los push del workspace salen con él: el Creator puede
          # empujar workflows A SU RAMA. La API (PR, comentarios) sigue vía la
          # App. Vacío ⇒ token por defecto (comportamiento previo).
          token: ${{ secrets.WORKFLOWS_PUSH_TOKEN != '' && secrets.WORKFLOWS_PUSH_TOKEN || github.token }}

      # ───────────────────────────────────────────────────────────────────
      # Sync FORZADO a la rama base ACTUAL antes de que la acción ramifique.
      # Causa raíz (PR #866 salió 12 commits por detrás → conflicto): en eventos
      # `issue_comment`, actions/checkout hace checkout de `github.sha`, que puede
      # venir rancio; `claude-code-action` ramifica la rama nueva desde ese HEAD
      # local. Esto fuerza el HEAD local a `origin/develop` antes de la acción, de
      # modo que la rama del Creator SIEMPRE salga del develop más reciente.
      # SOLO en trabajo de issue nuevo: en eventos de PR el Creator debe quedarse
      # en la rama del PR (p.ej. para resolver conflictos), así que NO reseteamos.
      # ───────────────────────────────────────────────────────────────────
      - name: Guard serial — un solo Creator en vuelo (solo issues)
        # Hard stop (2026-07-12, incidente #1303: dos arms manuales —
        # correctivo K1 #1298 y arranque L1 #1299 — a 9 min ⇒ dos PRs de
        # agente vivos ⇒ colisión de merge y rebase forzado). La serialidad
        # era regla dura de protocolo sin enforcement mecánico; esto lo
        # fuerza: si ya hay CUALQUIER PR de agente (claude/*) abierto, NO se
        # arma otro Creator desde un issue. Arms de auditoría (label
        # `auditoria`/`auditoria-completa`) quedan fuera del régimen: no
        # producen PRs de código (2026-07-13, deadlock #1312). El loop Creator↔Reviewer (contexto
        # PR) no pasa por aquí. Override manual: label `serial-ok` en el issue.
        id: check_serial
        if: |
          steps.check_pause.outputs.paused != 'true'
          && steps.check_iterations.outputs.cap_reached != 'true'
          && steps.check_chain.outputs.broken != 'true'
          && steps.check_panel.outputs.blocked != 'true'
          && steps.check_serial.outputs.blocked != 'true'
          && (
            (github.event_name == 'issue_comment' && !github.event.issue.pull_request)
            || github.event_name == 'issues'
          )
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const issue = context.payload.issue;
            if ((issue.labels || []).some(l => l.name === 'serial-ok')) {
              core.notice('serial-ok presente: guard serial omitido.');
              core.setOutput('blocked', 'false');
              return;
            }
            // Exención por CLASE (2026-07-13, deadlock #1312): la serialidad
            // existe por colisión de PRs de código (#1303). Un arm de
            // auditoría no abre PRs claude/* — no puede colisionar — y además
            // nunca retiraría serial-activo (el Auditor no abre PR, que es la
            // ruta de retirada): dársela crea deadlock. Fuera del régimen
            // serial: ni recibe la label, ni bloquea, ni es bloqueado.
            const armLabels = (issue.labels || []).map(l => l.name);
            if (['auditoria', 'auditoria-completa'].some(n => armLabels.includes(n))) {
              core.notice('arm de auditoría: no produce PRs de código — exento del régimen serial.');
              core.setOutput('blocked', 'false');
              return;
            }
            // Un Creator en vuelo se materializa de DOS formas (2026-07-12):
            // el flag `serial-activo` en el issue que lo lanzó (puesto aquí al
            // dejar pasar, borrado por el Creator al abrir su PR o por el
            // watchdog si el Creator muere sin abrirlo — cierra la ventana
            // ciega entre el arm y el nacimiento del PR), O un PR claude/*
            // abierto (fase tardía). Cualquiera de las dos bloquea.
            const { data: prs } = await github.rest.pulls.list({ owner, repo, state: 'open', per_page: 100 });
            const inFlightPRs = prs.filter(p => p.head.ref.startsWith('claude/')).map(p => `#${p.number} (${p.head.ref})`);
            const { data: flagged } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'serial-activo', per_page: 20 });
            const inFlightArms = flagged.filter(i => i.number !== issue.number).map(i => `#${i.number} (armado)`);
            const inFlight = [...inFlightPRs, ...inFlightArms];
            if (inFlight.length > 0) {
              await github.rest.issues.createComment({ owner, repo, issue_number: issue.number,
                body: `**claude-code · guard serial**: ya hay un Creator en vuelo (${inFlight.join(', ')}). La serialidad es regla dura — no se arma un segundo Creator en paralelo. Este issue NO se arma; queda **EN COLA** (label \`en-cola\`): al liberarse la serie por un merge, epic-merge armará automáticamente el más antiguo de la cola (2026-07-14). Para forzar YA: \`serial-ok\`.\n\n<!-- serial-guard -->` });
              await github.rest.issues.addLabels({ owner, repo, issue_number: issue.number, labels: ['stalled', 'en-cola'] });
              core.setOutput('blocked', 'true');
              core.warning(`Guard serial: ${inFlight.length} en vuelo; no se arma #${issue.number}.`);
            } else {
              // Deja pasar: marca ATÓMICAMENTE este issue como Creator en vuelo.
              await github.rest.issues.removeLabel({ owner, repo, issue_number: issue.number, name: 'en-cola' }).catch(() => {});
              await github.rest.issues.addLabels({ owner, repo, issue_number: issue.number, labels: ['serial-activo'] });
              core.setOutput('blocked', 'false');
            }

      - name: Sync a la rama base actual antes de ramificar (solo issues, no PRs)
        if: |
          steps.check_pause.outputs.paused != 'true'
          && steps.check_iterations.outputs.cap_reached != 'true'
          && steps.check_chain.outputs.broken != 'true'
          && steps.check_panel.outputs.blocked != 'true'
          && steps.check_serial.outputs.blocked != 'true'
          && (
            (github.event_name == 'issue_comment' && !github.event.issue.pull_request)
            || github.event_name == 'issues'
          )
        env:
          BASE: ${{ inputs.default_branch }}
        run: |
          git fetch origin "$BASE"
          git checkout -B "$BASE" "origin/$BASE"
          git reset --hard "origin/$BASE"
          echo "$BASE sincronizado a $(git rev-parse --short HEAD)"

      - name: Graft vendored (capa común servida desde el central — AP-009)
        if: |
          steps.check_pause.outputs.paused != 'true'
          && steps.check_iterations.outputs.cap_reached != 'true'
          && steps.check_chain.outputs.broken != 'true'
          && steps.check_panel.outputs.blocked != 'true'
          && steps.check_serial.outputs.blocked != 'true'
        uses: talfarouriarte-cloud/agent-pipeline/.github/actions/graft-vendored@main

      - name: Capturar HEAD del PR (pre-sesión, contexto PR)
        # Para el re-review por ESTADO (2026-07-13, finplan#1319): la re-audit
        # tras nits no puede depender de que el Creator escriba `@reviewer`
        # (prosa estocástica — hoy lo omitió racionalizando trivialidad,
        # contra ADR-193). El hecho es el push: se captura el HEAD antes de
        # la sesión y el post-step compara.
        id: pr_head_before
        if: |
          github.event_name == 'issue_comment' && github.event.issue.pull_request
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const { data: pr } = await github.rest.pulls.get({ owner, repo,
              pull_number: context.payload.issue.number });
            core.setOutput('sha', pr.head.sha);
            core.setOutput('ref', pr.head.ref);

      - name: Run Claude Code
        if: |
          steps.check_pause.outputs.paused != 'true'
          && steps.check_iterations.outputs.cap_reached != 'true'
          && steps.check_chain.outputs.broken != 'true'
          && steps.check_panel.outputs.blocked != 'true'
          && steps.check_serial.outputs.blocked != 'true'
        # Blindaje de auth: forzamos OAuth Max como única vía de auth para el
        # Creator. Razón: la action `anthropics/claude-code-action@v1` usa
        # internamente la SDK estándar de Anthropic, que lee
        # `ANTHROPIC_API_KEY` del env automáticamente. Si está disponible,
        # la SDK puede priorizarla sobre el `claude_code_oauth_token` (orden
        # opaco, no documentado). Resultado empírico: PRs del Creator
        # factuaban ~$11 contra la API key facturada en lugar de consumir el
        # plan Max. (El Reviewer también usa claude-code-action@v1 desde
        # 2026-05-19 con el mismo blindaje; ver reviewer.yml.)
        #
        # Con `ANTHROPIC_API_KEY: ""` aquí, la SDK no encuentra API key en
        # env y queda solo el OAuth. Si OAuth Max falla por cualquier razón
        # (token expirado, rate limit), el job falla con error de auth claro
        # en lugar de facturar silenciosamente. Trade-off aceptado: pierdes
        # el fallback transparente al Creator a cambio de garantía de
        # que ningún PR del Creator se factura sin avisar. El Reviewer
        # sigue conservando su fallback documentado por footer.
        env:
          ANTHROPIC_API_KEY: ""
          # Auto-partición (CLAUDE.md): los arms de hijos deben salir como
          # actor humano — claude-code-action rechaza actores bot y el token
          # del agente aparece como claude[bot] (incidente #1048, 2026-07-04).
          ARM_TOKEN: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
        id: creator
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # claude-opus-4-8: modelo actual de mayor capacidad. Coherente
          # con la decisión de usar el modelo más capaz para creación de
          # código en el motor financiero. (Antes claude-opus-4-7; migrado
          # a 4.8 — mismo precio, mejor tool-calling, mejor manejo de
          # contexto largo/compactación, menos verbosidad de comentarios.)
          # max-turns 100 razonable con OAuth Max (no hay coste por uso,
          # solo cuota de bucket).
          claude_args: |
            --model ${{ inputs.creator_model }}
            --max-turns ${{ inputs.creator_max_turns }}
            --permission-mode bypassPermissions
            --allowedTools "Bash(gh pr create:*),Bash(gh pr view:*),Bash(gh pr edit:*),Bash(gh pr checks:*),Bash(gh pr merge:*)"

      # Auto-labeling según tag de cierre del Creator. ADR-063.
      # Solo en contextos de PR (los tags solo aplican en loop con Reviewer).
      #
      # FIX bucle silencioso (PR #180, 2026-05-21, ADR-064 amendment):
      # El step solo re-aplica la label si el último comment de claude[bot]
      # es POSTERIOR al comment que disparó el job. Razón: el trigger del
      # workflow (if: contains(comment.body, '@claude')) hace substring
      # match crudo y dispara también cuando otro agente (Reviewer)
      # menciona el literal `@claude` en su cuerpo aunque sea entre
      # backticks documentando convergencia. Si el step re-aplica label
      # leyendo SIEMPRE el último comment de claude[bot] (que sigue siendo
      # el del Creator de la ronda 1 con `@reviewer` al final), se genera
      # un loop Reviewer↔Auto-label sin que el Creator produzca trabajo
      # nuevo (14 rondas observadas en PR #180). El check de freshness
      # rompe el bucle estructuralmente.
      - name: Push residual con token de workflows (post-sesión)
        # 2026-07-15, central#46 (3 sesiones quemadas): claude-code-action
        # re-inicializa `origin` con su credencial de App al preparar el
        # entorno — el token del checkout queda pisado y el push de
        # `.github/workflows/**` muere (la App no tiene ese permiso). El
        # trabajo quedaba commiteado en LOCAL y se perdía con el runner.
        # Este post-step rescata el push FUERA de la sesión: si la rama
        # local claude/* tiene commits que no están en el remoto, empuja con
        # la URL credencializada (inmune al credential helper de la action)
        # y abre el PR si falta. Guard duro: SOLO ramas claude/*, jamás main.
        # Sin el secret (consumidores): env vacío ⇒ step skipped.
        if: always() && env.WF_PUSH != ''
        env:
          WF_PUSH: ${{ secrets.WORKFLOWS_PUSH_TOKEN }}
          GH_TOKEN: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH=$(git branch --show-current || true)
          case "$BRANCH" in claude/*) ;; *) echo "rama '$BRANCH' fuera del patrón claude/*: nada que rescatar"; exit 0;; esac
          git fetch -q origin "$BRANCH" 2>/dev/null || true
          AHEAD=$(git rev-list --count "origin/$BRANCH..HEAD" 2>/dev/null || echo "1")
          [ "$AHEAD" = "0" ] && { echo "sin commits residuales: nada que rescatar"; exit 0; }
          echo "rescatando commits locales de $BRANCH con el token de workflows"
          git push "https://x-access-token:${WF_PUSH}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:refs/heads/$BRANCH"
          if ! gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH" --state open --json number --jq '.[0].number' | grep -q .; then
            TITLE=$(git log -1 --pretty=%s)
            BODY=$(git log -1 --pretty=%b)
            FULLBODY=$(printf '%s\n\n---\n_PR abierto por el post-step de rescate (push residual con token de workflows, central#46): la action no puede pushear workflows; el trabajo estaba commiteado en local._' "$BODY")
            gh pr create --repo "$GITHUB_REPOSITORY" --head "$BRANCH" --base "${{ inputs.default_branch }}" --title "$TITLE" --body "$FULLBODY"
          fi

      - name: Materializar auditoria-completa (post-step determinista)
        # Fix 2026-07-12 (propuesta #1288 finplan): el informe del Auditor
        # aparece cuando la acción reescribe el tracking comment AL TERMINAR
        # la sesión; si la label (trigger de process-review) la aplica el
        # propio agente por bash DURANTE la sesión, el orden efectivo es
        # label→informe y process-review lee un panel a medias (medido:
        # 59s-3m17s de ventana). El mismo patrón que el veredicto del
        # Reviewer: el hecho lo materializa un paso determinista DESPUÉS.
        # Sale con el PAT: su evento labeled es el trigger.
        if: |
          always()
          && steps.check_pause.outputs.paused != 'true'
          && contains(join(github.event.issue.labels.*.name, ','), 'auditoria')
          && !contains(join(github.event.issue.labels.*.name, ','), 'auditoria-completa')
          && github.event.issue.pull_request == null
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.issue.number;
            // Verificación de estado materializado (2026-07-13, finplan#1296:
            // el post-step etiquetaba a ciegas y una sesión `success` que no
            // publicó informe consumó un panel fantasma en #1295 — 2ª instancia
            // de la clase informe-no-publicado). El hecho que la label declara
            // es «informe publicado»: se LEE (marcador grep-able del mandato
            // del Auditor: bloque fijo «## Métricas de proceso»), no se infiere
            // del resultado de la sesión. Cubre muerte de sesión Y
            // success-sin-publicar (always() ya trae ambos aquí).
            const HAS_REPORT = /##\s*Métricas de proceso/;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100 });
            const published = comments.some(c => HAS_REPORT.test(c.body || ''));
            if (!published) {
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ['stalled'] });
              await github.rest.issues.createComment({ owner, repo, issue_number,
                body: '**claude-code · post-step de auditoría**: la sesión del Auditor terminó SIN informe publicado (ningún comentario contiene el bloque `## Métricas de proceso`). NO se aplica `auditoria-completa` — el process-review no debe correr contra un panel vacío (clase informe-no-publicado, finplan#1296/#1295). Escalado vía `stalled`.\n\n<!-- informe-no-publicado -->' });
              core.warning(`auditoría #${issue_number}: sin informe publicado — auditoria-completa NO aplicada; stalled.`);
              return;
            }
            // Materialización del veredicto POR ESTADO (AP-013, 2026-07-15,
            // central#44). El marcador audit-verdict es la mitad-Auditor del
            // auto-archivo del panel (co-presencia con process-proposals,
            // process-review.yml). Su canal primario —línea final del informe—
            // era estéril POR CONSTRUCCIÓN: el tracking comment de claude[bot]
            // que la action reescribe con el informe ELIMINA todo comentario
            // HTML (5/5 hilos sin marcador, 4/4 re-arms humanos estériles:
            // wmcb#55/#58/#65/#66/#68, finplan#1381/#1383/#1386 — es el CANAL,
            // no el modelo). El `verdict-rearm` (que re-pedía prosa) se
            // sustituye por DERIVACIÓN POR ESTADO: con el informe publicado y
            // sin marcador, el veredicto se deriva del estado materializado y
            // lo publica ESTE step por PAT (REVIEWER_GITHUB_TOKEN — canal que
            // conserva HTML), nunca por prosa. Doctrina estado-primario: el
            // estado se materializa en el mismo job, no se re-infiere después.
            const HAS_VERDICT = /<!--\s*audit-verdict:\s*(clean|findings)\s*-->/;
            const hasVerdict = comments.some(c => HAS_VERDICT.test(c.body || ''));
            if (!hasVerdict) {
              // Estado 1 — escalada: labels FRESCAS por API (el Auditor añade
              // needs-human DURANTE la sesión; el payload del evento está frío).
              const { data: fresh } = await github.rest.issues.get({ owner, repo, issue_number });
              const labelNames = (fresh.labels || []).map(l => (typeof l === 'string' ? l : l.name));
              const escalated = labelNames.some(n => n === 'needs-human' || n === 'human-needed');
              // Estado 2 — correctivos vinculados al panel por cross-reference
              // del timeline (back-ref `auditoría #<panel>` del mandato,
              // epic-auditor.md §5). Paginación COMPLETA: truncar el timeline
              // sub-contaría correctivos y derivaría un falso `clean`.
              const timeline = await github.paginate(
                github.rest.issues.listEventsForTimeline,
                { owner, repo, issue_number, per_page: 100 });
              const correctiveNums = new Set();
              for (const ev of timeline) {
                if (ev.event !== 'cross-referenced') continue;
                const src = ev.source && ev.source.issue;
                if (!src || src.pull_request) continue; // solo issues, no PRs
                const srcLabels = (src.labels || []).map(l => (typeof l === 'string' ? l : l.name));
                if (srcLabels.includes('correctivo')) correctiveNums.add(src.number);
              }
              const correctivos = correctiveNums.size;
              // Derivación (AP-013 §1): ≥1 correctivo ⇒ findings; 0 y sin
              // escalada ⇒ clean; 0 CON escalada ⇒ AMBIGUO (hallazgo/escalado
              // sin correctivo materializado) ⇒ NO deriva, fail-safe VISIBLE
              // (setFailed + panel abierto), simétrico a finplan#1326 — un
              // `clean` mal derivado archivaría un panel con hallazgos, por eso
              // `clean` exige ausencia TOTAL de señal de hallazgo.
              let verdict;
              if (correctivos >= 1) verdict = 'findings';
              else if (!escalated) verdict = 'clean';
              if (!verdict) {
                await github.rest.issues.createComment({ owner, repo, issue_number,
                  body: '**claude-code · post-step de auditoría**: informe publicado sin `audit-verdict` y estado AMBIGUO (0 correctivos vinculados + escalada presente). NO se deriva el veredicto — un `clean` archivaría un panel con hallazgos. Panel abierto señalando la anomalía; requiere veredicto explícito del Auditor o del humano (AP-013 § ambigüedad).\n\n<!-- verdict-ambiguo -->' });
                core.setFailed(`auditoría #${issue_number}: veredicto no derivable (0 correctivos + escalada) — fail-safe visible, auditoria-completa NO aplicada.`);
                return;
              }
              await github.rest.issues.createComment({ owner, repo, issue_number,
                body: `**claude-code · post-step de auditoría**: \`audit-verdict\` DERIVADO por ESTADO (correctivos vinculados=${correctivos}, escalada=${escalated}) y publicado por PAT — el Auditor no pudo materializarlo por su canal (tracking comment pierde HTML, AP-013).\n\n<!-- audit-verdict: ${verdict} -->` });
              core.notice(`auditoría #${issue_number}: audit-verdict=${verdict} DERIVADO por estado (correctivos=${correctivos}, escalada=${escalated}) y publicado por PAT (AP-013).`);
            }
            await github.rest.issues.addLabels({ owner, repo, issue_number,
              labels: ['auditoria-completa'] });
            core.notice('auditoria-completa materializada post-sesión (informe y veredicto verificados/derivados).');

      - name: Liberar serial-activo al existir PR (post-Creator)
        # El Creator abre su PR dentro de la sesión; este post-step retira el
        # flag `serial-activo` del issue en cuanto el PR existe (a partir de
        # aquí el PR abierto es la señal de vuelo). Si el Creator murió sin
        # abrir PR, el flag NO se borra aquí — lo libera el watchdog.
        if: |
          always()
          && steps.check_serial.outputs.blocked != 'true'
          && (
            (github.event_name == 'issue_comment' && !github.event.issue.pull_request)
            || github.event_name == 'issues'
          )
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const n = context.payload.issue.number;
            const { data: prs } = await github.rest.pulls.list({ owner, repo, state: 'open', per_page: 100 });
            const hasPR = prs.some(p => p.head.ref.startsWith(`claude/issue-${n}-`));
            if (hasPR) {
              await github.rest.issues.removeLabel({ owner, repo, issue_number: n, name: 'serial-activo' }).catch(() => {});
              core.notice(`serial-activo retirado de #${n}: PR abierto.`);
            } else {
              core.notice(`serial-activo intacto en #${n}: sin PR aún (Creator en curso o caído — lo libera el watchdog si murió).`);
            }

      - name: Materializar review en la apertura del PR (open-review-failsafe)
        # Repesca finplan#1382 (AP-016, 2026-07-15): el evento `opened` que
        # auto-dispara al Reviewer al NACER el PR es ÚNICO y NO idempotente — si
        # GitHub no lo entrega (finplan#1382: PR abierto por claude[bot] a las
        # 13:04, sin run ni veredicto ~19 min, rescatado por el dispatcher de
        # turno del watchdog ADR-217 a las 13:23), la transición Creator→Reviewer
        # queda colgada del fallback, y «el fallback trabajando ES el failure del
        # camino primario». La doctrina estado-primario (AP-013, wmcb#38) ya
        # materializó POR ESTADO las demás aristas Creator→Reviewer
        # (turn-close-failsafe para cierres sin tag, re-review-por-estado para
        # push sin relabel, lgtm/ci-verde ADR-218); el nacimiento del PR era la
        # ÚLTIMA arista single-shot del camino crítico. Este belt la cierra: tras
        # un settle al bound de liveness (~90s, física de materialización de runs
        # — ADR-217 §3), si NINGÚN run del Reviewer nació para el head SHA del PR,
        # aplica `needs-review` con el PAT (mismo actor/mecanismo que el
        # turn-close-failsafe: el `labeled` del PAT dispara al Reviewer; su guard
        # ignora `labeled` de claude[bot]). El DEDUPE (consulta previa de runs) es
        # la CONDICIÓN DE APLICABILIDAD, no un extra: sin él, doblaría una review
        # Opus completa en CADA PR. Idempotente: si el `opened` disparó (caso
        # común), el run existe y el step no toca nada. El dispatcher del watchdog
        # (ADR-217) queda como red; sus relanzamientos por `opened` perdido deben
        # caer a ~0 (métrica de la próxima auditoría de cada consumidor).
        if: |
          always()
          && steps.check_serial.outputs.blocked != 'true'
          && (
            (github.event_name == 'issue_comment' && !github.event.issue.pull_request)
            || github.event_name == 'issues'
          )
        uses: actions/github-script@v7
        env:
          # Lectura Y escritura con el PAT. La lectura con el GITHUB_TOKEN default
          # exigía `actions: read` en el job del reusable, y el callee no puede
          # pedir más permisos que su caller: todo stub con bloque `permissions`
          # explícito sin `actions` ⇒ startup_failure de flota (incidente
          # 2026-07-15, central+finplan). El anti-loop solo concierne a la
          # ESCRITURA del label (un `labeled` del GITHUB_TOKEN no dispararía
          # reviewer.yml); leer runs con el PAT es inocuo y no toca ningún stub.
          ARM_PAT: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
          IN_REVIEWER_WF: ${{ inputs.reviewer_workflow_name }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const n = context.payload.issue.number;
            // ¿Nació un PR de este Creator? (misma detección que el step de
            // liberación de serial-activo). Sin PR ⇒ nada que materializar aquí:
            // la muerte sin PR la cubre su propio post-step.
            const { data: prs } = await github.rest.pulls.list({ owner, repo, state: 'open', per_page: 100 });
            const pr = prs.find(p => p.head.ref.startsWith(`claude/issue-${n}-`));
            if (!pr) { core.notice(`open-review-failsafe: sin PR de #${n} — nada que materializar.`); return; }
            // DEDUPE (condición de aplicabilidad): ¿algún run del Reviewer para el
            // head SHA del PR? El run pertenece al stub caller; se identifica por
            // su `name` (mismo criterio que el watchdog, input reviewer_workflow_name).
            const REVIEWER_WF = process.env.IN_REVIEWER_WF || 'Opus Reviewer';
            // null = lectura no fiable (p.ej. PAT sin actions:read): NO decidir —
            // materializar sobre lectura fallida doblaría reviews; queda el watchdog.
            const found = async () => {
              const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/runs?head_sha=${pr.head.sha}&per_page=50`, {
                headers: { Authorization: `Bearer ${process.env.ARM_PAT}`, Accept: 'application/vnd.github+json' } });
              if (!res.ok) { core.warning(`open-review-failsafe: HTTP ${res.status} listando runs — no se decide.`); return null; }
              return (await res.json()).workflow_runs.filter(r => r.name === REVIEWER_WF).length > 0;
            };
            // Camino sano: este post-step corre minutos después del `opened`, así
            // que el run ya existe y el corto-circuito ahorra el settle. Un match
            // POSITIVO nunca es falso negativo ⇒ el corto-circuito no reintroduce
            // el riesgo que el settle cubre (nit de la review de PR #57).
            const first = await found();
            if (first !== false) {
              if (first) core.notice(`open-review-failsafe: run del Reviewer ya existe para ${pr.head.sha.slice(0,7)} (trigger opened OK) — no se duplica.`);
              return;
            }
            // Sólo el caso dudoso (run ausente) paga el settle al bound de liveness
            // (~90s): dar tiempo a que el run del `opened` se materialice antes de
            // decidir. Decidir demasiado pronto sería un falso negativo ⇒ review
            // duplicada (ADR-217 §3: física de runs, no envejecimiento heurístico).
            await new Promise(r => setTimeout(r, 90000));
            const second = await found();
            if (second !== false) {
              if (second) core.notice(`open-review-failsafe: run del Reviewer apareció en el settle para ${pr.head.sha.slice(0,7)} — no se duplica.`);
              return;
            }
            // Ningún run: el `opened` se perdió. Materializar la transición por
            // ESTADO — needs-review con el PAT (remove+add para forzar el evento
            // labeled aunque hubiera un resto). Raw fetch con ARM_PAT: github-script
            // corre con el GITHUB_TOKEN default, cuyo `labeled` no dispara al Reviewer.
            const patCall = async (method, path, body) => {
              const res = await fetch(`https://api.github.com/repos/${owner}/${repo}${path}`, {
                method,
                headers: { Authorization: `Bearer ${process.env.ARM_PAT}`, Accept: 'application/vnd.github+json' },
                body: body ? JSON.stringify(body) : undefined });
              if (!res.ok && res.status !== 404) throw new Error(`HTTP ${res.status} ${path}`);
              return res;
            };
            await patCall('DELETE', `/issues/${pr.number}/labels/needs-review`);
            await patCall('POST', `/issues/${pr.number}/labels`, { labels: ['needs-review'] });
            await github.rest.issues.createComment({ owner, repo, issue_number: pr.number,
              body: '**claude-code · open-review-failsafe**: el evento `opened` que auto-dispara al Reviewer al nacer el PR no produjo ningún run tras el settle de liveness (~90s). Transición Creator→Reviewer materializada por ESTADO: `needs-review` aplicada con el PAT en el mismo job (repesca finplan#1382, AP-016). Idempotente por dedupe: si el `opened` hubiera disparado, este step no habría tocado nada.\n\n<!-- open-review-failsafe -->' });
            core.warning(`open-review-failsafe: PR #${pr.number} sin run del Reviewer para ${pr.head.sha.slice(0,7)} — needs-review aplicada por PAT (opened perdido).`);

      - name: Materializar muerte del Creator sin PR (post-step determinista)
        # 2026-07-13, incidente finplan#1318: el Creator murió por max_turns a
        # las 11:42 tras commitear 9 commits y ANTES de abrir el PR. El
        # detector issue-armed-no-pr del watchdog lo habría cazado en su
        # siguiente tick (poll, 15-45 min de latencia); el propietario le ganó
        # la carrera e hizo el diagnóstico a mano. Este post-step lo hace PUSH
        # con latencia cero: el propio run sabe en el instante que la sesión
        # concluyó mal. Materializa el estado (AP-008.1) — comentario
        # diagnóstico con marcador, stalled (señal de architect-resolve; skip()
        # del watchdog NO la excluye) y retirada de serial-activo (evita el
        # deadlock clase #1312 en su variante Creator-muerto). El REARM no se
        # hace aquí: comentarios de GITHUB_TOKEN no disparan workflows
        # (incidente #1048) — es del watchdog o del humano, ahora con el
        # diagnóstico ya hecho. Las auditorías quedan fuera: su post-step
        # («Materializar auditoria-completa») ya cubre su modo de muerte.
        # v2 (2026-07-13, incidente #1329): también cubre `success`-sin-PR —
        # una sesión que COMMITEÓ trabajo en su rama y terminó «bien» según
        # ella, sin abrir PR ni escalar, es el mismo fallo de transición que
        # la muerte por max_turns (el Creator de #1329 dijo «implementadas y
        # validadas» y dejó todo en silencio). Criterio anti-falso-positivo:
        # en success solo materializa si la rama claude/issue-N-* EXISTE con
        # commits ahead — una sesión success sin commits es conversacional
        # legítima (escalada, respuesta) y su output es la conversación.
        if: |
          always() && steps.creator.outcome != 'skipped' && steps.creator.outcome != 'cancelled'
          && github.event.issue && !github.event.issue.pull_request
          && !contains(github.event.issue.labels.*.name, 'auditoria')
        uses: actions/github-script@v7
        with:
          # PAT, no GITHUB_TOKEN default (2026-07-14, finplan#1350): la label
          # `stalled` que aplica este step es el trigger por EVENTO de
          # architect-resolve (watchdog `on: labeled`). Con el token default el
          # evento no se emite (anti-loop de GitHub) y la señal degradaba al
          # tick del cron — el push prometido en el encabezado era en realidad
          # poll. Mismo patrón ya documentado para `needs-review` (abajo).
          github-token: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const issue = context.payload.issue;
            const n = issue.number;
            // ¿Murió DESPUÉS de abrir su PR? Entonces gobierna el flujo PR-driven.
            const { data: prs } = await github.rest.pulls.list({ owner, repo, state: 'open', per_page: 100 });
            if (prs.some(p => p.head.ref.startsWith(`claude/issue-${n}-`))) {
              core.notice(`Creator de #${n} murió con PR ya abierto — flujo PR-driven gobierna; nada que materializar aquí.`);
              return;
            }
            const outcome = '${{ steps.creator.outcome }}';
            // Pop de la cola serial (espejo del armQueue de epic-merge — si
            // tocas uno, toca el otro): arma el en-cola más antiguo (FIFO).
            async function popQueue(fromIssue, why) {
              try {
                const { data: queued } = await github.rest.issues.listForRepo({
                  owner, repo, state: 'open', labels: 'en-cola', sort: 'created', direction: 'asc', per_page: 5 });
                const next = queued.filter(i => !i.pull_request)[0];
                if (!next) return;
                await github.rest.issues.removeLabel({ owner, repo, issue_number: next.number, name: 'en-cola' }).catch(() => {});
                await github.rest.issues.removeLabel({ owner, repo, issue_number: next.number, name: 'stalled' }).catch(() => {});
                await github.rest.issues.createComment({ owner, repo, issue_number: next.number,
                  body: `@claude arranca — turno de cola: la serie quedó libre (${why}). Eras el más antiguo en \`en-cola\`.\n\n<!-- arm-de-cola -->` });
                core.notice(`cola: #${next.number} armado (${why}).`);
              } catch (e) { core.warning(`pop de cola falló: ${e.message}`); }
            }
            // Estado de la rama huérfana (si existe): el diagnóstico que el
            // rearm necesita ("no rehagas nada").
            let branchInfo = 'sin rama creada (muerte temprana: no hay trabajo que conservar).';
            let hasCommits = false;
            try {
              const { data: refs } = await github.rest.git.listMatchingRefs({ owner, repo, ref: `heads/claude/issue-${n}-` });
              if (refs.length) {
                const branch = refs[refs.length - 1].ref.replace('refs/heads/', '');
                const cmp = await github.rest.repos.compareCommits({ owner, repo,
                  base: '${{ inputs.default_branch }}', head: branch });
                const last = cmp.data.commits.length ? cmp.data.commits[cmp.data.commits.length - 1].commit.message.split('\n')[0] : '(sin commits)';
                hasCommits = cmp.data.ahead_by > 0;
                branchInfo = `rama \`${branch}\`: **ahead ${cmp.data.ahead_by} / behind ${cmp.data.behind_by}** sobre \`${{ inputs.default_branch }}\`. Último commit: «${last}».`;
              }
            } catch (e) { branchInfo += ` (inspección de rama falló: ${e.message})`; }
            if (outcome === 'success' && !hasCommits) {
              // v3 (2026-07-14, finplan#1350): un paro LIMPIO pre-código —
              // informe de bloqueo/alcance sin rama ni PR — caía aquí como
              // «conversacional legítima» y la señal quedaba huérfana hasta el
              // tick del watchdog (el propietario le ganó la carrera, 2ª vez
              // de la clase). El Creator lo declara con `<!-- creator-blocked -->`
              // en su comentario de cierre (creator.md § escalado determinista);
              // freshness: solo cuenta un comentario de claude[bot] POSTERIOR
              // al que disparó este job (lección del bucle PR #180).
              const trigTs = context.payload.comment ? new Date(context.payload.comment.created_at).getTime() : 0;
              const { data: cs } = await github.rest.issues.listComments({ owner, repo, issue_number: n, per_page: 100 });
              const lastBot = [...cs].reverse().find(c => c.user?.login === 'claude[bot]');
              const blocked = !!lastBot
                && new Date(lastBot.created_at).getTime() > trigTs
                && /<!--\s*creator-blocked\s*-->/.test(lastBot.body || '');
              if (!blocked) {
                // v4 (2026-07-15, central#34): el Creator escaló SIN el marcador
                // (mandato de prosa: 0/1 — misma clase que audit-verdict). Si la
                // SERIE está ocupada por esta sesión, el silencio es un cerrojo:
                // el siguiente en-cola esperaría para siempre. Mecánico: serie
                // ocupada + sin commits + sin PR ⇒ escalada no-declarada.
                const labs = (context.payload.issue.labels || []).map(l => l.name);
                if (!labs.includes('serial-activo')) {
                  core.notice(`sesión success sin commits en #${n}: conversacional sin serie — nada que materializar.`);
                  return;
                }
                await github.rest.issues.removeLabel({ owner, repo, issue_number: n, name: 'serial-activo' }).catch(() => {});
                await github.rest.issues.addLabels({ owner, repo, issue_number: n, labels: ['human-needed'] });
                await github.rest.issues.createComment({ owner, repo, issue_number: n,
                  body: `**claude-code · post-step**: la sesión terminó sin PR ni commits con la serie ocupada y SIN declarar bloqueo (falta \`<!-- creator-blocked -->\` — creator.md § escalado determinista). Tratado como ESCALADA no-declarada: serie liberada, \`human-needed\`, turno pasado a la cola.\n\n<!-- escalada-materializada -->` });
                await popQueue(n, `escalada de #${n}`);
                return;
              }
              await github.rest.issues.createComment({ owner, repo, issue_number: n,
                body: `**claude-code · post-step**: el Creator paró LIMPIO sin PR y declaró bloqueo (\`<!-- creator-blocked -->\`). Estado materializado en el instante — sin esperar al tick:\n\n- \`stalled\` aplicada con PAT ⇒ architect-resolve dispara POR EVENTO (diagnóstico con el informe del Creator + la skill \`epic-context-<ADR>\` si existe).\n- \`serial-activo\` retirada (el rearm de este mismo issue no queda bloqueado).\n\n<!-- creator-blocked-materializado -->` });
              await popQueue(n, `bloqueo declarado de #${n}`);
              await github.rest.issues.addLabels({ owner, repo, issue_number: n, labels: ['stalled'] });
              await github.rest.issues.removeLabel({ owner, repo, issue_number: n, name: 'serial-activo' }).catch(() => {});
              core.warning(`Creator de #${n}: bloqueo declarado materializado (stalled por PAT, evento push).`);
              return;
            }
            await github.rest.issues.createComment({ owner, repo, issue_number: n,
              body: `**claude-code · post-step**: la sesión del Creator terminó en \`${outcome}\` **sin PR abierto** pese a tener trabajo commiteado (o murió sin abrirlo). Estado materializado en el instante — sin esperar al tick del watchdog:\n\n- ${branchInfo}\n- \`serial-activo\` retirada y **turno pasado a la cola** (el arm de retoma de este issue no queda bloqueado).\n- \`stalled\` aplicada (señal de architect-resolve).\n\n**Para el rearm** (watchdog o humano): si hay rama con commits, NO rehacer — retomar solo el cierre (verificar rama, typecheck/tests de los ficheros afectados, abrir el PR según «PR creation» de CLAUDE.md).\n\n<!-- creator-muerto-sin-pr -->` });
            await github.rest.issues.addLabels({ owner, repo, issue_number: n, labels: ['stalled'] });
            await github.rest.issues.removeLabel({ owner, repo, issue_number: n, name: 'serial-activo' }).catch(() => {});
            // AP-014 (2026-07-15, deadlock central#44/#46/#47): TODO camino que
            // libera la serie hace pop de cola EN EL MISMO JOB. Este camino era
            // el único de los tres que no lo hacía: liberaba sin armar y la
            // cola quedaba muerta hasta un merge (armQueue de epic-merge) que
            // podía no llegar nunca.
            await popQueue(n, `muerte del Creator de #${n}`);
            core.warning(`Creator de #${n}: muerte sin PR materializada (stalled + serial-activo retirada + pop de cola).`);

      - name: Auto-label based on Creator's closing tag
        if: |
          success()
          && steps.check_pause.outputs.paused != 'true'
          && steps.check_iterations.outputs.cap_reached != 'true'
          && steps.check_chain.outputs.broken != 'true'
          && steps.check_panel.outputs.blocked != 'true'
          && steps.check_serial.outputs.blocked != 'true'
          && (
            github.event_name == 'pull_request_review'
            || github.event_name == 'pull_request_review_comment'
            || (github.event_name == 'issue_comment'
                && github.event.issue.pull_request)
          )
        uses: actions/github-script@v7
        with:
          # IMPORTANTE: usar el PAT (REVIEWER_GITHUB_TOKEN), NO el GITHUB_TOKEN
          # default. Razón: este step aplica la label `needs-review` que DEBE
          # disparar el workflow del Reviewer (reviewer.yml `on: pull_request:
          # types: [labeled]`). Eventos generados por GITHUB_TOKEN default NO
          # disparan otros workflows (protección anti-loop de GitHub). Con el
          # PAT, el evento `labeled` sí se emite y el Reviewer dispara.
          # Doc: https://docs.github.com/en/actions/using-workflows/triggering-a-workflow
          github-token: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.issue?.number
              || context.payload.pull_request?.number;

            // Releer comentarios (el agente acaba de añadir el suyo).
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const botComments = comments.filter(
              c => c.user.login === 'claude[bot]'
            );
            if (botComments.length === 0) return;

            const last = botComments[botComments.length - 1];

            // FRESHNESS CHECK (PR #180 fix, ADR-064 amendment).
            // El último comment de claude[bot] solo es señal válida de "el
            // Creator acaba de cerrar trabajo en este run" si fue creado
            // DESPUÉS del comment/review que disparó este job. Si es
            // anterior, este job se disparó por un trigger espurio
            // (típicamente: substring `@claude` en backticks dentro del
            // body del Reviewer documentando convergencia) y NO debemos
            // re-aplicar label porque desencadena un loop con el Reviewer.
            const triggerCreatedAtRaw =
              context.payload.comment?.created_at
              || context.payload.review?.submitted_at
              || null;
            if (triggerCreatedAtRaw) {
              const triggerCreatedAt = new Date(triggerCreatedAtRaw);
              const lastBotCreatedAt = new Date(last.created_at);
              if (lastBotCreatedAt <= triggerCreatedAt) {
                core.notice(
                  `Último comment de claude[bot] (${last.created_at}) es `
                  + `anterior o igual al comment que disparó este job `
                  + `(${triggerCreatedAtRaw}). Probablemente trigger espurio `
                  + `(p.ej. substring \`@claude\` en backticks dentro de un `
                  + `comment del Reviewer). NO re-aplico label para evitar `
                  + `loop. Ver ADR-064 amendment.`
                );
                return;
              }
            }

            const body = last.body || '';

            // Detectar tag exacto. Prioridad: NEEDS-HUMAN > READY-TO-MERGE > @reviewer.
            // (Si por error el agente pone varios, escalar gana.)
            // ANCLADO a inicio de línea (2026-07-08, PR #1133): el substring
            // crudo disparó human-needed por una MENCIÓN del tag entre
            // backticks en prosa del Creator («gatillo `[NEEDS-HUMAN]` en
            // CLAUDE.md»), congelando el PR con CI rojo fuera del radar del
            // watchdog. Mismo bug ya corregido para `@claude` (ADR-064) y
            // documentado para `ping-creator` (watchdog.md): un tag de cierre
            // es un tag solo si ABRE su línea. CLAUDE.md permite
            // `[NEEDS-HUMAN]: <razón>` con texto detrás, así que el ancla es
            // de inicio de línea, no de línea completa. Failure class #4:
            // text belts forbidden — esto acerca los tags a marcadores.
            let label = null;
            if (/^\s*\[NEEDS-HUMAN\]/m.test(body)) {
              label = 'human-needed';
            } else if (/^\s*\[READY-TO-MERGE\]/m.test(body)) {
              label = 'ready-to-merge';
            } else if (/^\s*@reviewer\b/im.test(body)) {
              label = 'needs-review';
            }

            if (!label) {
              // Cede a la escalada CON PR (creator-escalated, AP-017): si el
              // cierre lleva `<!-- creator-escalated -->`, el turno es del
              // Architect, NO del Reviewer. El Creator pudo pushear trabajo
              // parcial y LUEGO escalar; sin este guard el turn-close-failsafe
              // de abajo re-aplicaría `needs-review` (convoca al Reviewer por
              // evento) mientras el post-step creator-escalated aplica `stalled`
              // + `estado:esperando-architect` — el PR quedaría con DOS dueños a
              // la vez. La transición la materializa el post-step creator-escalated
              // (gemelo con-PR del Re-review-por-estado, que también cede). ANCLADO
              // como HTML (clase PR #1133), jamás substring de prosa.
              if (/<!--\s*creator-escalated\s*-->/.test(body)) {
                core.notice('Cierre del Creator es una escalada al Architect (creator-escalated) — turn-close-failsafe cede; lo materializa su post-step.');
                return;
              }
              // turn-close-failsafe (finplan#1322, 2026-07-13 — capa 1 de
              // AP-011 para la transición Creator→Reviewer). Incidente
              // finplan PR #1319: el Creator aplicó los nits, pusheó,
              // terminó `success`... sin tag de cierre. 84 min de stall
              // hasta el dispatcher (capa 2/3, latencia de cron + cap 2).
              // El estado «el Creator respondió al veredicto» ya está
              // MATERIALIZADO (push al HEAD posterior al veredicto que
              // disparó esta sesión) — este fail-safe lo consume en el
              // MISMO job, latencia cero, en vez de colgar la transición
              // de una cadena mágica en prosa. Condiciones:
              //  (a) sesión `success` — la garantiza el `if:` del step
              //      (las muertes por error son territorio del Watchdog:
              //      trabajo potencialmente incompleto);
              //  (b) el trigger fue un turno de PR-loop real: comentario
              //      con marcador `ping-creator` (veredicto del Reviewer
              //      o ping del Watchdog) — excluye comentarios humanos
              //      arbitrarios;
              //  (c) hay commits en el HEAD del PR posteriores al trigger;
              //  (d) sin tag de cierre anclado (esta rama).
              // NO es un re-trigger por push: evalúa UNA vez, al cierre de
              // la sesión. La label la aplica el PAT (mismo mecanismo que
              // la rama @reviewer): el guard anti-loop del Reviewer sobre
              // `labeled` de claude[bot] no se toca.
              const triggerBody = context.payload.comment?.body
                || context.payload.review?.body || '';
              if (triggerBody.includes('ping-creator') && triggerCreatedAtRaw) {
                const { data: pr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                });
                const { data: headCommit } = await github.rest.repos.getCommit({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: pr.head.sha,
                });
                const headDate = new Date(headCommit.commit.committer.date);
                if (headDate > new Date(triggerCreatedAtRaw)) {
                  try {
                    await github.rest.issues.removeLabel({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: prNumber,
                      name: 'needs-review',
                    });
                  } catch (e) { /* puede no estar */ }
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    labels: ['needs-review'],
                  });
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    body: '**claude-code · turn-close-failsafe**: la sesión del Creator terminó con éxito, con commits en el HEAD posteriores al veredicto que la convocó, pero SIN tag de cierre anclado. Transición Creator→Reviewer materializada por estado (push), no por prosa: `needs-review` re-aplicada en el mismo job (finplan#1322, capa 1 de AP-011).\n\n<!-- turn-close-failsafe -->',
                  });
                  core.warning(
                    `PR #${prNumber}: cierre sin tag con push post-veredicto — `
                    + 'needs-review aplicada por turn-close-failsafe.'
                  );
                  return;
                }
              }
              core.notice(
                'El último comentario del Creator no contiene tag de cierre '
                + '([READY-TO-MERGE], [NEEDS-HUMAN], o @reviewer). '
                + 'Sin label automática aplicada.'
              );
              return;
            }

            // Para `needs-review`: quitar y re-añadir para forzar disparo
            // del Reviewer. El Reviewer se autoborra como primer paso
            // (ADR-063 self-remove pattern), así que en estado normal la
            // label NO está aquí. El remove defensivo cubre fallos
            // parciales donde el Reviewer no llegó a autoborrarse.
            if (label === 'needs-review') {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  name: 'needs-review',
                });
              } catch (e) {
                // La label puede no estar; no es error.
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: [label],
            });
            core.notice(`Label aplicada: ${label}`);

      - name: Materializar escalada del Creator con PR abierto (creator-escalated)
        # Repesca finplan#1391 (AP-017, 2026-07-15): el Creator escaló al
        # Architect el 🔴(b) del gate A3′ (ADR-210, «PARAR y escalar» del propio
        # ADR) EN PROSA (comentario del PR), pero NINGÚN estado de despacho se
        # materializó: el PR quedó `estado:esperando-creator`, el dispatcher de
        # turno (ADR-217) lo declaró `turno-de-nadie`, y architect-resolve solo
        # llegó vía el caza-anomalías del watchdog ~22 min después — una escalada
        # CORRECTA degradada a anomalía, rescatada por FALLBACK en vez de por
        # HANDOFF (violación del principio 1 de protocol.md: estado materializado,
        # no inferido). Complemento EXACTO de creator-blocked (finplan#1350), que
        # gobierna el paro limpio PRE-código SIN PR y se excluye «jamás con PR
        # abierto»: este belt cubre la escalada derivable-por-Architect DESDE
        # DENTRO del loop de PR (gate numérico de ADR tipo A3′, ambigüedad de
        # diseño). NUNCA una decisión humana (eso sigue siendo [NEEDS-HUMAN]).
        # Materializa por ESTADO en el instante: `stalled` con el PAT (⇒
        # architect-resolve POR EVENTO — watchdog `pull_request labeled stalled`,
        # sin esperar al cron) + `estado:esperando-architect` visible (el
        # dispatcher de turno cede sobre él en vez de declarar turno-de-nadie;
        # architect-resolve lo limpia al rular/re-armar). Detección ANCLADA como
        # HTML, jamás substring de prosa (clase PR #1133). Freshness-checked vs el
        # comentario disparador (lección #180): solo cuenta el cierre del Creator
        # POSTERIOR al trigger — un `@claude` en backticks en prosa del Reviewer
        # no debe materializar nada. Self-contained (mismo patrón que los demás
        # post-steps: open-review-failsafe, creator-muerto) para no destabilizar
        # el path crítico Creator→Reviewer del Auto-label.
        if: |
          success()
          && steps.check_pause.outputs.paused != 'true'
          && steps.check_iterations.outputs.cap_reached != 'true'
          && steps.check_chain.outputs.broken != 'true'
          && steps.check_panel.outputs.blocked != 'true'
          && steps.check_serial.outputs.blocked != 'true'
          && (
            github.event_name == 'pull_request_review'
            || github.event_name == 'pull_request_review_comment'
            || (github.event_name == 'issue_comment'
                && github.event.issue.pull_request)
          )
        uses: actions/github-script@v7
        with:
          # PAT (REVIEWER_GITHUB_TOKEN), NO el GITHUB_TOKEN default: la label
          # `stalled` que aplica este step ES el trigger por EVENTO de
          # architect-resolve (watchdog `on: labeled`, rama stalled-autonomous-
          # resolve del scan). Con el token default el `labeled` no se emite
          # (anti-loop de GitHub) y la señal degradaría al cron — justo la latencia
          # que este belt elimina. Mismo actor/mecanismo que el creator-blocked.
          github-token: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.issue?.number
              || context.payload.pull_request?.number;
            if (!prNumber) return;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber, per_page: 100 });
            const botComments = comments.filter(c => c.user?.login === 'claude[bot]');
            if (botComments.length === 0) return;
            const last = botComments[botComments.length - 1];
            // FRESHNESS CHECK (lección #180): el último comment del Creator solo
            // es cierre válido de ESTE run si fue creado DESPUÉS del comment/review
            // que lo disparó. Si es anterior, trigger espurio (típ. substring
            // `@claude` en backticks en prosa del Reviewer) ⇒ no materializar.
            const trigRaw = context.payload.comment?.created_at
              || context.payload.review?.submitted_at || null;
            if (trigRaw && new Date(last.created_at) <= new Date(trigRaw)) {
              core.notice('creator-escalated: último comment del Creator anterior/igual '
                + 'al trigger — probable trigger espurio, no materializo.');
              return;
            }
            // Detección ANCLADA como HTML (clase PR #1133): jamás substring de prosa.
            if (!/<!--\s*creator-escalated\s*-->/.test(last.body || '')) return;
            // Materializa por ESTADO. Estado visible PRIMERO, `stalled` DESPUÉS:
            // así el `labeled=stalled` (con PAT) convoca a architect-resolve con
            // el `estado:esperando-architect` ya presente. `estado:*` es dinámica
            // (addLabels la auto-crea, como el resto de estados de cadena).
            await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber,
              labels: ['estado:esperando-architect'] });
            await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber,
              labels: ['stalled'] });
            await github.rest.issues.createComment({ owner, repo, issue_number: prNumber,
              body: '**claude-code · creator-escalated**: el Creator escaló al Architect '
                + 'una decisión derivable desde dentro del loop de PR (gate numérico de '
                + 'ADR / ambigüedad de diseño; jamás una decisión humana). Estado '
                + 'materializado por PAT en el mismo job (doctrina estado-primario, '
                + 'protocol.md §1): `stalled` ⇒ architect-resolve por evento (sin esperar '
                + 'al cron) + `estado:esperando-architect` ⇒ el dispatcher de turno del '
                + 'watchdog cede en vez de declarar `turno-de-nadie`. architect-resolve '
                + 'publica su ruling y limpia el estado al re-armar (repesca finplan#1391, '
                + 'AP-017).\n\n<!-- creator-escalated-materializado -->' });
            core.warning(`PR #${prNumber}: escalada del Creator materializada por estado `
              + `— stalled + estado:esperando-architect (creator-escalated).`);

      # ───────────────────────────────────────────────────────────────────
      # Auto-lanzamiento de épica (ADR-193). Espejo del step `Auto-label`:
      # usa el PAT (REVIEWER_GITHUB_TOKEN) porque eventos del GITHUB_TOKEN
      # default NO disparan otros workflows (anti-recursión de GitHub). El
      # Creator cierra con `<!-- launch-next: #N -->` (o `<!-- epic-done -->`);
      # este step postea `@claude` en el issue N, y ESE evento (al venir del
      # PAT) arranca la siguiente corrida del Creator.
      #
      # ADR-193 opción A (elegida): el LGTM del Reviewer sobre un PR con
      # label `epica` despierta al Creator, que verifica CI y mergea él mismo
      # (gh pr merge en allowedTools) y emite el sentinel launch-next. Este step
      # solo postea el @claude del siguiente issue desde ese sentinel.
      # ───────────────────────────────────────────────────────────────────
      - name: Re-review por estado de rama (post-step determinista)
        # finplan#1319 (2026-07-13): el Creator aplicó nits y omitió el
        # `@reviewer` de cierre — el Auto-label (gateado por prosa) no
        # re-etiquetó y la cadena quedó muda hasta el fallback del watchdog.
        # Regla materializada (AP-008): rama cambiada durante una sesión de
        # PR ⇒ hay trabajo sin veredicto ⇒ re-review, leído del ESTADO
        # (push), no de la prosa. Si el Auto-label ya actuó (el Creator SÍ
        # cerró bien), needs-review ya está y este step no duplica. Sesión
        # sin push (respondió una pregunta) ⇒ no quema al Reviewer. El
        # watchdog queda como red de segunda línea, no como camino primario.
        if: |
          success() && steps.pr_head_before.outputs.sha != ''
          && github.event_name == 'issue_comment' && github.event.issue.pull_request
        uses: actions/github-script@v7
        with:
          # PAT: mismo motivo que el Auto-label — labeled de GITHUB_TOKEN no
          # dispara reviewer.yml (anti-loop de GitHub).
          github-token: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const n = context.payload.issue.number;
            const before = '${{ steps.pr_head_before.outputs.sha }}';
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: n });
            if (pr.state !== 'open') { core.notice('PR no abierto — nada.'); return; }
            if (!pr.head.ref.startsWith('claude/')) { core.notice('rama no-agente — nada.'); return; }
            if (pr.head.sha === before) { core.notice('sin push en la sesión — no se re-dispara review.'); return; }
            const labels = pr.labels.map(l => l.name);
            // Cede a la escalada: si el Creator pusheó trabajo parcial y LUEGO
            // escaló (creator-escalated ya materializó `estado:esperando-architect`
            // en el step anterior), el turno es del Architect, no del Reviewer —
            // re-etiquetar needs-review aquí competiría con `stalled` y mandaría el
            // PR a dos dueños a la vez (AP-017).
            if (labels.includes('estado:esperando-architect')) { core.notice('PR escalado a architect-resolve (creator-escalated) — no re-review por estado.'); return; }
            if (labels.includes('needs-review')) { core.notice('needs-review ya presente (Auto-label actuó) — sin duplicar.'); return; }
            // remove+add para forzar el evento labeled aunque hubiera restos
            await github.rest.issues.removeLabel({ owner, repo, issue_number: n, name: 'needs-review' }).catch(() => {});
            await github.rest.issues.addLabels({ owner, repo, issue_number: n, labels: ['needs-review'] });
            core.notice(`re-review por estado: push detectado (${before.slice(0,7)} → ${pr.head.sha.slice(0,7)}) — needs-review aplicada.`);

      - name: Launch next epic issue (Creator's closing sentinel)
        if: |
          success()
          && steps.check_pause.outputs.paused != 'true'
          && steps.check_iterations.outputs.cap_reached != 'true'
          && steps.check_chain.outputs.broken != 'true'
          && steps.check_panel.outputs.blocked != 'true'
          && steps.check_serial.outputs.blocked != 'true'
        uses: actions/github-script@v7
        with:
          # PAT, NO GITHUB_TOKEN: el @claude posteado debe disparar la
          # siguiente corrida del Creator (ver step Auto-label para el motivo).
          github-token: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.issue?.number
              || context.payload.pull_request?.number;
            if (!prNumber) return;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const botComments = comments.filter(c => c.user.login === 'claude[bot]');
            if (botComments.length === 0) return;
            const last = botComments[botComments.length - 1];

            // FRESHNESS (igual que Auto-label): solo actuar si el cierre del
            // Creator es POSTERIOR al evento que disparó este job.
            const triggerAt = context.payload.comment?.created_at
              || context.payload.review?.submitted_at || null;
            if (triggerAt && new Date(last.created_at) <= new Date(triggerAt)) {
              core.notice('Cierre del Creator no es fresco; no lanzo.');
              return;
            }

            const body = last.body || '';

            // epic-done ⇒ fin de la épica, no se lanza nada (el humano prueba).
            if (/<!--\s*epic-done\s*-->/.test(body)) {
              core.notice('Épica terminada; no hay siguiente issue.');
              return;
            }

            const m = body.match(/<!--\s*launch-next:\s*#?(\d+)\s*-->/);
            if (!m) return;
            const nextIssue = Number(m[1]);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: nextIssue,
              body: '@claude',
            });
            core.notice(`Épica: lanzado el siguiente issue #${nextIssue}.`);
