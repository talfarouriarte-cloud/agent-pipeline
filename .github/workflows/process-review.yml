# Process Reviewer — evaluación de proceso post-auditoría (2026-07-07)
#
# Se dispara al aplicarse la label `auditoria-completa` (2026-07-10: los
# issues de auditoría y las process-proposal quedan ABIERTOS como panel
# vivo de la épica hasta que el Architect limpia la cola al lanzar la
# épica siguiente — cerrados desaparecían de la vista y el humano no los
# leía; el trigger por `closed` habría disparado esta revisión en el
# momento equivocado). Lee el
# pipeline-map, las métricas de proceso de los últimos informes de auditoría
# y publica como máximo 2 issues `process-proposal` con evidencia y
# coste/riesgo — o comenta «Sin propuestas» en la auditoría.
#
# Separación de poderes: este agente PROPONE, nunca aplica. No modifica
# ficheros, no arma nada, y sus bodies JAMÁS contienen la mención de arm.
# El humano decide; docs los aplica el Architect; yml el humano.
name: Process Reviewer

# CALLABLE (agent-pipeline): trigger y concurrency en el stub
# (concurrency group process-reviewer, cancel-in-progress: false).
on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: ubuntu-latest
      default_branch:
        type: string
        default: main
      process_model:
        type: string
        default: claude-fable-5
      process_fallback_model:
        type: string
        default: claude-opus-4-8
      process_max_turns:
        type: number
        default: 60
      timeout_minutes:
        type: number
        default: 20
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      REVIEWER_GITHUB_TOKEN:
        required: true

permissions:
  contents: read
  issues: write

jobs:
  review:
    name: Process review
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    if: |
      github.event.label.name == 'auditoria-completa'
      && contains(github.event.issue.labels.*.name, 'auditoria')
      && !contains(github.event.issue.labels.*.name, 'pause-agents')
    steps:
      - name: Checkout (pipeline-map + docs de agentes)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.default_branch }}

      - name: Graft vendored (capa común servida desde el central — AP-009)
        uses: talfarouriarte-cloud/agent-pipeline/.github/actions/graft-vendored@main

      # finplan#1326 (2026-07-13): el grupo de concurrencia global con
      # cancel-in-progress:false ENCOLA un run por cada label de cualquier
      # issue del repo. Este guard hace idempotentes los duplicados: si el
      # panel ya tiene el marcador de resultado, el run sale verde sin
      # quemar sesión (skill quota-tokens).
      - name: Guard de idempotencia (¿revisión ya materializada?)
        id: idem
        env:
          GH_TOKEN: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
        run: |
          CUERPOS=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments" \
               --paginate --jq '.[].body')
          # No usar `gh | grep -q` con pipefail: el SIGPIPE del primer match
          # da pipeline no-cero y un falso "no encontrado".
          if grep -q 'process-review-done' <<< "$CUERPOS"; then
            echo "done=true" >> "$GITHUB_OUTPUT"
            echo "::notice::El panel ya tiene revisión de proceso materializada (marcador presente) — run duplicado, salgo verde sin sesión."
          else
            echo "done=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run process review
        if: steps.idem.outputs.done != 'true'
        uses: anthropics/claude-code-action@v1
        env:
          # Blindaje OAuth-only (mismo patrón que reviewer.yml): si OAuth Max
          # falla, el job da rojo en lugar de facturar por API key.
          ANTHROPIC_API_KEY: ""
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Los issues de auditoría los cierra el bot/PAT.
          allowed_bots: "claude"
          # PAT para que los issues creados salgan con autoría del usuario.
          # Sus bodies NUNCA llevan la mención de arm, así que no disparan nada.
          github_token: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
          claude_args: |
            --model ${{ inputs.process_model }}
            --fallback-model ${{ inputs.process_fallback_model }}
            # 60 desde 2026-07-09 (era 30): el mandato del loop de skills
            # (ADR-212) añadió lecturas + commits Git Data; el run inaugural
            # murió en error_max_turns tras completar lo esencial. Regla
            # (pipeline-map, failure class mandate/toolbox-budget drift):
            # al ampliar un mandato, ampliar herramientas Y presupuestos
            # en el mismo cambio.
            --max-turns ${{ inputs.process_max_turns }}
            --allowedTools "Read,Glob,Grep,Bash(gh issue view:*),Bash(gh issue list:*),Bash(gh issue create:*),Bash(gh issue comment:*),Bash(gh api:*)"
          prompt: |
            REPO: ${{ github.repository }}
            AUDIT ISSUE: ${{ github.event.issue.number }}

            Eres el process-reviewer del pipeline de agentes de este repo.
            Tu única función: proponer mejoras de PROCESO (autonomía y
            eficiencia del loop de agentes) basadas en EVIDENCIA métrica.
            Jamás propones cambios de producto, modelo financiero o código
            de la aplicación.

            Protocolo:
            1. Lee `.claude/skills/pipeline-map/SKILL.md` (mapa del sistema
               y clases de fallo conocidas) y `docs/agents/protocol.md`.
            2. Con `gh issue list --label auditoria --state closed --limit 4`
               y `gh issue view <n> --comments`, lee los informes de las
               últimas auditorías, en especial sus bloques
               «## Métricas de proceso» y «## Observaciones de proceso».
            3. Compara métricas entre épicas. Busca REGRESIONES o fricciones
               repetidas (≥2 épicas): PRs/issue al alza, rondas de review al
               alza, stalls, intervenciones humanas que el sistema debería
               absorber, intervenciones repetidas del Watchdog por la misma
               causa.
            3b. REPESCAS = FIX OBLIGATORIO (2026-07-13, decisión del
               propietario). Lee el bloque «## Análisis de repescas (5 whys)»
               de las auditorías. Cada causa raíz de repesca (Watchdog,
               creator-muerto-sin-pr, re-arm humano) exige una propuesta de
               fix AUNQUE sea instancia única — el umbral de ≥2 épicas del
               paso 3 NO aplica aquí: una repesca es el fallback trabajando,
               y el fallback trabajando ES el failure del camino primario.
               El fix ataca la causa raíz del 5-whys (materializar la
               transición que faltó), no el síntoma. Si hay más causas raíz
               que el cap de issues del paso 5, prioriza repescas y lista
               las restantes en el comentario del issue de auditoría.
            4. Si NO hay regresión, ni patrón ≥2 épicas, NI repescas sin fix
               propuesto: comenta en el issue de auditoría exactamente
               `Sin propuestas.` con una línea de métricas comparadas, y
               termina. NO inventes mejoras para justificarte — un informe
               vacío es un resultado válido. El comentario TERMINA con DOS
               líneas de marcador: `<!-- process-proposals: 0 -->` y
               `<!-- process-review-done -->` (marcador que consume
               el fail-safe de presencia de este workflow; sin él, tu
               revisión consta como NO hecha — protocol.md).
            5. Si hay patrón: crea COMO MÁXIMO 2 issues (cap total), cada
               uno con: título `process-proposal · <resumen>`; el patrón con
               evidencia citada (issue/PR/métrica concretos, ≥2 épicas); la
               propuesta concreta (qué doc/hook/workflow cambiaría y cómo);
               coste y riesgo (incluido el riesgo de la interacción con el
               resto del pipeline — revisa «Known failure classes» del
               pipeline-map); y a quién toca aplicarla.
               **ROUTING POR EJE (2026-07-14, decisión del propietario —
               la cola vive donde se arregla):**
               - Si el fix cambiaría ficheros de `agent-pipeline` (mandatos
                 `vendored/`, hooks, workflows reusables, composite actions,
                 templates, guards/post-steps): la propuesta va AL CENTRAL —
                 `gh issue create --repo talfarouriarte-cloud/agent-pipeline
                 --label process-proposal`, y el body EMPIEZA con
                 `Origen: <repo>#<auditoría>` (enlace a la evidencia; el
                 cierre cross-repo lo usará).
               - Si el fix cambiaría ficheros de ESTE repo (annexes, docs
                 locales, `ci.yml` propio, skills del repo, dominio): issue
                 LOCAL como siempre (`gh issue create --label
                 process-proposal`).
               - Si el create cross-repo FALLA (403/404: token sin alcance),
                 NO lo pierdas en silencio: créala LOCAL con el prefijo
                 `[PARA-CENTRAL]` en el título y anota el fallo en el
                 comentario del issue de auditoría.
               Después comenta en el issue de auditoría la lista de
               propuestas creadas CON SU DESTINO (central/local); ese
               comentario TERMINA con DOS líneas de marcador:
               `<!-- process-proposals: N -->` (N = propuestas escindidas,
               links en el cuerpo) y `<!-- process-review-done -->`
               (mismo marcador y motivo que en el paso 4).

            6. LOOP DE SKILLS (ADR-212 — lee el ADR antes de editar).
               ENTRAS a este paso SOLO con los comentarios de (4-5) YA
               publicados (propuesta #1258: publicar antes de commitear —
               una muerte de sesión aquí no puede dejar la auditoría sin
               revisión de proceso visible). Además de (4-5), evalúa el bloque «## Patrones de fallo del Creator»
               de las auditorías:
               - Si un TIPO de hallazgo recurre (≥3 en la épica o ≥2 épicas),
                 puedes ejecutar hasta 2 EDICIONES DE SKILL por épica,
                 EXCLUSIVAMENTE dentro de la sección
                 «## Heurísticas aprendidas (loop)» de las skills entrenables
                 listadas en ADR-212. Operaciones add/delete/replace acotadas;
                 cada add paga contexto del Creator: prefiere delete/replace.
               - ORDEN OBLIGATORIO (2026-07-12, propuesta #1258 — el run
                 29139108015 commiteó y murió sin publicar NADA: veto
                 asíncrono puenteado en silencio). PRIMERO publica en el
                 issue de auditoría el comentario con el diff INTENDIDO, el
                 tipo que ataca y la evidencia citada, terminado en
                 `<!-- autonomous-decision -->`. DESPUÉS ejecuta el commit
                 vía Git Data (gh api, sobre la rama por defecto, mensaje
                 `skill(loop): <tipo> — <resumen>`) con el marcador
                 `<!-- skill-edit: <tipo> <fecha> -->` en cada línea
                 añadida/sustituida. AL FINAL edita el comentario para
                 añadir el SHA del commit. Via negativa: si mueres entre
                 comentario y commit queda un anuncio sin ejecutar (visible,
                 inocuo — un anuncio sin SHA final = edición no ejecutada);
                 el orden inverso deja un commit sin anuncio (invisible,
                 sin veto posible).
               - INTEGRIDAD POST-COMMIT (misma propuesta — el commit
                 de3ada2f corrompió un carácter FUERA de la sección loop,
                 mojibake UTF-8): tras commitear, baja el diff del commit
                 contra su parent (gh api) y verifica que SOLO toca líneas
                 dentro de «## Heurísticas aprendidas (loop)». Si toca
                 CUALQUIER otra cosa: revierte el commit (Git Data, mismo
                 mecanismo) y repórtalo en el comentario.
               - REVERT por defecto: si una edición previa (marcador con ≥2
                 épicas) tiene su tipo aún recurriendo según el bloque del
                 Auditor, reviértela igual (commit + autonomous-decision).
               - Si el clúster no tiene casa en ninguna skill (test
                 single-home) y lleva ≥2 épicas: NO crees la skill tú —
                 emite un `process-proposal` de creación con la descripción
                 de disparo propuesta (el alta exige pipeline-map, que te
                 está vetado).

            Reglas duras:
            - PROHIBIDO escribir la mención de arm (arroba+claude) en
              cualquier body o comentario que publiques.
            - PROHIBIDO modificar cualquier fichero FUERA de las secciones
              «## Heurísticas aprendidas (loop)» de las skills entrenables
              de ADR-212 (jamás docs, workflows, pipeline-map, protocol.md,
              ni el resto de una skill): fuera de ese perímetro propones, el
              humano decide, otros aplican.
            - Máximo 2 propuestas y 2 skill-edits. Sin evidencia ⇒ nada.

      # finplan#1326 (2026-07-13, sustituye al `if: failure()` de #1258):
      # el exit code del step de sesión MIENTE. Verificado en 4 paneles de
      # 2 repos (finplan #1302/#1305/#1312, wmcb #27): la sesión muere en
      # 1 turno (<1s, coste 0, `is_error: true` en el JSON de ejecución) y
      # la action sale 0 ⇒ `failure()` nunca dispara. El timeout del job
      # tampoco: la cancelación deja `failure()` en false (run 29257318998).
      # Cierre: verificar el estado MATERIALIZADO (marcador en el panel),
      # no el exit code — mismo principio que agent-pipeline#12 aplicó al
      # post-step del Auditor. `always()` corre en éxito, fallo y
      # cancelación por timeout.
      - name: Verificación de presencia del resultado
        if: always() && steps.idem.outputs.done != 'true'
        env:
          GH_TOKEN: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          CUERPOS=$(gh api "repos/${REPO}/issues/${ISSUE}/comments" \
               --paginate --jq '.[].body')
          if grep -q 'process-review-done' <<< "$CUERPOS"; then
            echo "::notice::Revisión de proceso materializada en el panel (marcador presente)."
            exit 0
          fi
          # Sin marcador: la revisión NO ocurrió, terminara como terminara
          # el step de sesión. Diagnóstico desde el JSON de ejecución si
          # sobrevive en el runner (muertes instantáneas: is_error/num_turns).
          DIAG="sin JSON de ejecución (sesión no arrancó o timeout del job)"
          EXEC="${RUNNER_TEMP}/claude-execution-output.json"
          if [ -f "$EXEC" ]; then
            DIAG=$(python3 -c "import json; d=json.load(open('${EXEC}')); d=d[-1] if isinstance(d,list) else d; print('is_error=%s num_turns=%s duration_ms=%s cost=%s' % (d.get('is_error'), d.get('num_turns'), d.get('duration_ms'), d.get('total_cost_usd')))" 2>/dev/null || echo "JSON de ejecución ilegible")
          fi
          BODY=$(printf '%s\n\n%s\n\n%s' \
            "**process-review · resultado AUSENTE** — el run terminó sin materializar la revisión de proceso en este panel (ningún comentario con el marcador de resultado). Diagnóstico: ${DIAG}. Run: ${RUN_URL}." \
            "Re-arme: retirar y re-aplicar \`auditoria-completa\` (con PAT — los eventos del token default no disparan workflows). Precaución antes del siguiente ciclo: puede haber efectos parciales sin publicar (commits \`skill(loop):\` en la rama por defecto posteriores a la última auditoría)." \
            "<!-- process-review-pendiente -->")
          gh issue comment "${ISSUE}" --repo "${REPO}" --body "$BODY"
          gh api -X POST "repos/${REPO}/issues/${ISSUE}/labels" -f "labels[]=process-review-pendiente"
          echo "::error::Revisión de proceso NO materializada — panel marcado process-review-pendiente."
          exit 1

      - name: Auto-archivo del panel de auditoría (2026-07-14, wmcb#53)
        # El issue de auditoría es un ACTA: con el ciclo completo, mantenerlo
        # abierto es un gate que no decide nada (las decisiones humanas viven
        # en los process-proposal escindidos, que NO se auto-cierran). Cierre
        # determinista por CO-PRESENCIA de marcadores: audit-verdict (Auditor)
        # + process-proposals (process-reviewer). Sin ambos, queda abierto —
        # el fallo silencioso clase wmcb#27 (pase omitido) se vuelve VISIBLE.
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const n = context.payload.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: n, per_page: 100 });
            const all = comments.map(c => c.body || '').join('\n');
            const hasVerdict = /<!--\s*audit-verdict:\s*(clean|findings)\s*-->/.test(all);
            const hasReview = /<!--\s*process-proposals:\s*\d+\s*-->/.test(all);
            if (!hasVerdict || !hasReview) {
              core.notice(`auditoría #${n}: ciclo incompleto (verdict=${hasVerdict}, review=${hasReview}) — queda abierta señalando la anomalía.`);
              return;
            }
            await github.rest.issues.addLabels({ owner, repo, issue_number: n, labels: ['auto-archivada'] });
            await github.rest.issues.update({ owner, repo, issue_number: n, state: 'closed', state_reason: 'completed' });
            core.notice(`auditoría #${n}: ciclo completo — auto-archivada.`);
