name: Watchdog

# Watchdog de colas de agentes (autorizado por el humano 2026-07-02: el
# Architect gestiona colas y relanza salvo problema irresoluble).
#
# Arquitectura en dos etapas (via negativa en coste):
#   1. `detect` — script barato cada 20 min. Consulta la API y decide si hay
#      trabajo en vuelo aparentemente parado. Cero LLM.
#   2. `architect` — Claude, SOLO si detect encuentra anomalías. Diagnostica
#      con fineza (checklist del Creator, estado de la rama, labels) y actúa:
#      re-arm "completa el trabajo", re-trigger del Reviewer, relanzar
#      sentinel de épica. Rol vinculante en docs/agents/watchdog.md.
#
# Firma universal que dispara la etapa 2: hay trabajo armado (issue con
# @claude reciente u open PR de rama claude/*) Y ningún run de Actions en
# queued/in_progress Y silencio > STALL_MIN. Cubre los tres modos de fallo
# observados:
#   a) Creator termina con conclusion:success pero trabajo a medias, sin PR
#      (caso A5 #949, run 28556901580: 10m29s, checklist sin marcar).
#   b) Cadena del Reviewer rota antes del LGTM (CI verde, PR envejeciendo).
#   c) Sentinel launch-next mergeado sin que el siguiente issue arranque.
#   d) PR de rama claude/* con CI en rojo (2026-07-03, #997): retry mecánico
#      del CI UNA vez desde detect (sin LLM — el retry es el detector
#      empírico de flakiness); si reincide, el Architect hace ping-creator.
#   e) Handoff Creator→Reviewer roto (2026-07-08, #1133): cierre `@reviewer`
#      del Creator SIN label needs-review ni veredicto posterior. Firma
#      DETERMINISTA sin envejecimiento (la label la pone un step mecánico
#      en segundos; si a los 2 min no está, no aparecerá a los 30):
#      re-aplicar needs-review desde detect CON EL PAT (el `labeled` del
#      GITHUB_TOKEN no dispara reviewer.yml por el anti-loop). Cap 2 vía
#      <!-- watchdog-handoff-fix -->; después, anomalía para el Architect.
#
# Kill-switches:
#   - Items con label `pause-agents` se excluyen de la detección (ADR-063).
#   - `stalled` YA NO excluye (régimen autónomo 2026-07-07): es la señal
#     que dispara architect-resolve. El cortacircuito humano es `human-needed`
#     (doble rebote), que SÍ excluye.
#   - Desactivación global: Actions → Watchdog → Disable workflow.
#
# Cap de reintentos: 2 re-arms autónomos por item, contados por el marcador
# `<!-- watchdog-rearm -->` en comentarios. Al tercero: label `stalled` +
# comentario de diagnóstico SIN @claude. Lo aplica el Architect (etapa 2);
# detect solo filtra los ya escalados.

# CALLABLE (agent-pipeline): triggers (labeled, cron, workflow_run de los
# workflows del pipeline del consumidor, workflow_dispatch) y concurrency
# (group: watchdog, cancel-in-progress: false) viven en el stub. Los NOMBRES
# de los workflows del pipeline se pasan como inputs: el detector compara
# run.name contra ellos.
on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: ubuntu-latest
      default_branch:
        type: string
        default: main
      ci_workflow_name:
        type: string
        default: CI
      creator_workflow_name:
        description: Valor de name del stub del Creator en el consumidor
        type: string
        default: Claude Code
      reviewer_workflow_name:
        type: string
        default: Opus Reviewer
      epic_merge_workflow_name:
        type: string
        default: Epic Merge
      extra_pipeline_workflows:
        description: Nombres extra separados por coma (ej. Visual)
        type: string
        default: ""
      epic_label:
        type: string
        default: epica
      resolve_model:
        type: string
        default: claude-opus-4-8
      resolve_max_turns:
        type: number
        default: 40
      lookback_min:
        type: number
        default: 45
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      REVIEWER_GITHUB_TOKEN:
        required: true

permissions:
  contents: read
  issues: read
  pull-requests: read
  actions: read

jobs:
  detect:
    runs-on: ${{ inputs.runner }}
    # 12 y no 5 (2026-07-14, incidente fp#1350 — 31 min de re-arm humano):
    # el settle de capa 2 (AP-011) dura 330s; con timeout 5 el job moría por
    # timeout DENTRO del settle en todo tick event-driven, reportado como
    # `cancelled` — la capa 2 nunca llegó a evaluar. Presupuesto: settle 5.5
    # + scan/architect-dispatch ~3 + margen.
    timeout-minutes: 12
    permissions:
      contents: read
      issues: read
      statuses: write   # espejo watchdog/turno en checks (2026-07-10)
      # Modo d): re-run de jobs fallidos del CI + comentario-marcador en el
      # PR. El GITHUB_TOKEN basta (no necesita disparar otros workflows: la
      # RE-EJECUCIÓN del CI emite su propio workflow_run al concluir, y
      # epic-merge escucha ese evento — la cadena se reanuda sola si el
      # retry sale verde). Watchdog NO escucha a CI ⇒ sin bucle.
      actions: write
      pull-requests: write
    outputs:
      found: ${{ steps.scan.outputs.found }}
      anomalies: ${{ steps.scan.outputs.anomalies }}
    steps:
      - name: Settle (event-driven only) — capa 2 de vigilancia (AP-011)
        # Era sleep 90 (que los runs encadenados lleguen a queued antes del
        # gate 0). 2026-07-13, AP-011: sube al bound de liveness COMPLETO
        # (330s > STALL_MIN=5min). Motivo (incidente finplan#1319): el tick
        # event-driven llegaba DENTRO de la ventana de liveness, el scan
        # saltaba los ítems por frescos y el tick moría en silencio — la
        # evaluación quedaba en manos del cron (best-effort; observado 79
        # min de hueco con cron */20). Con el settle al bound completo, cada
        # fin de workflow de agente garantiza UNA evaluación EFECTIVA a los
        # ~5.5 min del evento. El gate 0 sigue cazando lo que arrancó
        # mientras dormía (sano). El cron queda como capa 3: red final para
        # silencio total, no capa de latencia.
        if: github.event_name == 'workflow_run'
        run: sleep 330

      - name: Scan for stalled work
        id: scan
        uses: actions/github-script@v7
        env:
          STATUS_TOKEN: ${{ github.token }}
          # Modo e): la label needs-review debe salir con el PAT — un
          # `labeled` emitido por el GITHUB_TOKEN no dispara reviewer.yml
          # (anti-loop de GitHub). Solo se usa para esa llamada puntual;
          # el resto del scan sigue con el GITHUB_TOKEN.
          ARM_PAT: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
          # Inputs al script vía env (2026-07-11, Fase C): el script rozaba el
          # límite de 21000 chars por expresión (21.896) — misma clase que el
          # fallo de arranque de epic-merge en el primer consumidor.
          IN_CREATOR_WF: ${{ inputs.creator_workflow_name }}
          IN_REVIEWER_WF: ${{ inputs.reviewer_workflow_name }}
          IN_CI_WF: ${{ inputs.ci_workflow_name }}
          IN_EPIC_MERGE_WF: ${{ inputs.epic_merge_workflow_name }}
          IN_EXTRA_WFS: ${{ inputs.extra_pipeline_workflows }}
          IN_LOOKBACK_MIN: ${{ inputs.lookback_min }}
          IN_DEFAULT_BRANCH: ${{ inputs.default_branch }}
        with:
          script: |
            // Umbral de silencio por tipo de disparo: en workflow_run el
            // evento ES la señal (un run acaba de concluir) — no hay que
            // esperar envejecimiento. En cron, 30 min para no cazar
            // trabajo simplemente lento.
            // AP-011: cada tick declara la CAPA que lo despertó, para que el
            // 5-whys del Auditor atribuya el fallo a la capa correcta
            // (workflow_run=capa 2; schedule=capa 3; workflow_dispatch=heartbeat/humano).
            const CAPA = `<!-- watchdog-capa: ${context.eventName} -->`;
            const STALL_MIN = 5;  // ADR-217 §3: bound de liveness (física de materialización de runs), no envejecimiento heurístico — la detección es de estado, el tiempo solo evita carreras
            const ARM_WINDOW_H = 72;       // ventana de arms relevantes
            const now = Date.now();
            const ageMin = iso => (now - new Date(iso).getTime()) / 60000;
            const O = { owner: context.repo.owner, repo: context.repo.repo };

            // ── Modo e) (2026-07-05, incidente PR #1091): fallo de ARRANQUE
            // del agente. Un run de Claude Code / Opus Reviewer con
            // conclusion=failure y duración <90s murió instalando infra
            // (npm/tarball/red), sin llegar a trabajar. Señal determinista:
            // re-run inmediato UNA vez (run_attempt dedupea), cero LLM.
            // Va ANTES del gate 0: el run fallido ya concluyó, y otros runs
            // activos no deben ocultarlo. Si falla también el 2º intento
            // (run_attempt>=2), anomalía para la etapa architect.
            try {
              const AGENT_WFS = [process.env.IN_CREATOR_WF, process.env.IN_REVIEWER_WF];
              const STARTUP_MAX_S = 90;
              const LOOKBACK_MIN = Number(process.env.IN_LOOKBACK_MIN); // ~2 ticks de cron
              const { data: recent } = await github.rest.actions.listWorkflowRunsForRepo({
                ...O, status: 'failure', per_page: 30 });
              for (const r of recent.workflow_runs) {
                if (!AGENT_WFS.includes(r.name)) continue;
                if (ageMin(r.created_at) > LOOKBACK_MIN) continue;
                const durS = (new Date(r.updated_at) - new Date(r.run_started_at || r.created_at)) / 1000;
                if (durS >= STARTUP_MAX_S) continue; // fallo tardío: no es arranque
                if ((r.run_attempt || 1) >= 2) {
                  anomalies.push({ type: 'agent-startup-failure-persistent',
                    run_id: r.id, workflow: r.name, attempts: r.run_attempt });
                  continue;
                }
                try {
                  await github.rest.actions.reRunWorkflowFailedJobs({ ...O, run_id: r.id });
                  core.notice(`Modo e: re-run del arranque fallido ${r.name} #${r.id} (${Math.round(durS)}s).`);
                } catch (e) { core.warning(`Modo e re-run ${r.id}: ` + e.message); }
              }
            } catch (e) { core.warning('Modo e falló (no bloquea): ' + e.message); }

            // ── Gate 0: ¿hay algo moviéndose? Si hay CUALQUIER run activo
            // de los workflows del pipeline, no hay cuelgue: salir.
            //
            // Filtro de edad: la API retiene runs fantasma en `queued`
            // indefinidamente (observado: run 26447434898, encolado 37 días).
            // Un run del pipeline no vive >6h de verdad (timeouts de job
            // ≤ ~1h); todo lo más viejo se ignora o el gate quedaría
            // bloqueado para siempre.
            const PIPELINE = [process.env.IN_CREATOR_WF, process.env.IN_REVIEWER_WF, process.env.IN_CI_WF, process.env.IN_EPIC_MERGE_WF, ...((process.env.IN_EXTRA_WFS || '').split(',').map(s => s.trim()).filter(Boolean))];
            const MAX_RUN_AGE_H = 6;
            let inFlight = false;
            for (const status of ['in_progress', 'queued']) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                ...O, status, per_page: 50,
              });
              if (data.workflow_runs.some(r =>
                    PIPELINE.includes(r.name)
                    && ageMin(r.created_at) < MAX_RUN_AGE_H * 60)) {
                inFlight = true; break;
              }
            }
            if (inFlight) {
              core.notice('Runs del pipeline activos; nada que vigilar.');
              core.setOutput('found', 'false');
              core.setOutput('anomalies', '[]');
              return;
            }

            const anomalies = [];

            // ── Régimen autónomo: evento labeled=stalled ⇒ anomalía directa
            // para architect-resolve (diagnostica, decide, des-stallea, re-arma).
            // Doble rebote: si el ítem ya tiene 2+ <!-- autonomous-decision -->,
            // label human-needed y NO anomalía (cortacircuito).
            if ((context.eventName === 'issues' || context.eventName === 'pull_request')
                && context.payload.action === 'labeled'
                && context.payload.label?.name === 'stalled') {
              const num = context.payload.issue?.number || context.payload.pull_request?.number;
              try {
                const { data: cs } = await github.rest.issues.listComments({ ...O, issue_number: num, per_page: 100 });
                const autos = cs.filter(c => (c.body || '').includes('<!-- autonomous-decision -->')).length;
                if (autos >= 2) {
                  await github.rest.issues.addLabels({ ...O, issue_number: num, labels: ['human-needed'] });
                  await github.rest.issues.createComment({ ...O, issue_number: num,
                    body: `Doble rebote tras recuperación autónoma: cortacircuito. Requiere decisión humana.\n\n<!-- watchdog-circuit-breaker -->\n${CAPA}` });
                  core.notice(`#${num}: doble rebote ⇒ human-needed.`);
                } else {
                  anomalies.push({ type: 'stalled-autonomous-resolve', number: num });
                }
              } catch (e) { core.warning('stalled-resolve: ' + e.message); }
            }
            // Régimen autónomo: `stalled` ya no excluye (es la señal de
            // architect-resolve); `human-needed` es el cortacircuito que sí.
            const skip = labels =>
              labels.some(l => ['pause-agents', 'human-needed',
                // Paneles de época (fix 2026-07-12, propuesta #1287 finplan):
                // quedan ABIERTOS por diseño con su arm en el body — para el
                // detector issue-armed-no-pr eran stall eterno (churn de
                // inspecciones + human-needed sobre trabajo terminado).
                'auditoria', 'process-proposal', 'registro-decisiones'].includes(l.name));


            // ── Dispatcher de TURNO (ADR-217, 2026-07-10, state-driven).
            // Sustituye a pr-stalled (envejecimiento de 30 min) y absorbe el
            // modo e. Invariante: todo ítem abierto tiene turno asignado.
            // El gate 0 garantiza que al llegar aquí NADIE está activo ⇒
            // turno-de-agente == zombi confirmado: relanzar la transición
            // rota (mecánico, cap 2 vía TURN_MARK); turno de NADIE ⇒
            // anomalía inmediata; gate humano declarado ⇒ sano (skip).
            // El único tiempo es LIVENESS_MIN, anti-carrera. Regla de
            // mantenimiento (ADR-217 §5): todo marcador/label nuevo en
            // protocol.md actualiza esta función en el mismo cambio.
            // Espejo en checks (2026-07-10): cada intervención del
            // dispatcher deja un commit status `watchdog / turno` en el
            // head SHA — visible junto a CI/Reviewer en la caja del PR.
            const turnStatus = async (pr, state, desc) => {
              try {
                const res = await fetch(`https://api.github.com/repos/${O.owner}/${O.repo}/statuses/${pr.head.sha}`, {
                  method: 'POST',
                  headers: { Authorization: `Bearer ${process.env.STATUS_TOKEN}`, Accept: 'application/vnd.github+json' },
                  body: JSON.stringify({ state, description: desc.slice(0, 140), context: 'watchdog / turno' }) });
                if (!res.ok) core.info(`turnStatus HTTP ${res.status}`);
              } catch (e) { core.info('turnStatus: ' + e.message); }
            };
            const TURN_MARK = '<!-- watchdog-turn-relaunch -->';
            const HANDOFF_MARK = '<!-- watchdog-handoff-fix -->';   // histórico: cuenta para el cap
            const LGTM_REMAT_MARK = '<!-- watchdog-lgtm-rematerialize -->';  // AP-024: cap 1 propio, no cuenta para el cap 2 de relanzamiento
            const LIVENESS_MIN = 5;
            const patCall = async (method, path, body) => {
              const res = await fetch(`https://api.github.com/repos/${O.owner}/${O.repo}${path}`,
                { method, headers: { Authorization: `Bearer ${process.env.ARM_PAT}`,
                                     Accept: 'application/vnd.github+json' },
                  body: body ? JSON.stringify(body) : undefined });
              if (!res.ok && res.status !== 404) throw new Error(`HTTP ${res.status} ${path}`);
              return res;
            };
            const { data: prs } = await github.rest.pulls.list({ ...O, state: 'open', per_page: 50 });
            // ── Re-derivación por ESTADO de la señal `stalled` (AP-038).
            // El camino por evento (labeled=stalled ⇒ anomalía directa, arriba)
            // solo existe en el PAYLOAD de su run — y la concurrency global del
            // stub (`group: watchdog`) cancela el pending más antiguo en cada
            // racha de workflow_run: el run capa-1 muere y la señal con él
            // (medido: finplan#1544, 2026-07-20 16:31:37Z, run `issues`
            // cancelled; ningún tick posterior la recogía porque el scan no
            // derivaba `stalled`). Doctrina ADR-217/AP-036: la señal debe ser
            // re-derivable del ESTADO por CUALQUIER run superviviente — el
            // evento es la vía rápida, jamás la única. Mismo cortacircuito de
            // doble rebote que el camino por evento; dedupe contra anomalías ya
            // encoladas en este run. Carreras: la concurrency global serializa
            // runs completos (detect+resolve), así que cuando este scan ve
            // `stalled`, ningún resolve está en vuelo — o lo quitó, o murió.
            try {
              const { data: stIss } = await github.rest.issues.listForRepo({ ...O,
                state: 'open', labels: 'stalled', per_page: 30 });
              for (const it of stIss) {
                if (it.pull_request) continue;             // PRs: los cubre el bloque de PRs abajo
                if (skip(it.labels)) continue;
                if (anomalies.some(a => a.number === it.number)) continue;
                const { data: cs } = await github.rest.issues.listComments({ ...O, issue_number: it.number, per_page: 100 });
                const autos = cs.filter(c => (c.body || '').includes('<!-- autonomous-decision -->')).length;
                if (autos >= 2) {
                  if (!cs.some(c => (c.body || '').includes('<!-- watchdog-circuit-breaker -->'))) {
                    await github.rest.issues.addLabels({ ...O, issue_number: it.number, labels: ['human-needed'] });
                    await github.rest.issues.createComment({ ...O, issue_number: it.number,
                      body: `Doble rebote tras recuperación autónoma: cortacircuito. Requiere decisión humana.\n\n<!-- watchdog-circuit-breaker -->\n${CAPA}` });
                    core.notice(`#${it.number}: doble rebote (scan) ⇒ human-needed.`);
                  }
                } else {
                  anomalies.push({ type: 'stalled-autonomous-resolve', number: it.number });
                  core.notice(`#${it.number}: stalled re-derivado del estado (AP-038).`);
                }
              }
              for (const pr of prs.filter(p => p.labels?.some(l => l.name === 'stalled'))) {
                if (skip(pr.labels)) continue;
                if (anomalies.some(a => a.number === pr.number)) continue;
                anomalies.push({ type: 'stalled-autonomous-resolve', number: pr.number });
                core.notice(`PR #${pr.number}: stalled re-derivado del estado (AP-038).`);
              }
            } catch (e) { core.warning('re-derivación stalled: ' + e.message); }
            // ── Belt de CIERRE por estado (AP-037): si el resolver publicó la
            // verificación materializada (`<!-- cierre-verificado -->`, actor de
            // confianza) sobre un issue `estado:cierre-pendiente-humano` pero el
            // `gh issue close` no llegó a ejecutarse (ventana de muerte de la
            // sesión), el detect cierra por FIRMA en el siguiente tick — no
            // reconstruimos la dependencia de formato-de-acción que AP-036 mató:
            // la verificación ES el estado; el cierre se deriva de él. Rastro
            // `<!-- cierre-materializado-por-estado -->` bloquea re-emisiones.
            // Residual honesto: sin verificación publicada no hay cierre — el
            // issue queda como en el régimen previo (cierre humano).
            try {
              const { data: pendClose } = await github.rest.issues.listForRepo({ ...O,
                state: 'open', labels: 'estado:cierre-pendiente-humano', per_page: 30 });
              for (const it of pendClose) {
                if (it.pull_request) continue;
                if (it.labels.some(l => (l.name || l) === 'pause-agents' || (l.name || l) === 'human-needed')) continue;
                const { data: ccs } = await github.rest.issues.listComments({ ...O, issue_number: it.number, per_page: 100 });
                const trusted = c => ['OWNER', 'MEMBER', 'COLLABORATOR'].includes(c.author_association) || c.user?.login === 'claude[bot]';
                if (ccs.some(c => trusted(c) && /<!--\s*cierre-materializado-por-estado\s*-->/.test(c.body || ''))) continue;
                if (!ccs.some(c => trusted(c) && /<!--\s*cierre-verificado\s*-->/.test(c.body || ''))) continue;
                await patCall('POST', `/issues/${it.number}/comments`, {
                  body: `**watchdog · belt de cierre por estado (AP-037)**: la verificación materializada del resolver está publicada (\`<!-- cierre-verificado -->\`) pero el issue seguía abierto — ventana de muerte del \`gh issue close\`. Cierre \`completed\` materializado por firma; el handler de cierre-por-estado (AP-031) consume los sentinels.\n\n<!-- cierre-materializado-por-estado -->\n${CAPA}` });
                try { await patCall('DELETE', `/issues/${it.number}/labels/stalled`); } catch (e) { /* label ausente: ok */ }
                await patCall('PATCH', `/issues/${it.number}`, { state: 'closed', state_reason: 'completed' });
                core.notice(`#${it.number}: cierre por estado materializado (belt AP-037).`);
              }
            } catch (e) { core.warning('belt cierre-por-estado: ' + e.message); }
            const openAgentPRs = prs.filter(p => p.head.ref.startsWith('claude/'));
            const verdictRe = /^\s*(LGTM|REVIEW|NITS)\b/;
            for (const pr of openAgentPRs) {
              if (skip(pr.labels)) continue;
              if (ageMin(pr.updated_at) < LIVENESS_MIN) continue;   // anti-carrera
              // Cede ante PRs en conflicto (2026-07-12, incidente #1303): un PR
              // `dirty` es propiedad del modo rebase de más abajo — no tiene
              // merge-ref, luego no es evaluable por el Reviewer. Sin este
              // guard, el dispatcher lo clasificaba «sin veredicto ⇒ turno del
              // Reviewer» y le ponía `needs-review`, label que a su vez impedía
              // convocar al Creator para el rebase (auto-bloqueo). Solo `dirty`
              // (conflicto real); un PR `behind` sin conflicto SÍ es mergeable
              // y no debe saltarse.
              try {
                const { data: pf } = await github.rest.pulls.get({ ...O, pull_number: pr.number });
                if (pf.mergeable_state === 'dirty') continue;
              } catch (e) { core.info(`turno/dirty-check #${pr.number}: ${e.message}`); }
              const labels = pr.labels.map(l => l.name);
              // Cede ante PRs escalados a architect-resolve (creator-escalated,
              // AP-017, repesca finplan#1391): el Creator paró y escaló DESDE
              // DENTRO del loop de PR una decisión derivable-por-Architect; el
              // post-step de claude-code materializó `estado:esperando-architect`
              // (+ `stalled` ⇒ architect-resolve por evento). El turno es del
              // Architect. Sin este guard el dispatcher cae al `else` final y
              // declara `turno-de-nadie` — degradando la escalada CORRECTA a
              // anomalía (el bug exacto de finplan#1391). architect-resolve limpia
              // el estado al rular/re-armar. Mismo patrón que la cesión `dirty`.
              if (labels.includes('estado:esperando-architect')) {
                core.notice(`PR #${pr.number}: escalado a architect-resolve (estado:esperando-architect) — el dispatcher de turno cede.`);
                continue;
              }
              const { data: hcs } = await github.rest.issues.listComments({ ...O, issue_number: pr.number, per_page: 100 });
              const verdicts = hcs.filter(c => verdictRe.test((c.body || '').trim()));
              const lastVerdict = verdicts[verdicts.length - 1] || null;
              const lastV = lastVerdict ? (lastVerdict.body || '').trim().split(/\s/)[0].replace(':','') : null;
              const bots = hcs.filter(c => c.user && c.user.type === 'Bot' && c.user.login.startsWith('claude'));
              const lastBot = bots[bots.length - 1] || null;
              const botAfterVerdict = !!lastBot && (!lastVerdict || new Date(lastBot.created_at) > new Date(lastVerdict.created_at));
              const closesReviewer = !!lastBot && /^\s*@reviewer\b/im.test(lastBot.body || '');
              const closesReady = !!lastBot && /^\s*\[READY-TO-MERGE\]/m.test(lastBot.body || '');
              const relaunches = hcs.filter(c => { const b = c.body || ''; return b.includes(TURN_MARK) || b.includes(HANDOFF_MARK); }).length;
              // Cinturón por-estado de escalada (AP-028 capa 3, repesca finplan#1467):
              // firma DETERMINISTA de rastro-mecánico-ausente. El Creator publica
              // `creator-escalated`: token de TEXTO anclado a inicio de línea en la
              // primera línea del cierre (vía primaria, AP-035) O marcador HTML en
              // comentario SEPARADO vía `gh api` (belt legacy, AP-028) — anclado
              // (línea o HTML), JAMÁS substring de prosa libre (clase 6 regex
              // polarity: «declaro el bloqueo» no es firma; el token anclado
              // + la ausencia del rastro sí). Escalada NO materializada = hay un
              // marcador SIN un rastro `-materializado` POSTERIOR a él (freshness que
              // distingue una escalada pendiente de una ya rulada/re-escalada).
              const escMarks = bots.filter(c => /<!--\s*creator-escalated\s*-->/.test(c.body || '') || /^\[CREATOR-ESCALATED\]/m.test(c.body || ''));
              const lastEscMark = escMarks[escMarks.length - 1] || null;
              const matTraces = hcs.filter(c => (c.body || '').includes('creator-escalated-materializado'));
              const lastMatTrace = matTraces[matTraces.length - 1] || null;
              const escUnmaterialized = !!lastEscMark
                && (!lastMatTrace || new Date(lastEscMark.created_at) > new Date(lastMatTrace.created_at))
                && (!lastVerdict || new Date(lastEscMark.created_at) > new Date(lastVerdict.created_at));

              // turnoDe(pr): derivado de la tabla de protocol.md.
              let turno = null, why = '', fix = null;   // fix devuelve true si ya publicó su comentario-marcador
              if (labels.includes('needs-review')) {
                turno = 'reviewer'; why = 'needs-review presente y ningún run del Reviewer nació';
                fix = async () => {   // re-labeled FRESCO con PAT (anti-loop del GITHUB_TOKEN)
                  await patCall('DELETE', `/issues/${pr.number}/labels/needs-review`);
                  await patCall('POST', `/issues/${pr.number}/labels`, { labels: ['needs-review'] });
                  return false;
                };
              } else if (lastVerdict && !botAfterVerdict && (lastV === 'REVIEW' || lastV === 'NITS')) {
                turno = 'creator'; why = `veredicto ${lastV} sin sesión posterior del Creator`;
                fix = async () => {   // el @claude debe salir con PAT o no dispara (anti-loop)
                  await patCall('POST', `/issues/${pr.number}/comments`,
                    { body: `@claude\n\nRelanzamiento de turno (ADR-217): el veredicto ${lastV} de arriba quedó sin sesión. Aplica los puntos pendientes y cierra con @reviewer (a inicio de línea).\n\n<!-- watchdog-rearm -->\n${TURN_MARK}\n${CAPA}` });
                  return true;
                };
              } else if (botAfterVerdict && (closesReviewer || (closesReady && lastVerdict && lastV !== 'LGTM'))) {
                // ex-modo e, incluida la variante READY-TO-MERGE-sin-LGTM (#1201)
                turno = 'auto-label→reviewer';
                why = closesReviewer ? 'cierre @reviewer sin needs-review' : 'READY-TO-MERGE tras veredicto no-LGTM';
                fix = async () => { await patCall('POST', `/issues/${pr.number}/labels`, { labels: ['needs-review'] }); return false; };
              } else if (lastV === 'LGTM') {
                turno = 'epic-merge';
                // ── Re-materialización de `lgtm` por estado (repesca finplan#1438,
                // AP-024). El post-step determinista del Reviewer (reviewer.yml,
                // ADR-218) puede morir en la costura prosa→label: el veredicto
                // LGTM queda PUBLICADO pero su label `lgtm` nunca se materializa;
                // como el edge de epic-merge es el evento `labeled`, el crash mata
                // la label Y su evento y el gate de merge se orfana sin que nada
                // lo re-dispare. Firma DETERMINISTA de rastro-mecánico-ausente
                // (sin aging, regla del pipeline-map): último veredicto LGTM +
                // label `lgtm` ausente + head SIN commits posteriores al veredicto
                // ⇒ re-aplicar `lgtm` con el PAT (su `labeled` re-dispara
                // epic-merge, mismo edge de ADR-218). Cap 1 vía LGTM_REMAT_MARK.
                const hasLgtm = labels.includes('lgtm');
                const remats = hcs.filter(c => (c.body || '').includes(LGTM_REMAT_MARK)).length;
                // Riesgo 1 (merge de código no revisado): si hay commits DESPUÉS
                // del veredicto, ci.yml ya retiró `ci-verde`+`lgtm` (attempt 1) y
                // re-materializar saltaría esa invalidación. Misma comprobación
                // que el turn-close-failsafe: committer.date del head vs el
                // created_at del comentario del veredicto. Fail-closed: si la
                // consulta falla se asume commit posterior y NO se re-materializa.
                let headAfterVerdict = true;
                try {
                  const { data: headCommit } = await github.rest.repos.getCommit({ ...O, ref: pr.head.sha });
                  headAfterVerdict = new Date(headCommit.commit.committer.date) > new Date(lastVerdict.created_at);
                } catch (e) { core.info(`lgtm-remat/head-check #${pr.number}: ${e.message}`); }

                if (!hasLgtm && !headAfterVerdict && remats < 1) {
                  why = 'veredicto LGTM en prosa sin label `lgtm` y sin commits posteriores (ventana de crash del post-step del Reviewer)';
                  fix = async () => {   // la label DEBE salir con PAT o su `labeled` no dispara epic-merge (anti-loop)
                    await patCall('POST', `/issues/${pr.number}/labels`, { labels: ['lgtm'] });
                    await github.rest.issues.createComment({ ...O, issue_number: pr.number,
                      body: `**watchdog · re-materialización de \`lgtm\` por estado (AP-024)**: el último veredicto del Reviewer es LGTM (cabecera ADR-063) y el head no tiene commits posteriores, pero la label \`lgtm\` no se materializó — ventana de crash del post-step del Reviewer (repesca finplan#1438). Label re-aplicada con el PAT: su \`labeled\` re-dispara epic-merge (edge ADR-218). Cap 1 por PR.\n\n${LGTM_REMAT_MARK}\n${CAPA}` });
                    return true;   // self-comment: marcador propio, no consume el cap 2 de relanzamiento
                  };
                } else {
                  why = 'LGTM emitido y sin merge (epic-merge es workflow_run: sin relanzamiento mecánico)';
                }
              } else if (!lastVerdict) {
                turno = 'reviewer';
                // Rotular el ESTADO observado, NO una causa inferida (AP-025 §4,
                // repesca finplan#1450). «trigger opened perdido» era una
                // atribución que sembró un 5-whys erróneo del Auditor
                // (finplan#1454): la causa real de esa instancia fue una muerte
                // por presupuesto del Reviewer, no un webhook perdido. Se anota la
                // conclusión del último run del Reviewer para el head — un
                // `failure` sin veredicto lo delata. Puramente cosmético: el fix
                // (re-aplicar needs-review) es idéntico.
                let lastRvConcl = 'ninguno';
                try {
                  const { data: rv } = await github.rest.actions.listWorkflowRunsForRepo({ ...O, head_sha: pr.head.sha, per_page: 20 });
                  const last = rv.workflow_runs.filter(r => r.name === process.env.IN_REVIEWER_WF)
                    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];
                  if (last) lastRvConcl = last.status === 'completed' ? (last.conclusion || 'completed') : last.status;
                } catch (e) { core.info(`reviewer-run-lookup #${pr.number}: ${e.message}`); }
                why = `PR sin veredicto ni needs-review; último run del Reviewer para el head: ${lastRvConcl}`;
                fix = async () => { await patCall('POST', `/issues/${pr.number}/labels`, { labels: ['needs-review'] }); return false; };
              } else if (escUnmaterialized) {
                // ── Cinturón por-estado de escalada (AP-028 capa 3, repesca
                // finplan#1467). Red para la ventana de muerte RESIDUAL: la sesión
                // del Creator declaró la escalada al Architect (marcador HTML
                // `creator-escalated` en comentario separado, AP-028 capa 1) pero el
                // post-step `creator-escalated` de claude-code.yml NO materializó el
                // estado — murió entre el `gh api` y el post-step, o el evento del
                // trigger se perdió: `estado:esperando-architect` ausente (el guard de
                // más arriba ya habría cedido si estuviera) Y sin rastro
                // `-materializado`. El dispatcher caería al `else` y declararía
                // `turno-de-nadie` — degradando la escalada CORRECTA a anomalía (el bug
                // exacto de finplan#1391/#1467). La belt materializa lo que el post-step
                // prometía: `estado:esperando-architect` + `stalled` con el PAT (su
                // `labeled=stalled` convoca a architect-resolve POR EVENTO, edge AP-017)
                // y CEDE. Idempotente con el post-step: publica el MISMO rastro
                // `creator-escalated-materializado`, que bloquea re-emisiones (freshness
                // de `escUnmaterialized`) y activa la cesión de la label en el próximo
                // tick. Sin aging: es rastro-mecánico-ausente, no am-I-still-working.
                turno = 'architect-resolve';
                why = 'escalada declarada (`creator-escalated`) sin `estado:esperando-architect` ni rastro `-materializado` — ventana de muerte del post-step / evento perdido';
                fix = async () => {
                  // estado visible PRIMERO, `stalled` DESPUÉS (mismo orden que el
                  // post-step): el `labeled=stalled` con PAT convoca a architect-resolve
                  // con `estado:esperando-architect` ya presente. `estado:*` es dinámica.
                  await patCall('POST', `/issues/${pr.number}/labels`, { labels: ['estado:esperando-architect'] });
                  await patCall('POST', `/issues/${pr.number}/labels`, { labels: ['stalled'] });
                  await github.rest.issues.createComment({ ...O, issue_number: pr.number,
                    body: `**watchdog · cinturón por-estado de escalada (AP-028 capa 3)**: el Creator declaró una escalada al Architect (token \`[CREATOR-ESCALATED]\` de primera línea, AP-035, o marcador HTML \`creator-escalated\` legacy) pero \`estado:esperando-architect\` nunca se materializó y no hay rastro \`-materializado\` — ventana de muerte del post-step \`creator-escalated\` de claude-code.yml (o el evento del trigger se perdió). Firma determinista de rastro-mecánico-ausente (sin aging): token/marcador anclado presente + label + rastro ausentes. Estado materializado con el PAT: \`estado:esperando-architect\` + \`stalled\` ⇒ architect-resolve dispara POR EVENTO (edge AP-017) y el dispatcher de turno cede sobre la label en el próximo tick. architect-resolve limpia el estado al rular. Idempotente: este mismo rastro bloquea re-emisiones.\n\n<!-- creator-escalated-materializado -->\n${CAPA}` });
                  return true;   // self-comment con rastro propio: no consume el cap 2 de relanzamiento
                };
              } else {
                anomalies.push({ type: 'turno-de-nadie', number: pr.number, branch: pr.head.ref,
                  labels, last_verdict: lastV,
                  note: 'ningún estado conocido asigna turno — huérfano (ADR-217 lectura a)' });
                await turnStatus(pr, 'failure', 'Turno de NADIE: estado huérfano — architect-resolve convocado');
                continue;
              }

              if (!fix) { anomalies.push({ type: `turno-${turno}-zombie`, number: pr.number, why }); continue; }
              if (relaunches >= 2) {
                anomalies.push({ type: `turno-${turno}-zombie-persistent`, number: pr.number, why,
                  note: 'relanzamiento mecánico agotado (cap 2)' });
                continue;
              }
              try {
                const selfCommented = await fix();
                if (!selfCommented) {
                  await github.rest.issues.createComment({ ...O, issue_number: pr.number,
                    body: `**watchdog · relanzamiento de turno (ADR-217)**: ${why}; transición relanzada mecánicamente (${relaunches + 1}/2). ${TURN_MARK}\n${CAPA}` });
                }
                core.notice(`PR #${pr.number}: turno=${turno} zombi ⇒ relanzado (${why}).`);
                await turnStatus(pr, 'pending', `Turno ${turno} zombi: transición relanzada (${relaunches + 1}/2) — ${why}`);
              } catch (e) {
                core.warning(`turn-relaunch #${pr.number}: ` + e.message);
                anomalies.push({ type: `turno-${turno}-relaunch-failed`, number: pr.number, why, error: e.message });
              }
            }

            // ── Modo d): PRs de agente con CI en ROJO. Retry mecánico una
            // vez (flaky-detector empírico, cero LLM); si ya se reintentó y
            // sigue rojo, anomalía para el Architect (ping-creator).
            const CI_RETRY_MARK = '<!-- watchdog-ci-retry -->';
            for (const pr of openAgentPRs) {
              if (skip(pr.labels)) continue;

              // Modo PR-dirty (incidente #1054, 2026-07-04): un PR en conflicto no
              // tiene merge-ref => GitHub NO dispara NINGÚN check de pull_request
              // (ni CI ni Reviewer). Sin este modo, un PR dirty sin sesión activa
              // queda invisible para todo el pipeline para siempre.
              const { data: prFull } = await github.rest.pulls.get({ ...O, pull_number: pr.number });
              if (prFull.mergeable === false && prFull.mergeable_state === 'dirty') {
                const { data: prCs } = await github.rest.issues.listComments({
                  ...O, issue_number: pr.number, per_page: 100,
                });
                const REBASE_MARK = '<!-- watchdog-rebase -->';
                const rebases = prCs.filter(c => (c.body || '').includes(REBASE_MARK)).length;
                // Nota: el gate 0 (runs activos => no hacer nada) ya cubre la
                // reparación en curso; aquí solo cap de reintentos via marca.
                if (rebases < 2) {
                  await github.rest.issues.createComment({
                    ...O, issue_number: pr.number,
                    body: `${REBASE_MARK}\n@claude rebasa esta rama sobre \`origin/${process.env.IN_DEFAULT_BRANCH}\` y resuelve los conflictos (watchdog: PR en conflicto sin checks posibles — sin merge-ref no corren CI ni Reviewer). Alcance intacto: solo rebase + resolución. <!-- ping-creator -->\n${CAPA}`,
                  });
                  core.notice(`PR #${pr.number}: dirty sin checks; ping de rebase ${rebases + 1}/2.`);
                } else if (rebases >= 2) {
                  anomalies.push({ type: 'pr-dirty-persistent', number: pr.number,
                    branch: pr.head.ref, rebases, labels: pr.labels.map(l => l.name) });
                }
                continue; // dirty: la lógica de CI-rojo no aplica (no hay checks)
              }

              // Run de CI más reciente sobre el HEAD exacto del PR.
              const { data: ciRuns } = await github.rest.actions.listWorkflowRunsForRepo({
                ...O, head_sha: pr.head.sha, per_page: 20,
              });
              const ci = ciRuns.workflow_runs
                .filter(r => r.name === process.env.IN_CI_WF)
                .sort((x, y) => new Date(y.created_at) - new Date(x.created_at))[0];
              if (!ci || ci.status !== 'completed' || ci.conclusion !== 'failure') continue;

              const { data: prComments } = await github.rest.issues.listComments({
                ...O, issue_number: pr.number, per_page: 100,
              });
              const retries = prComments.filter(c => (c.body || '').includes(CI_RETRY_MARK)).length;

              if (retries === 0) {
                // Fast-path de rojo ATRIBUIBLE (2026-07-12, propuesta #1268 del
                // repo de origen): si TODOS los tests fallidos pertenecen a
                // ficheros que el propio PR toca, el retry de flaky es coste
                // puro y retrasa la escalada un ciclo de cron. Fuente: las
                // anotaciones ::error del check run de CI (path del fichero).
                // Fail-open: sin anotaciones legibles ⇒ comportamiento actual
                // íntegro (retry + harvest).
                const ATTR_MARK = '<!-- watchdog-ci-attributable -->';
                let attributable = false, failedFiles = [];
                try {
                  const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({ ...O, run_id: ci.id, per_page: 50 });
                  const anns = [];
                  for (const j of jobs.jobs.filter(j => j.conclusion === 'failure')) {
                    const { data: a } = await github.rest.checks.listAnnotations({ ...O, check_run_id: j.id, per_page: 100 }).catch(() => ({ data: [] }));
                    anns.push(...a.filter(x => x.annotation_level === 'failure' && x.path && x.path !== '.github'));
                  }
                  failedFiles = [...new Set(anns.map(a => a.path))];
                  if (failedFiles.length) {
                    const prFiles = await github.paginate(github.rest.pulls.listFiles, { ...O, pull_number: pr.number, per_page: 100 });
                    const touched = new Set(prFiles.map(f => f.filename));
                    attributable = failedFiles.every(f => touched.has(f));
                  }
                } catch (e) { core.warning(`attr-check #${pr.number}: ${e.message} (fail-open a retry)`); }

                if (attributable) {
                  const attrPings = prComments.filter(c => (c.body || '').includes(ATTR_MARK)).length;
                  if (attrPings === 0) {
                    await github.rest.issues.createComment({
                      ...O, issue_number: pr.number,
                      body: `${ATTR_MARK}\n@claude CI en rojo (run ${ci.id}) con fallos ATRIBUIBLES a este PR — todos los tests fallidos viven en ficheros que el PR toca:\n\n${failedFiles.map(f => '- \n${CAPA}`' + f + '`').join('\n')}\n\nBaja el detalle con \`gh run view ${ci.id} --log-failed\`, corrige y pushea. (watchdog: fast-path sin retry de flaky — el rojo atribuible no se reintenta.) <!-- ping-creator -->`,
                    });
                    core.notice(`PR #${pr.number}: CI rojo ATRIBUIBLE (${failedFiles.length} ficheros del diff); escalado directo sin retry.`);
                  } else {
                    anomalies.push({ type: 'pr-ci-red-persistent', number: pr.number,
                      branch: pr.head.ref, ci_run: ci.id, retries, attributable: true,
                      labels: pr.labels.map(l => l.name) });
                  }
                  continue;
                }

                try {
                  await github.rest.actions.reRunWorkflowFailedJobs({ ...O, run_id: ci.id });
                  await github.rest.issues.createComment({
                    ...O, issue_number: pr.number,
                    body: `${CI_RETRY_MARK}\n**watchdog**: CI en rojo (run ${ci.id}); re-lanzados los jobs fallidos (retry 1/1, detector de flakiness). Si vuelve a rojo, se escala al Creator.\n${CAPA}`,
                  });
                  core.notice(`PR #${pr.number}: CI rojo, retry lanzado (run ${ci.id}).`);
                  // Cosecha de flaky-candidatos (2026-07-10): el retry detecta
                  // el flaky pero hasta hoy no lo REGISTRABA — el mismo test
                  // puede flakear semanas autoresolviéndose sin que nadie lo
                  // arregle. El step posterior baja el log del attempt 1 y
                  // publica los tests fallidos; el Auditor los cuenta por
                  // épica y el circuito correctivo obliga al fix.
                  core.setOutput('flaky_run', String(ci.id));
                  core.setOutput('flaky_pr', String(pr.number));
                } catch (e) {
                  core.warning(`PR #${pr.number}: no se pudo re-lanzar CI: ${e.message}`);
                  anomalies.push({ type: 'pr-ci-red-persistent', number: pr.number,
                    branch: pr.head.ref, ci_run: ci.id, retries, retry_error: e.message,
                    labels: pr.labels.map(l => l.name) });
                }
                continue; // el retry en vuelo reabre el gate 0 en el próximo pase
              }

              anomalies.push({
                type: 'pr-ci-red-persistent',
                number: pr.number,
                branch: pr.head.ref,
                ci_run: ci.id,
                retries,
                labels: pr.labels.map(l => l.name),
              });
            }

            // ── Issues abiertos armados con @claude sin PR abierta asociada
            // y en silencio. La asociación PR↔issue usa el patrón de rama
            // del Creator: claude/issue-<n>-*.
            const { data: issues } = await github.rest.issues.listForRepo({
              ...O, state: 'open', sort: 'updated', direction: 'desc', per_page: 50,
            });
            for (const issue of issues) {
              if (issue.pull_request) continue;        // solo issues puros
              if (skip(issue.labels)) continue;
              if (ageMin(issue.updated_at) < STALL_MIN) continue;

              // ¿Rama de PR abierta para este issue? Entonces el trabajo
              // vive en la PR (cubierto arriba si está parada).
              if (openAgentPRs.some(p =>
                    p.head.ref.startsWith(`claude/issue-${issue.number}-`))) continue;

              // Buscar el último arm humano (@claude o ping-creator) en
              // los comentarios recientes.
              const { data: comments } = await github.rest.issues.listComments({
                ...O, issue_number: issue.number, per_page: 100,
              });
              // El arm puede vivir en el BODY del issue, no solo en comentarios
              // (2026-07-15, wmcb#59: issue armado por body, bloqueado por el
              // guard de cadena, e INVISIBLE para este detector en cada scan —
              // lastArm=null => continue => 77 min de stall sin rescate). El
              // body cuenta como arm-base con la fecha de creación del issue.
              let lastArm = (issue.body || '').includes('@claude')
                ? { created_at: issue.created_at } : null;
              let lastBot = null, rearms = 0;
              for (const c of comments) {
                const body = c.body || '';
                const isBot = c.user.login === 'claude[bot]';
                // Los arms de bot también son arms (incidente #1048): con
                // `!isBot`, un arm de claude[bot] rechazado por la action
                // dejaba lastArm=null y el watchdog quedaba ciego.
                if (body.includes('@claude') || body.includes('<!-- ping-creator -->'))
                  lastArm = c;
                if (isBot) lastBot = c;
                if (body.includes('<!-- watchdog-rearm -->')) rearms++;
              }
              if (!lastArm) continue;
              if (ageMin(lastArm.created_at) > ARM_WINDOW_H * 60) continue;

              // Armado, sin PR abierta, todo en silencio > STALL_MIN, y
              // ningún run activo (gate 0). Candidato. El diagnóstico fino
              // (¿terminó de verdad? ¿murió a medias? ¿PR ya mergeada y el
              // issue quedó abierto?) es del Architect, no de este script.
              if (issue.labels.some(l => l.name === 'serial-activo')) {
                await github.rest.issues.removeLabel({
                  ...O, issue_number: issue.number, name: 'serial-activo' }).catch(() => {});
                core.notice(`serial-activo huérfano retirado de #${issue.number} (Creator sin PR).`);
              }
              anomalies.push({
                type: 'issue-armed-no-pr',
                number: issue.number,
                title: issue.title.slice(0, 80),
                armed_at: lastArm.created_at,
                last_bot_comment_at: lastBot ? lastBot.created_at : null,
                watchdog_rearms_so_far: rearms,
                labels: issue.labels.map(l => l.name),
              });
            }

            const found = anomalies.length > 0;
            core.setOutput('found', String(found));
            core.setOutput('anomalies', JSON.stringify(anomalies));
            if (found) {
              core.notice(`Anomalías detectadas: ${anomalies.length}`);
              core.info(JSON.stringify(anomalies, null, 2));
            } else {
              core.notice('Sin anomalías.');
            }

      # RED de PR huérfano (v1.2, incidentes wmcb #7 y #6, 2026-07-11): el
      # Creator termina success con el trabajo en rama pero SIN abrir el PR,
      # dejando un enlace «Create PR» (quick-pull /compare/) como artefacto.
      # Firma determinista ⇒ reparación mecánica: el watchdog crea el PR con
      # la polaridad declarada en el comentario de cierre (default full-pr).
      # Sale con el PAT: un PR creado con GITHUB_TOKEN no dispararía reviewer.
      # Movido del job `architect` (2026-07-15, central#34 — sensor
      # estructuralmente muerto desde 2026-07-10): `steps.scan` es job-scoped
      # y en `architect` evaluaba siempre vacío ⇒ skipped en todo run; los
      # outputs flaky_run/flaky_pr tampoco cruzaban la frontera del job; y el
      # gating `found==true` impedía cosechar retries de flaky puro. Aquí los
      # tres defectos desaparecen: mismo job que el scan, corre en todo tick.
      - name: Harvest flaky candidates (modo d)
        if: steps.scan.outputs.flaky_run != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RUN="${{ steps.scan.outputs.flaky_run }}"
          PR="${{ steps.scan.outputs.flaky_pr }}"
          TMP=$(mktemp -d)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${RUN}/attempts/1"
          # Vacío materializado (issue #103): un sensor que no puede leer deja
          # rastro, no silencio. Cualquier salida vacía —download/unzip fallan,
          # o ningún formato casa— postea IGUALMENTE el comentario con marcador
          # flaky-harvest: el Auditor lo cuenta por épica y la señal se agrega.
          # Viola «no silent caps» y los principios 1/3 de protocol.md que el
          # exit 0 mudo (nueve retries, cero cosechas) incumplía.
          post_unparseable() {
            gh pr comment "$PR" --repo "${{ github.repository }}" --body "$(printf '**watchdog · cosecha de flaky-candidatos** (attempt 1 del run %s): attempt 1 no parseable — sin bloque Failed Tests ni anotaciones ::error legibles en el log. Run: %s\n\n<!-- flaky-harvest -->' "$RUN" "$RUN_URL")" || true
          }
          # Log del attempt fallido (el retry ya corre); best-effort: la cosecha
          # jamás rompe el watchdog. Si download o unzip fallan, el vacío se
          # materializa (antes: exit 0 silencioso).
          if ! gh api "repos/${{ github.repository }}/actions/runs/${RUN}/attempts/1/logs" > "$TMP/l.zip" 2>/dev/null; then
            post_unparseable; exit 0
          fi
          if ! unzip -qo "$TMP/l.zip" -d "$TMP" 2>/dev/null; then
            post_unparseable; exit 0
          fi
          # 1) Anotaciones ::error de vitest (reporter github-actions): fichero
          # + título, dedupe, cap 10.
          FAILS=$(grep -rhoE '::error file=[^,]*packages/[^,]+,title=[^,]+' "$TMP" \
            | sed -E 's|::error file=[^,]*(packages/[^,]+),title=|\1 > |' \
            | sort -u | head -10 || true)
          # 2) Fallback al reporter default de vitest: bloque «Failed Tests»,
          # líneas ancladas al prefijo `FAIL ` (lección «regex polarity
          # blindness»: anclaje estricto al prefijo de línea, jamás substring
          # suelto). Normaliza antes: strip de códigos ANSI y del timestamp que
          # GitHub antepone a cada línea del log crudo. Este consumidor no emite
          # `::error`; su fallo real vive aquí (issue #103).
          if [ -z "$FAILS" ]; then
            FAILS=$(find "$TMP" -type f -name '*.txt' -exec cat {} + 2>/dev/null \
              | sed -E 's/\x1b\[[0-9;]*[a-zA-Z]//g' \
              | sed -E 's/^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9:.]+Z +//' \
              | grep -oE '(^| )FAIL +[^ ]+ > .+' \
              | sed -E 's/^ *FAIL +//' \
              | sort -u | head -10 || true)
          fi
          # 3) Nada extraíble tras ambos formatos ⇒ vacío materializado.
          if [ -z "$FAILS" ]; then
            post_unparseable; exit 0
          fi
          gh pr comment "$PR" --repo "${{ github.repository }}" --body "$(printf '**watchdog · cosecha de flaky-candidatos** (attempt 1 del run %s — confirmados como flaky si el re-run sale verde; el Auditor los cuenta por épica):\n\n~~~\n%s\n~~~\n\n<!-- flaky-harvest -->' "$RUN" "$FAILS")" || true

      - name: Orphan PR net
        id: orphan_net
        uses: actions/github-script@v7
        env:
          IN_EPIC_LABEL: ${{ inputs.epic_label }}
          IN_DEFAULT_BRANCH: ${{ inputs.default_branch }}
        with:
          github-token: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const O = { owner, repo };
            const MARK = '<!-- orphan-pr-fix -->';
            const issues = await github.rest.issues.listForRepo({ ...O, state: 'open', labels: process.env.IN_EPIC_LABEL, per_page: 20 });
            for (const issue of issues.data) {
              if (issue.pull_request) continue;
              const comments = await github.rest.issues.listComments({ ...O, issue_number: issue.number, per_page: 100 });
              const cs = comments.data;
              if (cs.some(c => (c.body || '').includes(MARK))) continue; // ya reparado una vez: no repetir
              const last = [...cs].reverse().find(c => c.user && c.user.login === 'claude[bot]');
              if (!last) continue;
              // Artefacto del fallo: enlace quick-pull /compare/<branch> en el cierre
              const m = (last.body || '').match(/\/compare\/([A-Za-z0-9._\/-]+)\?/);
              if (!m) continue;
              const branch = decodeURIComponent(m[1]);
              // Envejecimiento: 10 min desde el cierre del Creator (evita carreras con un gh pr create lento)
              if (Date.now() - new Date(last.created_at).getTime() < 10 * 60 * 1000) continue;
              // Rama existe y va por delante de la base
              let cmp;
              try { cmp = await github.rest.repos.compareCommits({ ...O, base: process.env.IN_DEFAULT_BRANCH, head: branch }); }
              catch (e) { continue; }
              if (cmp.data.ahead_by === 0) continue;
              // Cero PRs abiertos desde la rama
              const prs = await github.rest.pulls.list({ ...O, state: 'open', head: `${owner}:${branch}`, per_page: 5 });
              if (prs.data.length > 0) continue;
              const polarity = /partial-pr/.test(last.body || '') ? 'partial-pr' : 'full-pr';
              const pr = await github.rest.pulls.create({ ...O,
                title: issue.title.replace(/\s*\[épica[^\]]*\]\s*$/, ''),
                head: branch, base: process.env.IN_DEFAULT_BRANCH,
                body: `Closes #${issue.number}\n\n<!-- ${polarity} -->\n\n_PR creado mecánicamente por el watchdog (red de PR huérfano v1.2): Creator terminó con el trabajo en \`${branch}\` sin abrir el PR. Cuerpo del trabajo: ver el comentario de cierre del Creator en #${issue.number}._` });
              await github.rest.issues.addLabels({ ...O, issue_number: pr.data.number, labels: [process.env.IN_EPIC_LABEL] });
              await github.rest.issues.createComment({ ...O, issue_number: issue.number,
                body: `**watchdog · red de PR huérfano**: PR #${pr.data.number} creado mecánicamente desde \`${branch}\` (polaridad ${polarity}). ${MARK}` });
              core.info(`orphan-pr-fix: #${issue.number} → PR #${pr.data.number}`);
              break; // uno por scan
            }

  architect:
    needs: detect
    if: needs.detect.outputs.found == 'true'
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
      pull-requests: write
      actions: write   # ADR-217 §7: su prompt ordena relanzar CIs; read era un 403 latente
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Graft vendored (capa común servida desde el central — AP-009)
        uses: talfarouriarte-cloud/agent-pipeline/.github/actions/graft-vendored@main

      - name: Run Architect watchdog
        uses: anthropics/claude-code-action@v1
        env:
          # Blindaje OAuth-only (mismo patrón que Creator y Reviewer): sin
          # API key en env no hay fallback silencioso facturado.
          ANTHROPIC_API_KEY: ""
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # allowed_bots (2026-07-11, repo de origen, incidente PR #1266): la
          # acción rechaza actores bot por defecto (su anti-loop). Los runs del
          # watchdog por workflow_run heredan el actor de la cadena
          # (claude[bot] cuando el Creator empujó) y la etapa architect moría
          # al nacer — las escaladas solo funcionaban desde cron/dispatch
          # (actor humano). Seguro aquí: prompt interno fijo, etapa gateada
          # por detect.
          allowed_bots: "claude,github-actions"
          # PAT, NO GITHUB_TOKEN: los comentarios y labels del watchdog
          # DEBEN disparar los workflows del Creator/Reviewer. Eventos del
          # GITHUB_TOKEN default no disparan otros workflows (anti-loop de
          # GitHub) y además el @claude saldría de github-actions[bot].
          # Con el PAT, el re-arm sale con autoría del humano — exactamente
          # el mecanismo del rescate manual que este workflow automatiza.
          github_token: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
          claude_args: |
            --model ${{ inputs.resolve_model }}
            --max-turns ${{ inputs.resolve_max_turns }}
            --allowedTools "Read,Glob,Grep,Bash(gh issue view:*),Bash(gh issue comment:*),Bash(gh issue edit:*),Bash(gh issue create:*),Bash(gh issue close:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh pr checks:*),Bash(gh pr comment:*),Bash(gh pr edit:*),Bash(gh run list:*),Bash(gh run view:*),Bash(gh api repos/*)"
          prompt: |
            Eres el Architect en rol watchdog del repo ${{ github.repository }}.
            Tu rol vinculante está en docs/agents/watchdog.md del checkout:
            LÉELO ENTERO antes de actuar.

            El detector ha encontrado estas anomalías (trabajo aparentemente
            parado, sin runs activos en el pipeline):

            ```json
            ${{ needs.detect.outputs.anomalies }}
            ```

            Tipo `pr-ci-red-persistent` (CI rojo tras retry mecánico): baja
            el log del fallo (`gh run view <ci_run> --log-failed`), identifica
            el test y decide: si el fallo es atribuible al PR, ping-creator en
            el PR con el log relevante citado y la instrucción de corregir;
            si es un flaky ajeno al PR (pasa en local / falla intermitente en
            runner), dilo en el comentario, re-lanza el CI una última vez con
            `gh api -X POST repos/${{ github.repository }}/actions/runs/<ci_run>/rerun-failed-jobs`
            y si reincide aplica label `stalled` + diagnóstico SIN @claude.
            Cuenta como re-arm a efectos del cap.

            Tipo `stalled-autonomous-resolve` (régimen autónomo 2026-07-07,
            docs/agents/watchdog.md § Régimen autónomo): NO esperes al humano.
            (1) Diagnostica: informes/diags/checklists del ítem, y la skill
            `epic-context-<ADR>` del checkout si existe. (2) Decide:
            resolver-protocol primero; si no es derivable, decide con tu
            mejor juicio y publica el racional completo con el marcador
            `<!-- autonomous-decision -->`. Caso especial (AP-037): si el
            ítem lleva `estado:cierre-pendiente-humano`, aplica el caso
            «Cierre autónomo de completitud por-estado» de watchdog.md —
            verificación MATERIALIZADA del veredicto contra HEAD y
            `gh issue close` si se sustenta; `gh issue close` está en tu
            allowlist SOLO para ese caso. (3) Actúa: si el stall es de
            tamaño (cap de parciales), re-dimensiona el restante según la
            heurística de partición de architect.md (issues nuevos con label
            `${{ inputs.epic_label }}`, encadenados, heredando el sentinel del padre y cerrando
            el padre con trazabilidad); quita la label `stalled` (y
            `estado:esperando-architect` si está presente — AP-017: dejarla 
             puesta tras el ruling mantiene al dispatcher de turno cediendo
             sobre el PR y lo vuelve invisible al detector de zombis); ARMA la
            continuación (comentario `@claude` + `<!-- watchdog-rearm -->`).
            Excepciones absolutas (ahí sí humano): `.github/workflows/*`,
            `prototype.css`, promoción de la rama por defecto a la de producción.

            IMPORTANTE: el log de Actions NO conserva los turnos de tu
            En CADA comentario que publiques incluye, al final, el marcador de capa `<!-- watchdog-capa: ${{ github.event_name }} -->` (AP-011: el Auditor atribuye el fallo a la capa de vigilancia que lo recogió).
            sesión (solo init y resultado). Si necesitas entregar contenido
            a otro agente o al humano (cuerpos de issues, comandos, diffs),
            PUBLÍCALO en un comentario — jamás lo referencies "en el log"
            (incidente #1120, 2026-07-08: cuerpos irrecuperables).

            Para cada anomalía: diagnostica con `gh` (comentarios, checklist
            del último comment de claude[bot], estado de ramas/PRs/checks/
            labels, runs recientes) y ejecuta la acción mínima que reanude la
            cadena, respetando el cap de reintentos y las prohibiciones del
            rol. Si un item no necesita acción, dilo y no toques nada.

      - name: Materializar arm en ping-creator huérfanos (post-architect)
        # fp#1344 (repesca A, auditoría #1343): el architect-etapa escribió
        # `<!-- ping-creator -->` SIN la mención de arm anclada → Trigger
        # result: false → cadena parada 2h45m. La co-ocurrencia marcador↔
        # mención no puede depender de la prosa del agente: este post-step
        # escanea los comentarios recientes del repo; si el ÚLTIMO comentario
        # de un issue/PR lleva ping-creator sin `@claude` anclado a inicio de
        # línea, publica el arm mínimo (con PAT: debe disparar) referenciando
        # el diagnóstico. Idempotente por marcador.
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REVIEWER_GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const since = new Date(Date.now() - 40 * 60 * 1000).toISOString();
            const { data: comments } = await github.rest.issues.listCommentsForRepo({
              owner, repo, since, per_page: 100, sort: 'created', direction: 'asc' });
            const byIssue = {};
            for (const c of comments) {
              const n = Number((c.issue_url || '').split('/').pop());
              if (n) (byIssue[n] = byIssue[n] || []).push(c);
            }
            for (const [n, cs] of Object.entries(byIssue)) {
              const last = cs[cs.length - 1];
              const body = last.body || '';
              if (!/<!--\s*ping-creator\s*-->/.test(body)) continue;
              if (/^@claude/m.test(body)) continue;               // co-ocurre: sano
              if (/ping-creator-materializado/.test(body)) continue; // ya materializado
              await github.rest.issues.createComment({ owner, repo, issue_number: Number(n),
                body: `@claude — retoma según el diagnóstico del comentario anterior del watchdog (ping-creator sin mención de arm: co-ocurrencia materializada mecánicamente, fp#1344).\n\n<!-- ping-creator-materializado -->\n<!-- watchdog-capa: ${context.eventName} -->` });
              core.warning(`#${n}: ping-creator sin mención de arm — arm materializado.`);
            }
